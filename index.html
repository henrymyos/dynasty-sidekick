// Free, deterministic trade write-up composed from the data — no AI/API. One
// paragraph per team: what they did, KTC's verdict, and the strategic read.
function templateTradeAnalysis(item, players, evByRid, typeForName) {
  const { season, trade } = item;
  const POS = ["QB", "RB", "WR", "TE"];
  const ord = r => (r === 1 ? "1st" : r === 2 ? "2nd" : r === 3 ? "3rd" : r + "th");
  const assetName = d => {
    if (d.kind === "player") { const p = players[d.pid]; return p ? p.name : "a player"; }
    return d.dp.season + " " + ord(d.dp.round) + " pick";
  };
  const posOf = d => d.kind === "player" ? ((players[d.pid] || {}).position || null) : "PICK";
  const list = arr => {
    const n = arr.map(assetName);
    if (!n.length) return "depth pieces";
    if (n.length === 1) return n[0];
    if (n.length === 2) return n[0] + " and " + n[1];
    return n.slice(0, -1).join(", ") + ", and " + n[n.length - 1];
  };
  const paras = [];
  (trade.roster_ids || []).forEach(rid => {
    const nm = canonicalOwnerName(userDisplay(rosterToOwner(season, rid)));
    const type = typeForName[nm] || null;
    const ev = evByRid[rid];
    if (!ev) { paras.push(nm + ": not enough KTC data to grade this side."); return; }
    const got = ev.gotDetail, gave = ev.sentDetail;
    const posDelta = { QB: 0, RB: 0, WR: 0, TE: 0 };
    got.forEach(d => { const p = posOf(d); if (posDelta[p] != null) posDelta[p] += d.value; });
    gave.forEach(d => { const p = posOf(d); if (posDelta[p] != null) posDelta[p] -= d.value; });
    const pickGot = got.filter(d => d.kind === "pick").reduce((s, d) => s + d.value, 0);
    const pickGave = gave.filter(d => d.kind === "pick").reduce((s, d) => s + d.value, 0);
    const gotPlayers = got.some(d => d.kind === "player");
    const gavePlayers = gave.some(d => d.kind === "player");

    const s1 = nm + (type ? " (" + type + ")" : "") + " sent " + list(gave) + " to land " + list(got) + ".";

    const favor = ev.swing, size = Math.max(ev.myReceived, ev.mySent, 1), ratio = favor / size, a = Math.abs(favor);
    let s2;
    if (a < 250 || Math.abs(ratio) < 0.05) s2 = "KTC grades it essentially even.";
    else if (favor > 0) s2 = ratio > 0.18 ? ("KTC calls this a clear win for " + nm + ", +" + favor + " in their favor.")
      : ("KTC gives " + nm + " a modest edge, +" + favor + ".");
    else s2 = ratio < -0.18 ? ("KTC sees " + nm + " losing this one by roughly " + a + ".")
      : ("KTC has " + nm + " slightly behind, about " + a + ".");

    const bits = [];
    if (pickGave > pickGot + 500 && gotPlayers) bits.push("spending draft capital on proven production");
    else if (pickGot > pickGave + 500 && gavePlayers) bits.push("cashing players for future draft capital");
    let up = null, down = null;
    POS.forEach(p => {
      if (posDelta[p] > 600 && (!up || posDelta[p] > posDelta[up])) up = p;
      if (posDelta[p] < -600 && (!down || posDelta[p] < posDelta[down])) down = p;
    });
    if (up && down) bits.push("deepening " + up + " while thinning " + down);
    else if (up) bits.push("deepening " + up);
    else if (down) bits.push("thinning " + down);
    const s3 = bits.length ? (nm + " is " + bits.join(" and ") + ".") : "";

    let s4 = "";
    if (type === "Contender" && pickGot > pickGave + 1000) s4 = "Patient for a roster built to win now.";
    else if (type === "Contender") s4 = "In line with a win-now window.";
    else if (type === "Reloader" && pickGot > pickGave + 500) s4 = "Sensible stockpiling for the rebuild.";
    else if (type === "Reloader" && pickGave > pickGot + 1000) s4 = "Aggressive for a team that looks a year or two away.";

    paras.push([s1, s2, s3, s4].filter(Boolean).join(" "));
  });
  return paras.join("\n\n");
}

function buildFeedbackBlock(item, players, seasons, typeForName) {
  const { season, trade, names } = item;
  const block = el("div", { class: "trade-block" });

  // Per-asset KTC values + per-side valuations, from evaluateTrade.
  const valByPlayer = {}, valByPick = {}, evByRid = {};
  (trade.roster_ids || []).forEach(rid => {
    const ev = evaluateTrade(trade, rid, state.tradeHistory, players);
    evByRid[rid] = ev;
    if (ev) [...ev.gotDetail, ...ev.sentDetail].forEach(d => {
      if (d.kind === "player") valByPlayer[d.pid] = d.value;
      else valByPick[d.dp.season + "|" + d.dp.round + "|" + d.dp.roster_id] = d.value;
    });
  });
  const withValue = (node, v) => {
    node.appendChild(el("span", { class: "trade-where" }, v ? "KTC " + Math.round(v).toLocaleString() : "—"));
    return node;
  };

  block.appendChild(el("div", { class: "trade-header" },
    el("span", { class: "trade-date" }, names.join("  ↔  ")),
    el("span", { class: "trade-meta" }, fmtDate(trade.created) + "  ·  " + season.season + " season")));

  const cols = el("div", { class: "trade-cols" });
  (trade.roster_ids || []).forEach(rid => {
    const nm = canonicalOwnerName(userDisplay(rosterToOwner(season, rid)));
    const t = typeForName[nm] ? " (" + typeForName[nm] + ")" : "";
    const col = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, nm + t + " got"));
    let any = false;
    Object.entries(trade.adds || {}).forEach(([pid, r]) => {
      if (r === rid) { col.appendChild(withValue(renderTradePlayerLine(pid, players), valByPlayer[pid])); any = true; }
    });
    (trade.draft_picks || []).forEach(dp => {
      if (dp.owner_id === rid) {
        col.appendChild(withValue(renderTradePickLine(dp, seasons, players, trade.created),
          valByPick[dp.season + "|" + dp.round + "|" + dp.roster_id]));
        any = true;
      }
    });
    if (!any) col.appendChild(el("div", { class: "trade-empty" }, "—"));
    cols.appendChild(col);
  });
  block.appendChild(cols);

  // Free, instant, template-based analysis (no AI, no cost).
  block.appendChild(renderAnalysisText(templateTradeAnalysis(item, players, evByRid, typeForName)));
  return block;
}

function renderTradePlayerLine(pid, players) {
  const p = players[pid];
  const line = el("div", { class: "trade-line" });
  if (p) {
    line.appendChild(el("span", { class: "trade-player" }, p.name));
    if (p.position) {
      line.appendChild(el("span", { class: "pos-chip " + positionClass(p.position) }, p.position));
    }
  } else {
    line.appendChild(el("span", { class: "trade-player" }, "Player " + pid));
  }
  return line;
}

// Look up which player was actually drafted with a traded pick.
// dp: { season, round, roster_id } where roster_id is the original slot owner.
function resolvePickToPlayer(dp, allSeasons, players) {
  const season = allSeasons.find(s => s.season === dp.season);
  if (!season) return null;
  // Use the first chronologically-created complete draft that has enough rounds and any picks.
  const draft = season.drafts
    .filter(d => d.status === "complete" && (d.rounds || 0) >= dp.round && d.picks && d.picks.length)
    .slice()
    .sort((a, b) => (a.created || 0) - (b.created || 0))[0];
  if (!draft) return null;
  // Find the draft slot belonging to the original roster
  const slotEntry = Object.entries(draft.slot_to_roster_id || {})
    .find(([, rid]) => rid === dp.roster_id);
  if (!slotEntry) return null;
  const slot = parseInt(slotEntry[0], 10);
  const pick = draft.picks.find(p => p.round === dp.round && p.draft_slot === slot);
  if (!pick) return null;
  const player = players[pick.player_id];
  return { pick, player };
}

function renderTradePickLine(dp, allSeasons, players, tradeCreated) {
  const line = el("div", { class: "trade-line" });
  const seasonOfPick = allSeasons.find(s => s.season === dp.season);

  // Default to a round label; only collapse to the exact slot (e.g. 1.09)
  // when the slot order was already locked in when the trade happened —
  // i.e. the draft for that pick had already been configured.
  let slotLabel = `Round ${dp.round}`;
  let resolved = null;
  if (seasonOfPick) {
    const draft = seasonOfPick.drafts
      .filter(d => d.status === "complete" && (d.rounds || 0) >= dp.round && d.picks && d.picks.length)
      .slice()
      .sort((a, b) => (a.created || 0) - (b.created || 0))[0];
    if (draft) {
      const slotKnownAtTrade = tradeCreated != null && draft.created != null
        && tradeCreated >= draft.created;
      const slotEntry = Object.entries(draft.slot_to_roster_id || {})
        .find(([, rid]) => rid === dp.roster_id);
      if (slotEntry) {
        const slotNum = parseInt(slotEntry[0], 10);
        if (slotKnownAtTrade) {
          slotLabel = `${dp.round}.${String(slotNum).padStart(2, "0")}`;
        }
        const pick = draft.picks.find(p => p.round === dp.round && p.draft_slot === slotNum);
        if (pick) {
          const player = players[pick.player_id];
          if (player) resolved = { pick, player };
        }
      }
    }
  }

  // Look up the original slot owner. Use the pick's season league if it
  // exists; otherwise fall back to the current league (roster_ids are stable
  // across seasons in dynasty leagues).
  const currentSeason = allSeasons[allSeasons.length - 1];
  let origin = seasonOfPick ? rosterToOwner(seasonOfPick, dp.roster_id) : null;
  if (!origin && currentSeason) origin = rosterToOwner(currentSeason, dp.roster_id);
  const originName = origin ? canonicalOwnerName(userDisplay(origin)) : null;

  const label = `${dp.season} ${slotLabel} pick`;
  line.appendChild(el("span", { class: "trade-player" }, label));
  if (originName) {
    line.appendChild(el("span", { class: "trade-resolved" }, "· " + originName));
  }
  if (resolved && resolved.player) {
    line.appendChild(el("span", { class: "trade-resolved" }, "→ " + resolved.player.name));
    if (resolved.player.position) {
      line.appendChild(el("span", { class: "pos-chip " + positionClass(resolved.player.position) }, resolved.player.position));
    }
  }
  return line;
}

// ---------- League History (standings + records) ----------
// Final standings are derived from the NEXT season's rookie-draft order: the
// league assigns slots in reverse order of finish, so finish = N + 1 - slot.
// Verified against the league sheet for 2019, 2024 and 2025 (all 12 match,
// including consolation placements that Sleeper's losers bracket gets wrong).
function canonicalUserName(u) {
  const byTeam = canonicalOwnerName(userDisplay(u));
  // If the (possibly old) team name didn't map, fall back to the account
  // display name, which is always in the merge table.
  if (u && u.team_name && byTeam === u.team_name) {
    const byHandle = canonicalOwnerName(u.display_name || "");
    if (byHandle && byHandle !== u.display_name) return byHandle;
  }
  return byTeam;
}

function computeLeagueHistory() {
  if (!state.sleeper || !state.sleeper.seasons.length) return null;
  const seasons = state.sleeper.seasons;  // oldest → newest
  const years = [];
  for (let i = 0; i < seasons.length; i++) {
    const season = seasons[i];
    const next = seasons[i + 1];
    const entry = {
      year: season.season, finishes: {}, records: {}, teams: 0, hasGames: false,
      playoffTeams: season.playoff_teams || null,
    };
    season.rosters.forEach(r => {
      const u = season.users.find(x => x.user_id === r.owner_id);
      if (!u) return;
      const name = canonicalUserName(u);
      const w = r.wins || 0, l = r.losses || 0, t = r.ties || 0;
      if (w + l + t > 0) {
        entry.hasGames = true;
        entry.records[name] = w + "-" + l + (t ? "-" + t : "");
      }
    });
    // Primary method for every league: next season's draft slots are assigned
    // in reverse order of finish, which captures even the consolation
    // placements the Sleeper bracket gets wrong. Verified against the home
    // league's sheet for 2019-2025.
    const nextDraft = next
      ? (next.drafts || []).find(d => d.slot_to_roster_id && Object.keys(d.slot_to_roster_id).length)
      : null;
    if (nextDraft) {
      const slots = Object.entries(nextDraft.slot_to_roster_id);
      const n = slots.length;
      entry.teams = n;
      slots.forEach(([slot, rid]) => {
        const user = rosterToOwner(next, rid);
        if (!user) return;
        entry.finishes[canonicalUserName(user)] = n + 1 - parseInt(slot, 10);
      });
    } else if (!IS_DEFAULT_LEAGUE) {
      // Fallback when no next-season draft exists yet (typically the latest
      // completed season of a foreign league): placement games (p:1 = title,
      // p:3 = 3rd, …) decide the playoff places; everyone else ranks by
      // regular-season record, then points. Only decided titles count.
      const bracket = season.winners_bracket || [];
      const places = {};
      bracket.forEach(m => {
        if (m.p != null && m.w != null && m.l != null) {
          places[m.w] = m.p;
          places[m.l] = m.p + 1;
        }
      });
      const titleDecided = bracket.some(m => m.p === 1 && m.w != null);
      if (titleDecided) {
        const n = season.rosters.length;
        entry.teams = n;
        const placed = Object.keys(places).length;
        const rest = season.rosters
          .filter(r => places[r.roster_id] == null)
          .sort((a, b) => (b.wins || 0) - (a.wins || 0) || (b.fpts || 0) - (a.fpts || 0));
        rest.forEach((r, idx) => { places[r.roster_id] = placed + idx + 1; });
        season.rosters.forEach(r => {
          const u = season.users.find(x => x.user_id === r.owner_id);
          if (u && places[r.roster_id] != null) entry.finishes[canonicalUserName(u)] = places[r.roster_id];
        });
      }
    }
    if (Object.keys(entry.finishes).length || entry.hasGames) years.push(entry);
  }
  return years;
}

// Parse the "All Time Record" sheet tab. Layout: a 12x12 head-to-head matrix
// (COLUMN = manager, ROW = opponent, so column ME read down is Henry's record
// against everyone), then summary rows (Bye / Wins / Appearances / Final 4 /
// Championships), then a "Playoffs" header starting a second matrix with a
// TOTAL row. Includes pre-Sleeper seasons, so it can't be computed from the
// Sleeper API.
function prettyMgrName(s) {
  const t = (s || "").trim();
  if (!t) return "";
  if (t.toUpperCase() === "ME") return "Henry";
  if (t.toUpperCase() === "DAD") return "Dave";
  return t[0].toUpperCase() + t.slice(1).toLowerCase();
}
function parseAlltimeSheet(rows) {
  if (!rows || !rows.length) return null;
  const header = rows[0] || [];
  const names = [];
  for (let c = 1; c < header.length; c++) {
    const n = prettyMgrName(header[c]);
    if (n && n.length <= 12 && !/\d/.test(n)) names.push({ col: c, name: n });
    else if (names.length) break;  // stop at the first non-name header (notes)
  }
  if (!names.length) return null;
  const nameSet = new Set(names.map(x => x.name));
  const note = (header[names[names.length - 1].col + 1] || "").trim();
  const reg = {}, po = {};
  const summary = [];
  let playoffTotal = null;
  let mode = "regular";
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i] || [];
    const label = (row[0] || "").trim();
    if (!label) continue;
    if (/^playoffs$/i.test(label)) { mode = "playoff"; continue; }
    const vals = {};
    names.forEach(({ col, name }) => {
      const v = (row[col] || "").trim();
      if (v) vals[name] = v;
    });
    const pretty = prettyMgrName(label);
    if (nameSet.has(pretty)) (mode === "regular" ? reg : po)[pretty] = vals;
    else if (/^total$/i.test(label)) playoffTotal = vals;
    else summary.push({ label, values: vals });
  }
  return { names: names.map(x => x.name), reg, po, summary, playoffTotal, note };
}

// W-L(-T) string → tint class (green winning record, red losing record).
function recordClass(rec) {
  const m = (rec || "").match(/^(\d+)\s*-\s*(\d+)/);
  if (!m) return "";
  const w = parseInt(m[1], 10), l = parseInt(m[2], 10);
  if (w > l) return "h2h-w";
  if (l > w) return "h2h-l";
  return "";
}

// Head-to-head matrix card: each cell is the COLUMN manager's record against
// the ROW manager — same orientation as the sheet (read a manager's column
// top to bottom to see their record vs everyone).
function buildH2HCard(title, names, matrix, totalRow, note) {
  const card = el("div", { class: "card" }, el("h2", {}, title));
  const table = el("table", { class: "hist-table" });
  table.appendChild(el("thead", {}, el("tr", {},
    el("th", {}, "vs"),
    ...names.map(n => el("th", {}, n)),
  )));
  const body = el("tbody");
  names.forEach(opp => {
    body.appendChild(el("tr", {},
      el("td", {}, opp),
      ...names.map(mgr => {
        if (opp === mgr) return el("td", { class: "diag" }, "—");
        const rec = (matrix[opp] || {})[mgr] || "";  // sheet: row=opponent, col=manager
        return el("td", { class: recordClass(rec) }, rec || "—");
      }),
    ));
  });
  if (totalRow) {
    body.appendChild(el("tr", { class: "hist-total" },
      el("td", {}, "Total"),
      ...names.map(n => el("td", { class: recordClass(totalRow[n]) }, totalRow[n] || "—")),
    ));
  }
  table.appendChild(body);
  card.appendChild(table);
  if (note) card.appendChild(el("div", { class: "hist-note" }, note));
  return card;
}

function sampleNormal(mean, sd) {
  let u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return mean + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

// Playoff odds: Monte-Carlo the remaining regular-season schedule for the
// current season, using each team's scoring mean/variance so far. Renders
// nothing outside an in-progress regular season (no games left to simulate).
function renderPlayoffOdds(main) {
  if (!state.sleeper) return;
  const season = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  const weeks = season.matchups || [];
  const pws = season.playoff_week_start;
  if (!weeks.length || !pws) return;
  const lastReg = pws - 1;
  const teams = season.rosters.map(r => ({
    rid: r.roster_id,
    name: canonicalOwnerName(userDisplay(rosterToOwner(season, r.roster_id))),
    rec: (r.wins || 0) + "-" + (r.losses || 0) + (r.ties ? "-" + r.ties : ""),
    wins0: (r.wins || 0) + 0.5 * (r.ties || 0),
    pts0: r.fpts || 0,
    scores: [],
  }));
  const byRid = {};
  teams.forEach(t => byRid[t.rid] = t);
  const remaining = [];
  for (let w = 0; w < lastReg && w < weeks.length; w++) {
    const entries = (weeks[w] || []).filter(e => e && e.matchup_id != null);
    if (!entries.length) continue;
    const complete = entries.every(e => typeof e.points === "number" && e.points > 0);
    const byMatch = {};
    entries.forEach(e => { (byMatch[e.matchup_id] || (byMatch[e.matchup_id] = [])).push(e); });
    if (complete) {
      entries.forEach(e => { const t = byRid[e.roster_id]; if (t) t.scores.push(e.points); });
    } else {
      Object.values(byMatch).forEach(p => { if (p.length === 2) remaining.push([p[0].roster_id, p[1].roster_id]); });
    }
  }
  if (!remaining.length) return;  // season over or not started — nothing to simulate

  const allScores = teams.flatMap(t => t.scores);
  const leagueMean = allScores.length ? allScores.reduce((a, b) => a + b, 0) / allScores.length : 110;
  teams.forEach(t => {
    if (t.scores.length >= 2) {
      t.mean = t.scores.reduce((a, b) => a + b, 0) / t.scores.length;
      t.sd = Math.sqrt(t.scores.reduce((s, x) => s + (x - t.mean) ** 2, 0) / t.scores.length) || 18;
    } else { t.mean = leagueMean; t.sd = 20; }
  });
  const pt = season.playoff_teams || Math.floor(teams.length / 2);
  const N = 3000;
  const made = {};
  teams.forEach(t => made[t.rid] = 0);
  for (let s = 0; s < N; s++) {
    const w = {}, p = {};
    teams.forEach(t => { w[t.rid] = t.wins0; p[t.rid] = t.pts0; });
    remaining.forEach(([ra, rb]) => {
      const A = byRid[ra], B = byRid[rb];
      const sa = sampleNormal(A.mean, A.sd), sb = sampleNormal(B.mean, B.sd);
      p[ra] += sa; p[rb] += sb;
      if (sa > sb) w[ra] += 1; else if (sb > sa) w[rb] += 1; else { w[ra] += 0.5; w[rb] += 0.5; }
    });
    const ranked = teams.slice().sort((a, b) => (w[b.rid] - w[a.rid]) || (p[b.rid] - p[a.rid]));
    for (let i = 0; i < pt && i < ranked.length; i++) made[ranked[i].rid]++;
  }
  const rows = teams.map(t => ({ name: t.name, rec: t.rec, odds: made[t.rid] / N }))
    .sort((a, b) => b.odds - a.odds);
  const table = el("table", {},
    el("thead", {}, el("tr", {},
      el("th", {}, "Manager"),
      el("th", { class: "num" }, "Record"),
      el("th", { class: "num" }, "Playoff odds"),
    )));
  const tb = el("tbody", {});
  rows.forEach(r => tb.appendChild(el("tr", {},
    el("td", {}, r.name),
    el("td", { class: "num" }, r.rec),
    el("td", { class: "num " + (r.odds >= 0.5 ? "delta-pos" : r.odds <= 0.15 ? "delta-neg" : "") },
      Math.round(r.odds * 100) + "%"),
  )));
  table.appendChild(tb);
  main.appendChild(el("div", { class: "card" },
    el("h2", {}, "Playoff Odds"),
    table,
    el("div", { class: "hist-note" },
      "Monte-Carlo of the " + remaining.length + " remaining regular-season games, drawing each team's weekly score from its mean and variance so far. Top " + pt + " make the playoffs.")));
}

// Schedule luck: actual wins (from weekly head-to-head) vs expected wins
// (all-play win rate). Needs weekly matchup data from /api/sleeper.
function renderScheduleLuck(main) {
  if (!state.sleeper) return;
  const luck = {};
  const mgrOf = name => luck[name] || (luck[name] = { name, games: 0, actual: 0, expected: 0 });
  let any = false;
  state.sleeper.seasons.forEach(season => {
    const weeks = season.matchups || [];
    if (!weeks.length) return;
    const regGames = Math.max(0, ...season.rosters.map(r => (r.wins || 0) + (r.losses || 0) + (r.ties || 0)));
    if (!regGames) return;
    const nameByRid = {};
    season.rosters.forEach(r => {
      nameByRid[r.roster_id] = canonicalOwnerName(userDisplay(rosterToOwner(season, r.roster_id)));
    });
    for (let w = 0; w < regGames && w < weeks.length; w++) {
      const entries = (weeks[w] || []).filter(e => typeof e.points === "number");
      if (entries.length < 2 || entries.some(e => e.points <= 0)) continue;  // skip unplayed/partial weeks
      any = true;
      const k = entries.length;
      entries.forEach(e => {
        let beat = 0, tied = 0;
        entries.forEach(o => {
          if (o === e) return;
          if (e.points > o.points) beat++; else if (e.points === o.points) tied++;
        });
        const m = mgrOf(nameByRid[e.roster_id] || "—");
        m.expected += (beat + 0.5 * tied) / (k - 1);
        m.games += 1;
      });
      const byMatch = {};
      entries.forEach(e => { (byMatch[e.matchup_id] || (byMatch[e.matchup_id] = [])).push(e); });
      Object.values(byMatch).forEach(pair => {
        if (pair.length !== 2) return;
        const a = mgrOf(nameByRid[pair[0].roster_id] || "—");
        const b = mgrOf(nameByRid[pair[1].roster_id] || "—");
        if (pair[0].points > pair[1].points) a.actual += 1;
        else if (pair[1].points > pair[0].points) b.actual += 1;
        else { a.actual += 0.5; b.actual += 0.5; }
      });
    }
  });
  const rows = Object.values(luck).filter(r => r.games > 0);
  if (!any || !rows.length) return;  // no matchup data yet (API not redeployed) — render nothing
  rows.forEach(r => r.luck = r.actual - r.expected);
  if (!state.luckSort) state.luckSort = { col: "luck", dir: "desc" };
  const ls = state.luckSort;
  rows.sort((a, b) => {
    const av = a[ls.col], bv = b[ls.col];
    const cmp = av < bv ? -1 : av > bv ? 1 : (a.name < b.name ? -1 : 1);
    return ls.dir === "asc" ? cmp : -cmp;
  });
  const table = el("table", {},
    el("thead", {}, el("tr", {},

}

function renderHistory() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();
  ensureKtcDynastyLoaded();
  if (IS_DEFAULT_LEAGUE) ensureAlltimeLoaded();

  if (state.sleeperLoading) {
    main.appendChild(el("div", { class: "empty" }, "Loading from Sleeper…"));
    return;
  }
  if (state.sleeperError) {
    main.appendChild(el("div", { class: "empty" }, "Sleeper error: " + state.sleeperError));
    return;
  }
  const hist = computeLeagueHistory();
  if (!hist || !hist.length) {
    main.appendChild(el("div", { class: "empty" }, "No league history available."));
    return;
  }

  const finishedYears = hist.filter(y => Object.keys(y.finishes).length);
  const recordYears = hist.filter(y => y.hasGames);

  // Per-manager summary metrics, computed over completed seasons only —
  // same math as the league sheet (AVG Finish excludes the current year).
  const managers = {};
  finishedYears.forEach(y => {
    const playoffCut = y.playoffTeams || Math.floor((y.teams || 12) / 2);
    Object.entries(y.finishes).forEach(([name, place]) => {
      const m = managers[name] || (managers[name] = { name, finishes: [], wins: 0, top2: 0, top3: 0, playoffs: 0 });
      m.finishes.push(place);
      if (place === 1) m.wins++;
      if (place <= 2) m.top2++;
      if (place <= 3) m.top3++;
      if (place <= playoffCut) m.playoffs++;
    });
  });
  const mgrList = Object.values(managers);
  mgrList.forEach(m => { m.avg = m.finishes.reduce((a, b) => a + b, 0) / m.finishes.length; });

  // Column order is sortable by the summary-row metrics; default AVG Finish
  // ascending (best manager first).
  if (!state.historySortKey) { state.historySortKey = "avg"; state.historySortDir = 1; }
  const key = state.historySortKey, dir = state.historySortDir;
  mgrList.sort((a, b) => {
    if (a[key] !== b[key]) return (a[key] - b[key]) * dir;
    if (a.avg !== b.avg) return a.avg - b.avg;
    return a.name.localeCompare(b.name);
  });
  const names = mgrList.map(m => m.name);

  function finClass(place, y) {
    const teams = y.teams || 12;
    const cut = y.playoffTeams || Math.floor(teams / 2);
    if (place === 1) return "fin-1";
    if (place === 2) return "fin-2";
    if (place === 3) return "fin-3";
    if (place <= cut) return "fin-po";
    if (place >= teams - 2) return "fin-bot";
    return "";
  }

  // ----- Card 1: final standings by year + summary metrics -----
  const standCard = el("div", { class: "card" }, el("h2", {}, "Final Standings by Year"));
  const sTable = el("table", { class: "hist-table" });
  sTable.appendChild(el("thead", {}, el("tr", {},
    el("th", {}, "Year"),
    ...names.map(n => el("th", {}, n)),
  )));
  const sBody = el("tbody");
  finishedYears.forEach(y => {
    sBody.appendChild(el("tr", {},
      el("td", {}, y.year),
      ...names.map(n => {
        const place = y.finishes[n];
        return el("td", { class: place != null ? finClass(place, y) : "" },
          place != null ? String(place) : "—");
      }),
    ));
  });

  // Projected row for the current (unplayed) season, from contender ranks.
  const latestSeason = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  const latestDone = finishedYears.some(y => y.year === latestSeason.season);
  if (!latestDone && state.ktcDynasty) {
    const ranked = computeManagerRankings();
    if (ranked) {
      const projByName = {};
      ranked.forEach(r => { projByName[r.name] = r.cRank; });
      sBody.appendChild(el("tr", { class: "hist-proj" },
        el("td", {}, latestSeason.season + " *"),
        ...names.map(n => el("td", {}, projByName[n] != null ? String(projByName[n]) : "—")),
      ));
    }
  }

  // Summary rows — clickable labels re-sort the manager columns.
  const METRICS = [
    { key: "avg", label: "AVG Finish", fmt: m => m.avg.toFixed(2), defaultDir: 1 },
    { key: "wins", label: "Wins", fmt: m => String(m.wins), defaultDir: -1 },
    { key: "top2", label: "Top 2", fmt: m => String(m.top2), defaultDir: -1 },
    { key: "top3", label: "Top 3", fmt: m => String(m.top3), defaultDir: -1 },
    { key: "playoffs", label: "Playoffs", fmt: m => String(m.playoffs), defaultDir: -1 },
  ];
  METRICS.forEach((metric, idx) => {
    const active = key === metric.key;
    const th = el("th", {
      class: "metric-label sortable" + (active ? " active" : ""),
    }, metric.label, el("span", { class: "arrow" }, active ? (dir === 1 ? "↑" : "↓") : ""));
    th.addEventListener("click", () => {
      if (state.historySortKey === metric.key) state.historySortDir = -state.historySortDir;
      else { state.historySortKey = metric.key; state.historySortDir = metric.defaultDir; }
      render();
    });
    sBody.appendChild(el("tr", { class: idx === 0 ? "hist-summary-top" : "" },
      th,
      ...mgrList.map(m => el("td", {}, metric.fmt(m))),
    ));
  });
  sTable.appendChild(sBody);
  standCard.appendChild(sTable);
  standCard.appendChild(el("div", { class: "hist-note" },
    "Standings derived from the next season's draft order (reverse of finish)" +
    (IS_DEFAULT_LEAGUE ? ". " : "; the latest season falls back to the playoff bracket plus record. ") +
    "Gold / silver / bronze = top three, green = made playoffs, red = bottom three. " +
    (latestDone ? "" : "* Projected from current contender rankings.")));
  main.appendChild(standCard);

  // ----- Card 2: regular-season records -----
  const finishByYear = {};
  finishedYears.forEach(y => { finishByYear[y.year] = y.finishes; });
  const recCard = el("div", { class: "card" }, el("h2", {}, "Regular Season Records"));
  const rTable = el("table", { class: "hist-table" });
  rTable.appendChild(el("thead", {}, el("tr", {},
    el("th", {}, "Year"),
    ...names.map(n => el("th", {}, n)),
  )));
  const rBody = el("tbody");
  recordYears.forEach(y => {
    const fins = finishByYear[y.year] || {};
    rBody.appendChild(el("tr", {},
      el("td", {}, y.year),
      ...names.map(n => {
        const cls = fins[n] === 1 ? "rec-champ" : fins[n] === 2 ? "rec-runner" : "";
        return el("td", { class: cls }, y.records[n] || "—");
      }),
    ));
  });
  rTable.appendChild(rBody);
  recCard.appendChild(rTable);
  recCard.appendChild(el("div", { class: "hist-note" },
    "Champion highlighted gold, runner-up blue."));
  main.appendChild(recCard);

  // ----- Playoff odds (in-progress season) + schedule luck (from matchups) -----
  renderPlayoffOdds(main);
  renderScheduleLuck(main);

  // ----- All-time record sheet (includes pre-Sleeper seasons; this league only) -----
  if (!IS_DEFAULT_LEAGUE) return;
  if (state.alltimeLoading) {
    main.appendChild(el("div", { class: "empty" }, "Loading all-time records…"));
    return;
  }
  if (state.alltimeError) {
    main.appendChild(el("div", { class: "empty" }, "All-time sheet error: " + state.alltimeError));
    return;
  }
  const at = state.alltime ? parseAlltimeSheet(state.alltime.rows) : null;
  if (!at) return;

  // Card 3: all-time head-to-head.
  main.appendChild(buildH2HCard(
    "All-Time Head-to-Head", at.names, at.reg, null,
    "Column manager's record against each row manager, all seasons" +
    (at.note ? " — " + at.note.toLowerCase() : "") + "."));

  // Card 4: playoff summary rows (byes, title-game results, championships).
  if (at.summary.length) {
    const sumCard = el("div", { class: "card" }, el("h2", {}, "Playoff Summary"));
    const sumTable = el("table", { class: "hist-table" });
    sumTable.appendChild(el("thead", {}, el("tr", {},
      el("th", {}, ""),
      ...at.names.map(n => el("th", {}, n)),
    )));
    const sumBody = el("tbody");
    at.summary.forEach(rowDef => {
      sumBody.appendChild(el("tr", {},
        el("td", {}, rowDef.label),
        ...at.names.map(n => el("td", {}, rowDef.values[n] || "—")),
      ));
    });
    sumTable.appendChild(sumBody);
    sumCard.appendChild(sumTable);
    main.appendChild(sumCard);
  }

  // Card 5: playoff-only head-to-head with the TOTAL row.
  if (Object.keys(at.po).length) {
    main.appendChild(buildH2HCard(
      "Playoff Head-to-Head", at.names, at.po, at.playoffTotal,
      "Playoff games only — column manager's record against each row manager."));
  }
}

// ---------- Live Draft workspace ----------
// A roster's strength at a position weights its best player fully and each
// additional body with diminishing returns (geometric decay), not a flat sum
// of every player. This matches KTC's league-analysis positional ranks: one
// elite QB outranks a pile of backups, and trading away a depth piece barely
// moves you while trading your starter drops you a lot. Decay 0.7 reproduces
// KTC's published ranks far better than a raw sum (44/48 vs 35/48 within one
// rank) and gives the ranks Henry sees on KTC's site.
const POS_DEPTH_DECAY = 0.7;
function decayedPositionalValue(valuesDesc) {
  let s = 0;
  for (let i = 0; i < valuesDesc.length; i++) s += valuesDesc[i] * Math.pow(POS_DEPTH_DECAY, i);
  return s;
}

async function loadDraftLive() {
  state.draft.loading = true;
  state.draft.error = null;
  try {
    const fetches = [
      fetch("/api/draft-live?league_id=" + LEAGUE_ID + "&_=" + Date.now(), { cache: "no-store" }),
      fetch("/api/ktc-live", { cache: "no-store" }),
      fetch("/api/flock-live?_=" + Date.now(), { cache: "no-store" }),
    ];
    if (!state.draft.ktcDynasty) {
      fetches.push(fetch("/api/ktc-dynasty?" + ktcDynastyQuery(), { cache: "no-store" }));
    }
    const results = await Promise.all(fetches);
    const [draftRes, ktcRes, flockRes, dynRes] = results;
    if (!draftRes.ok) throw new Error("draft " + draftRes.status);
    if (!ktcRes.ok) throw new Error("ktc " + ktcRes.status);
    state.draft.data = await draftRes.json();
    state.draft.ktcLive = await ktcRes.json();
    // Flock is optional — don't fail the whole load on it
    state.draft.flockError = null;
    if (flockRes.ok) {
      state.draft.flockLive = await flockRes.json();
    } else {
      try { state.draft.flockError = (await flockRes.json()).error || ("HTTP " + flockRes.status); }
      catch { state.draft.flockError = "HTTP " + flockRes.status; }
    }
    if (dynRes) {
      if (!dynRes.ok) throw new Error("dynasty " + dynRes.status);
      state.draft.ktcDynasty = await dynRes.json();
    }
    state.draft.lastPoll = new Date();
    if (state.draft.data.error) throw new Error(state.draft.data.error);
  } catch (e) {
    console.error(e);
    state.draft.error = e.message;
  } finally {
    state.draft.loading = false;
    if (state.workspace === "team" && state.view === "liveDraft") render();
  }
}

function startDraftPolling() {
  if (state.draft.pollTimer) return;
  state.draft.pollTimer = setInterval(() => {
    if (state.workspace === "team" && state.view === "liveDraft") loadDraftLive();
  }, 15_000);
}
function stopDraftPolling() {
  if (state.draft.pollTimer) {
    clearInterval(state.draft.pollTimer);
    state.draft.pollTimer = null;
  }
}

function ktcNorm(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[’‘ʼ]/g, "'")
    .replace(/[.,'`]/g, "")
    .replace(/\s+jr\b|\s+sr\b|\s+ii\b|\s+iii\b|\s+iv\b/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// leagues get the same draft-analytics tabs, fed by KTC-auto-graded picks
// instead of the hand-graded Google Sheet.

  drafts: [
    { view: "overview", label: "Overview" },
    { view: "leaderboard", label: "Drafters" },
    { view: "stats", label: "Stats" },
    { view: "trades", label: "Trades" },

  ],
  team: [
    { view: "liveDraft", label: "Live Draft" },

  ],
};

// Sort users alphabetically with Henry pinned to the top.
// Henry first, then everyone else by total roster value (players + picks,
// KTC) descending. Falls back to alphabetical until KTC / Sleeper data has
// loaded — the views re-render when it arrives and the order corrects itself.
function sortUsersHenryFirst(users) {
  ensureSleeperLoaded();
  ensureKtcDynastyLoaded();
  let valueByUserId = null;
  if (state.sleeper && state.sleeper.seasons.length && state.ktcDynasty) {
    const ranked = computeManagerRankings();
    if (ranked) {
      const latest = state.sleeper.seasons[state.sleeper.seasons.length - 1];
      valueByUserId = {};
      ranked.forEach(r => {
        const roster = latest.rosters.find(x => x.roster_id === r.roster_id);
        if (roster) valueByUserId[roster.owner_id] = r.totalValue;
      });
    }
  }
  const mine = myTeamName();
  return users.slice().sort((a, b) => {
    const aName = canonicalOwnerName(userDisplay(a));
    const bName = canonicalOwnerName(userDisplay(b));
    if (mine != null) {
      if (aName === mine && bName !== mine) return -1;
      if (bName === mine && aName !== mine) return 1;
    }
    if (valueByUserId) {
      const av = valueByUserId[a.user_id] != null ? valueByUserId[a.user_id] : -1;
      const bv = valueByUserId[b.user_id] != null ? valueByUserId[b.user_id] : -1;
      if (av !== bv) return bv - av;
    }
    return aName.localeCompare(bName);
  });
}

function findUserIdByCanonicalName(name) {
  if (!state.sleeper || !state.sleeper.seasons || !state.sleeper.seasons.length) return null;
  const latest = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  for (const u of latest.users) {
    if (canonicalOwnerName(userDisplay(u)) === name) return u.user_id;
  }
  return null;
}

function rebuildTabsNav() {
  const nav = document.getElementById("tabsNav");
  if (!nav) return;
  nav.innerHTML = "";
  const tabs = WORKSPACE_TABS[state.workspace] || [];
  tabs.forEach(t => {
    const btn = el("button", {
      "data-view": t.view,
      class: state.view === t.view ? "active" : "",
    }, t.label);
    btn.addEventListener("click", () => {
      state.view = t.view;
      rebuildTabsNav();
      render();
    });
    nav.appendChild(btn);
  });
}

function setWorkspace(ws) {
  state.workspace = ws;
  try { localStorage.setItem(LS_WORKSPACE, ws); } catch {}
  document.querySelectorAll(".ws-btn").forEach(b => b.classList.toggle("active", b.dataset.ws === ws));

  // Snap state.view to a tab that exists in the new workspace.
  const tabs = WORKSPACE_TABS[ws] || [];
  const validViews = new Set(tabs.map(t => t.view));
  if (!validViews.has(state.view)) {
    state.view = tabs.length ? tabs[0].view : null;
  }

  // Live-draft polling only runs while the Live Draft tab is open.
  if (ws === "team" && state.view === "liveDraft") {
    if (!state.draft.data) loadDraftLive();
    startDraftPolling();
  } else {
    stopDraftPolling();
  }

  // Default to "my team" on first entry to My Team workspace.
  if (ws === "team" && state.rosterTeam == null) {
    const mine = myTeamName();
    const myId = mine ? findUserIdByCanonicalName(mine) : null;
    if (myId) state.rosterTeam = myId;
  }

  rebuildTabsNav();
  render();
}

function renderDraftWorkspace() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  if (state.draft.loading && !state.draft.data) {
    main.appendChild(el("div", { class: "empty" }, "Loading draft…"));
    return;
  }
  if (state.draft.error && !state.draft.data) {
    main.appendChild(el("div", { class: "empty" }, "Error: " + state.draft.error));
    return;
  }
  if (!state.draft.data) {
    main.appendChild(el("div", { class: "empty" }, "No draft data."));
    return;
  }

  const d = state.draft.data;

  // Team picker — Henry pinned to the top, rest by roster value.
  const controls = el("div", { class: "controls" });
  const sortedUsers = sortUsersHenryFirst(d.users);
  if (state.draft.myUserId == null && sortedUsers.length) {
    state.draft.myUserId = sortedUsers[0].user_id;
  }
  const userOpts = sortedUsers.map(u => ({
    value: u.user_id,
    label: canonicalOwnerName(u.team_name || u.display_name),
  }));
  controls.appendChild(customSelect(userOpts, state.draft.myUserId, v => {
    state.draft.myUserId = v;
    try { localStorage.setItem(LS_DRAFT_USER, v); } catch {}
    setMyTeam(v);  // doubles as the "claim your team" picker per league
    render();
  }));
  main.appendChild(controls);

  const me = d.users.find(u => u.user_id === state.draft.myUserId);
  const myRoster = d.rosters.find(r => r.owner_id === state.draft.myUserId);
  const myRosterId = myRoster ? myRoster.roster_id : null;
  const myName = me ? canonicalOwnerName(me.team_name || me.display_name) : "—";

  // Draft state badge
  const statusBadge = el("span", {
    class: "draft-pill " + (d.draft.status === "drafting" ? "live"
      : d.draft.status === "complete" ? "done" : "pre"),
  }, d.draft.status === "drafting" ? "LIVE"
    : d.draft.status === "complete" ? "Complete" : "Pre-draft");

  // For each (round, slot), figure out the CURRENT owner:
  // start from slot_to_roster_id; if a traded_pick matches that round + the
  // original roster, current owner = the trade's owner_id (most recent only).
  const tradedByKey = {};  // "round:originalRosterId" -> owner_id (latest)
  (d.traded_picks || []).forEach(t => {
    tradedByKey[t.round + ":" + t.roster_id] = t.owner_id;
  });
  function ownerOfSlot(round, slot) {
    const original = d.draft.slot_to_roster_id[slot];
    if (original == null) return null;
    const traded = tradedByKey[round + ":" + original];
    return traded != null ? traded : original;
  }

  // Compute who is on the clock + my next pick
  const totalPicks = (d.draft.rounds || 3) * 12;
  const madePicks = d.picks.length;
  const nextOverall = madePicks + 1;
  const nextRound = Math.ceil(nextOverall / 12);
  const slotInRound = ((nextOverall - 1) % 12) + 1;
  // Slot in actual draft depends on round (snake vs linear). League is "linear" per data.
  const onClockSlot = slotInRound; // linear
  const onClockRosterId = ownerOfSlot(nextRound, onClockSlot);
  const onClockUser = d.users.find(u => {
    const r = d.rosters.find(rr => rr.roster_id === onClockRosterId);
    return r && u.user_id === r.owner_id;
  });
  const onClockName = onClockUser ? canonicalOwnerName(onClockUser.team_name || onClockUser.display_name) : "—";

  const myUpcomingOveralls = [];
  for (let rd = 1; rd <= (d.draft.rounds || 3); rd++) {
    for (let slot = 1; slot <= 12; slot++) {
      const overall = (rd - 1) * 12 + slot;
      if (overall < nextOverall) continue;
      if (myRosterId != null && ownerOfSlot(rd, slot) === myRosterId) {
        myUpcomingOveralls.push({ rd, slot, overall });
      }
    }
  }
  myUpcomingOveralls.sort((a, b) => a.overall - b.overall);

  // On-the-clock banner if it's the user
  if (d.draft.status !== "complete") {
    const isMine = onClockRosterId === myRosterId;
    const banner = el("div", { class: "on-clock-banner" });
    if (isMine) {
      banner.innerHTML = `🎯 <strong>You're on the clock</strong> — Pick #${nextOverall} ` +
        `(${nextRound}.${String(onClockSlot).padStart(2, "0")})`;
    } else if (myUpcomingOveralls.length) {
      const next = myUpcomingOveralls[0];
      const away = next.overall - nextOverall;
      banner.innerHTML = `On the clock: <strong>${onClockName}</strong> ` +
        `· Pick #${nextOverall} (${nextRound}.${String(onClockSlot).padStart(2, "0")}). ` +
        `Your next: ${next.rd}.${String(next.slot).padStart(2, "0")} (#${next.overall}, ${away} pick${away === 1 ? "" : "s"} away).`;
    } else {
      banner.innerHTML = `On the clock: <strong>${onClockName}</strong>. You have no remaining picks.`;
    }
    main.appendChild(banner);
  }

  // ===== Draft board (Sleeper-style grid) =====
  function teamNameOf(rid) {
    const r = d.rosters.find(x => x.roster_id === rid);
    const u = r && d.users.find(uu => uu.user_id === r.owner_id);
    return u ? canonicalOwnerName(u.team_name || u.display_name) : "—";
  }
  const boardCard = el("div", { class: "card" }, el("h2", {}, "Draft Board"));
  const boardScroll = el("div", { class: "draft-board-scroll" });
  const boardGrid = el("div", { class: "draft-board-grid" });
  // Header row: slot number + the team originally drafting from that slot.
  for (let slot = 1; slot <= 12; slot++) {
    const origRoster = d.draft.slot_to_roster_id[slot];
    boardGrid.appendChild(el("div", { class: "db-head" },
      slot + " · " + (origRoster != null ? teamNameOf(origRoster) : "—")));
  }
  // One row per round; each cell = pick made or current pick owner.
  const pickBySlot = {};
  d.picks.forEach(p => { pickBySlot[p.round + ":" + p.draft_slot] = p; });
  const totalRounds = d.draft.rounds || 3;
  for (let rd = 1; rd <= totalRounds; rd++) {
    for (let slot = 1; slot <= 12; slot++) {
      const overall = (rd - 1) * 12 + slot;
      const pickLabel = rd + "." + String(slot).padStart(2, "0");
      const made = pickBySlot[rd + ":" + slot];
      const currentOwner = ownerOfSlot(rd, slot);
      const isMine = myRosterId != null && currentOwner === myRosterId;
      const isOnClock = d.draft.status !== "complete" && overall === nextOverall;
      if (made) {
        const player = made.player_id ? d.players[made.player_id] : null;
        const pos = player ? player.position : null;
        const cellCls = "db-cell" + (pos ? " db-" + pos.toLowerCase() : "")
          + (made.roster_id === myRosterId ? " db-mine" : "");
        const cell = el("div", { class: cellCls });
        const head = el("div", { class: "db-pickno" }, el("span", {}, pickLabel));
        // Show the picking team when the pick was traded away from the slot's
        // original owner (mirrors Sleeper's board).
        const origRoster = d.draft.slot_to_roster_id[slot];
        if (made.roster_id !== origRoster) {
          head.appendChild(el("span", { class: "db-by" }, teamNameOf(made.roster_id)));
        }
        cell.appendChild(head);
        cell.appendChild(el("div", { class: "db-player" },
          player ? player.name : "Player " + made.player_id));
        boardGrid.appendChild(cell);
      } else {
        const cellCls = "db-cell db-future" + (isMine ? " db-mine" : "") + (isOnClock ? " db-onclock" : "");
        const cell = el("div", { class: cellCls });
        cell.appendChild(el("div", { class: "db-pickno" }, el("span", {}, pickLabel)));
        cell.appendChild(el("div", { class: "db-owner" },
          currentOwner != null ? teamNameOf(currentOwner) : "—"));
        boardGrid.appendChild(cell);
      }
    }
  }
  boardScroll.appendChild(boardGrid);
  boardCard.appendChild(boardScroll);
  boardCard.appendChild(el("div", { class: "pct", style: "margin-top:8px" },
    "Columns are draft slots with the original slot owner; cells show the player taken (colored by position, picker noted when the pick was traded) or, for upcoming picks, whoever currently owns the pick. Your picks are outlined; the green pulse is on the clock."));
  main.appendChild(boardCard);

  // Combined ranking: 70% Flock expert avg rank + 30% KTC rookie rank.
  // Both sources rank rookies 1..N (lower = better). When a rookie is only in
  // one source we use that source's rank as-is.
  const FLOCK_WEIGHT = 0.7;
  const KTC_WEIGHT = 0.3;
  const ktc = (state.draft.ktcLive && state.draft.ktcLive.players) || [];
  const flock = (state.draft.flockLive && state.draft.flockLive.players) || [];
  const ktcByName = {};
  ktc.forEach(p => { ktcByName[p.normName] = p; });
  const flockByName = {};
  flock.forEach(p => { flockByName[p.normName] = p; });

  const pickedIds = new Set(d.picks.map(p => p.player_id).filter(Boolean));
  const rookieByName = {};
  d.rookies.forEach(r => { rookieByName[ktcNorm(r.name)] = r; });

  const allNorms = new Set();
  ktc.forEach(p => allNorms.add(p.normName));
  flock.forEach(p => allNorms.add(p.normName));

  const availablePool = [];
  allNorms.forEach(norm => {
    const sleeperRookie = rookieByName[norm];
    if (!sleeperRookie) return;
    if (pickedIds.has(sleeperRookie.player_id)) return;
    const ktcEntry = ktcByName[norm];
    const flockEntry = flockByName[norm];
    if (!ktcEntry && !flockEntry) return;
    let combinedRank;
    if (ktcEntry && flockEntry) {
      combinedRank = FLOCK_WEIGHT * flockEntry.rookieRank + KTC_WEIGHT * ktcEntry.rookieRank;
    } else if (flockEntry) {
      combinedRank = flockEntry.rookieRank;
    } else {
      combinedRank = ktcEntry.rookieRank;
    }
    // Score (higher = better) so the existing position-need multiplier still
    // boosts top players appropriately.
    const score = 10000 / Math.max(combinedRank, 0.5);
    const meta = flockEntry || ktcEntry;
    availablePool.push({
      name: meta.name,
      normName: norm,
      position: meta.position,
      team: sleeperRookie.team || meta.team,
      player_id: sleeperRookie.player_id,
      value: score,
      combinedRank,
      ktcRank: ktcEntry ? ktcEntry.rookieRank : null,
      flockRank: flockEntry ? flockEntry.rookieRank : null,
    });
  });

  // Position-need calculation. Value each roster's players using KTC superflex
  // dynasty values per position, weighting starters over depth (see
  // decayedPositionalValue), then rank each roster in the league.
  const POS_LIST = ["QB", "RB", "WR", "TE"];
  const dyn = (state.draft.ktcDynasty && state.draft.ktcDynasty.players) || {};
  // Sorted (desc) KTC values per position per roster — the raw material for
  // both the decayed strength score and the draft projection.
  const teamPosValues = {};
  d.rosters.forEach(r => {
    const arrs = { QB: [], RB: [], WR: [], TE: [] };
    (r.players || []).forEach(pid => {
      const pl = d.players[pid];
      if (!pl || !POS_LIST.includes(pl.position)) return;
      const ktcEntry = dyn[ktcNorm(pl.name)];
      arrs[pl.position].push(ktcEntry ? (ktcEntry.value || 0) : 0);
    });
    POS_LIST.forEach(p => arrs[p].sort((a, b) => b - a));
    teamPosValues[r.roster_id] = arrs;
  });
  const teamValues = {};   // roster_id -> { QB: decayedScore, RB:, WR:, TE: }
  d.rosters.forEach(r => {
    teamValues[r.roster_id] = {};
    POS_LIST.forEach(p => { teamValues[r.roster_id][p] = decayedPositionalValue(teamPosValues[r.roster_id][p]); });
  });
  const nTeams = d.rosters.length || 1;

  // Need is defined by LEAGUE RANK at each position (1 = most positional
  // value): anything outside the top 4 is a need, and the boost grows the
  // further outside it falls. A team ranked top 4 everywhere has no needs —
  // every boost stays 1× and the recommendation is pure best-available.
  const NEED_RANK_CUTOFF = 4;
  const myPosRank = {};
  POS_LIST.forEach(p => {
    const sorted = d.rosters.slice().sort((a, b) => teamValues[b.roster_id][p] - teamValues[a.roster_id][p]);
    const idx = myRosterId != null ? sorted.findIndex(r => r.roster_id === myRosterId) : -1;
    myPosRank[p] = idx >= 0 ? idx + 1 : null;
  });
  const posBoost = {};
  POS_LIST.forEach(p => {
    const rank = myPosRank[p];
    if (rank == null || rank <= NEED_RANK_CUTOFF) { posBoost[p] = 1; return; }
    // Rank 5 nudges (~1.06×); last place gets the full 1.20×.
    const sev = (rank - NEED_RANK_CUTOFF) / Math.max(1, nTeams - NEED_RANK_CUTOFF);
    posBoost[p] = 1 + Math.min(0.20, 0.06 + 0.14 * sev);
  });
  const needPositions = POS_LIST.filter(p => posBoost[p] !== 1);

  function scoreFor(p) {
    if (state.draft.posMode) return p.value * (posBoost[p.position] || 1);
    return p.value;
  }
  const recommendations = availablePool.slice().sort((a, b) => scoreFor(b) - scoreFor(a));

  // ===== Left column: Recommendation + Available rookies =====
  const grid = el("div", { class: "draft-grid" });

  const leftCol = el("div", {});
  const recCard = el("div", { class: "card" },
    el("h2", {}, "Recommendation ", statusBadge)
  );

  if (state.draft.flockError) {
    recCard.appendChild(el("div", { class: "pct", style: "color: var(--meh); margin-bottom:8px" },
      "Flock unavailable (" + state.draft.flockError + ") — using KTC only."));
  }

  // Mode toggle (Best Available vs Position-Need)
  const toggle = el("div", { class: "toggle-row" });
  const baBtn = el("button", { class: state.draft.posMode ? "" : "active" }, "Best Available");
  const posBtn = el("button", { class: state.draft.posMode ? "active" : "" }, "Position-Need");
  baBtn.addEventListener("click", () => {
    state.draft.posMode = false;
    try { localStorage.setItem(LS_DRAFT_MODE, "ba"); } catch {}
    render();
  });
  posBtn.addEventListener("click", () => {
    state.draft.posMode = true;
    try { localStorage.setItem(LS_DRAFT_MODE, "pos"); } catch {}
    render();
  });
  toggle.appendChild(baBtn);
  toggle.appendChild(posBtn);
  recCard.appendChild(toggle);

  if (state.draft.posMode) {
    const needLine = el("div", { class: "pct", style: "margin-bottom:10px" });
    if (!state.draft.ktcDynasty) {
      needLine.textContent = "Loading KTC dynasty values for team valuation…";
    } else {
      const ranksTxt = POS_LIST.map(p => `${p} #${myPosRank[p] != null ? myPosRank[p] : "—"}`).join("  ·  ");
      needLine.textContent = "Your league rank by position: " + ranksTxt +
        (needPositions.length
          ? `  —  needs (outside top ${NEED_RANK_CUTOFF}): ${needPositions.join(", ")}`
          : `  —  top ${NEED_RANK_CUTOFF} at every position, taking best available`);
    }
    recCard.appendChild(needLine);
  }

  if (!recommendations.length) {
    recCard.appendChild(el("div", { class: "empty" }, "No KTC-ranked rookies left or KTC live data not loaded."));
  } else {
    recommendations.slice(0, 3).forEach((p, i) => {
      const card = el("div", { class: "rec-card" });
      card.appendChild(el("div", { class: "rec-label" }, i === 0 ? "Top pick" : i === 1 ? "Next option" : "Backup"));
      const playerLine = el("div", { class: "rec-player" }, p.name);
      if (p.position) {
        playerLine.appendChild(el("span", { class: "pos-chip " + positionClass(p.position) }, p.position));
      }
      card.appendChild(playerLine);
      const metaBits = [`Rank ${p.combinedRank.toFixed(1)}`];
      if (p.team) metaBits.push(p.team);
      if (state.draft.posMode && posBoost[p.position] !== 1) {
        metaBits.push(`need boost ×${posBoost[p.position].toFixed(2)}`);
      }
      card.appendChild(el("div", { class: "rec-meta" }, metaBits.join("  ·  ")));
      recCard.appendChild(card);
    });
  }
  leftCol.appendChild(recCard);

  // Top available pool
  const availCard = el("div", { class: "card" }, el("h2", {}, "Top Available Rookies"));
  if (!recommendations.length) {
    availCard.appendChild(el("div", { class: "empty" }, "—"));
  } else {
    recommendations.slice(0, 20).forEach((p, idx) => {
      const row = el("div", { class: "pick-history-row" },
        el("div", { class: "pick-history-slot" }, "#" + (idx + 1)),
        el("div", {},
          p.name,
          p.position ? el("span", { class: "pos-chip " + positionClass(p.position), style: "margin-left:8px" }, p.position) : null,
        ),
        el("div", { class: "pick-history-by" },
          `Rank ${p.combinedRank.toFixed(1)}` + (p.team ? "  ·  " + p.team : ""),
        ),
      );
      availCard.appendChild(row);
    });
  }
  leftCol.appendChild(availCard);

  // ===== Right column: My picks + recent activity + roster =====
  const rightCol = el("div", {});

  const myPicksCard = el("div", { class: "card" }, el("h2", {}, myName + "'s Picks"));
  if (!myUpcomingOveralls.length) {
    myPicksCard.appendChild(el("div", { class: "empty" }, "No upcoming picks."));
  } else {
    myUpcomingOveralls.forEach(p => {
      const away = p.overall - nextOverall;
      myPicksCard.appendChild(el("div", { class: "pick-history-row is-mine" },
        el("div", { class: "pick-history-slot" }, p.rd + "." + String(p.slot).padStart(2, "0")),
        el("div", {}, "Pick #" + p.overall),
        el("div", { class: "pick-history-by" },
          away === 0 ? "On the clock" : (away === 1 ? "Next" : `${away} picks away`)),
      ));
    });
  }
  rightCol.appendChild(myPicksCard);

  // Recent activity (all picks so far, newest first, in a scrollable list)
  const recentCard = el("div", { class: "card" }, el("h2", {}, "Recent Picks"));
  if (!d.picks.length) {
    recentCard.appendChild(el("div", { class: "empty" }, "Draft hasn't started."));
  } else {
    const list = el("div", { style: "max-height: 420px; overflow-y: auto; -webkit-overflow-scrolling: touch;" });
    d.picks.slice().reverse().forEach(p => {
      const player = p.player_id ? d.players[p.player_id] : null;
      const rosterUser = d.users.find(u => {
        const rr = d.rosters.find(r => r.roster_id === p.roster_id);
        return rr && rr.owner_id === u.user_id;
      });
      const isMine = p.roster_id === myRosterId;
      list.appendChild(el("div", { class: "pick-history-row" + (isMine ? " is-mine" : "") },
        el("div", { class: "pick-history-slot" }, p.round + "." + String(p.draft_slot).padStart(2, "0")),
        el("div", {},
          player ? player.name : ("Player " + p.player_id),
          player && player.position
            ? el("span", { class: "pos-chip " + positionClass(player.position), style: "margin-left:8px" }, player.position)
            : null,
        ),
        el("div", { class: "pick-history-by" },
          rosterUser ? canonicalOwnerName(rosterUser.team_name || rosterUser.display_name) : "—"),
      ));
    });
    recentCard.appendChild(list);
  }
  rightCol.appendChild(recentCard);

  // Your roster
  const rosterCard = el("div", { class: "card" }, el("h2", {}, myName + "'s Roster"));
  if (!myRoster || !myRoster.players.length) {
    rosterCard.appendChild(el("div", { class: "empty" }, "No roster found."));
  } else {
    // Per-player position ranks derived from the same KTC value feed we
    // display — sort every KTC player within his position by superflex value
    // and rank 1..N. Self-consistent with the values on the tiles (the feed's
    // own positionalRank field disagreed with its values for some players).
    const derivedPosRank = {};
    {
      const byPosAll = { QB: [], RB: [], WR: [], TE: [] };
      Object.entries(dyn).forEach(([norm, e]) => {
        if (e && byPosAll[e.position]) byPosAll[e.position].push({ norm, value: e.value || 0 });
      });
      Object.values(byPosAll).forEach(arr => {
        arr.sort((a, b) => b.value - a.value);
        arr.forEach((e, i) => { derivedPosRank[e.norm] = i + 1; });
      });
    }
    // League-relative position-group ranks (what KTC's league analyzer shows):
    // the same starter-weighted positional strength used for need, ranked
    // across the league.
    const leagueGroupRank = { QB: null, RB: null, WR: null, TE: null };
    ["QB", "RB", "WR", "TE"].forEach(pos => {
      const sorted = d.rosters.slice().sort((a, b) =>
        teamValues[b.roster_id][pos] - teamValues[a.roster_id][pos]);
      const idx = sorted.findIndex(r => r.roster_id === myRoster.roster_id);
      leagueGroupRank[pos] = idx >= 0 ? idx + 1 : null;
    });
    const byPos = { QB: [], RB: [], WR: [], TE: [] };
    myRoster.players.forEach(pid => {
      const p = d.players[pid];
      if (!p || !byPos[p.position]) return;
      const norm = ktcNorm(p.name);
      const entry = dyn[norm];
      byPos[p.position].push({
        pl: p,
        value: entry ? (entry.value || 0) : 0,
        posRank: derivedPosRank[norm] != null ? derivedPosRank[norm] : null,
      });
    });
    // Fixed column order: QB, RB, WR, TE. Players sorted by value within each.
    const cols = ["QB", "RB", "WR", "TE"]
      .map(pos => {
        const items = byPos[pos].sort((a, b) => b.value - a.value);
        return { pos, items, total: items.reduce((s, x) => s + x.value, 0) };
      })
      .filter(c => c.items.length);
    const posGrid = el("div", { class: "roster-pos-grid" });
    cols.forEach(({ pos, items, total }) => {
      const col = el("div", { class: "roster-pos-col" });
      col.appendChild(el("div", { class: "roster-pos-head" },
        el("span", { class: "pos-chip " + positionClass(pos) }, pos),
        el("span", { class: "pct" },
          leagueGroupRank[pos] != null ? "#" + leagueGroupRank[pos] : ""),
      ));
      items.forEach(({ pl, value, posRank }) => {
        // Split into first / last so the tile stays narrow: first word is the
        // first name, everything after is the surname (handles "St. Brown").
        const parts = pl.name.split(" ");
        const first = parts[0];
        const last = parts.slice(1).join(" ") || "";
        const tile = el("div", {
          class: "player-tile pt-" + pos.toLowerCase() + (pl.rookie ? " is-rookie" : ""),
        });
        tile.appendChild(el("div", { class: "pt-meta" },
          el("span", {}, posRank != null ? pos + posRank : "—"),
          el("span", {}, value ? value.toLocaleString() : ""),
        ));
        tile.appendChild(el("div", { class: "pt-first" }, first));
        tile.appendChild(el("div", { class: "pt-last" }, last || " "));
        col.appendChild(tile);
      });
      posGrid.appendChild(col);
    });
    rosterCard.appendChild(posGrid);
  }
  rightCol.appendChild(rosterCard);

  grid.appendChild(leftCol);
  grid.appendChild(rightCol);
  main.appendChild(grid);

  // ===== Projected Draft (full-width below the grid) =====
  const projCard = el("div", { class: "card", style: "margin-top:16px" },
    el("h2", {}, "Projected Draft Order"),
    el("div", { class: "pct", style: "margin-bottom:10px" },
      "Simulated by running the same Best-Available + Position-Need algorithm " +
      "for every team in pick order. Your projected picks are highlighted."
    ),
  );

  // Build the projection by iterating through remaining picks. Clone the
  // sorted per-position value arrays so the decayed strength stays correct as
  // the simulation inserts each drafted player.
  const projArrays = {};
  Object.entries(teamPosValues).forEach(([rid, a]) => {
    projArrays[rid] = { QB: a.QB.slice(), RB: a.RB.slice(), WR: a.WR.slice(), TE: a.TE.slice() };
  });
  const remaining = availablePool.slice();

  // Same rank-based need as the recommendation: outside the top 4 at a
  // position = need. Decayed strength recomputes from projArrays, so ranks
  // shift as the simulation hands out players.
  function boostForRoster(rid) {
    const boost = {};
    const rosterIds = Object.keys(projArrays);
    POS_LIST.forEach(p => {
      const scoreOf = id => decayedPositionalValue(projArrays[id][p] || []);
      const myScore = scoreOf(rid);
      const rank = rosterIds.reduce((n, id) => n + (scoreOf(id) > myScore ? 1 : 0), 1);
      if (rank <= NEED_RANK_CUTOFF) { boost[p] = 1; return; }
      const sev = (rank - NEED_RANK_CUTOFF) / Math.max(1, rosterIds.length - NEED_RANK_CUTOFF);
      boost[p] = 1 + Math.min(0.20, 0.06 + 0.14 * sev);
    });
    return boost;
  }

  const projection = [];
  for (let overall = nextOverall; overall <= totalPicks; overall++) {
    if (!remaining.length) break;
    const round = Math.ceil(overall / 12);
    const slot = ((overall - 1) % 12) + 1;
    const rosterId = ownerOfSlot(round, slot);
    if (rosterId == null) continue;
    const boost = boostForRoster(rosterId);
    let bestIdx = -1, bestScore = -Infinity;
    for (let i = 0; i < remaining.length; i++) {
      const p = remaining[i];
      const score = p.value * (boost[p.position] || 1);
      if (score > bestScore) { bestScore = score; bestIdx = i; }
    }
    if (bestIdx < 0) break;
    const pick = remaining.splice(bestIdx, 1)[0];
    if (!projArrays[rosterId]) projArrays[rosterId] = { QB: [], RB: [], WR: [], TE: [] };
    const arr = projArrays[rosterId][pick.position] || (projArrays[rosterId][pick.position] = []);
    // Insert the drafted rookie's real KTC dynasty value (same scale as the
    // roster arrays) into the sorted (desc) array so decayed strength updates
    // correctly; fall back to the rank-based score if KTC has no value yet.
    const dynEntry = dyn[ktcNorm(pick.name)];
    const insVal = dynEntry && dynEntry.value ? dynEntry.value : pick.value;
    let ins = arr.findIndex(v => v < insVal);
    if (ins < 0) ins = arr.length;
    arr.splice(ins, 0, insVal);
    projection.push({ overall, round, slot, rosterId, player: pick });
  }

  if (!projection.length) {
    projCard.appendChild(el("div", { class: "empty" }, "Draft is complete or no KTC-ranked rookies remain."));
  } else {
    const seenRounds = new Set();
    projection.forEach(p => {
      if (!seenRounds.has(p.round)) {
        seenRounds.add(p.round);
        projCard.appendChild(el("div", { class: "round-header" }, "Round " + p.round));
      }
      const team = d.users.find(u => {
        const rr = d.rosters.find(r => r.roster_id === p.rosterId);
        return rr && rr.owner_id === u.user_id;
      });
      const teamName = team ? canonicalOwnerName(team.team_name || team.display_name) : "—";
      const isMine = p.rosterId === myRosterId;
      projCard.appendChild(el("div", { class: "pick-history-row" + (isMine ? " is-mine" : "") },
        el("div", { class: "pick-history-slot" }, `${p.round}.${String(p.slot).padStart(2, "0")}`),
        el("div", {},
          p.player.name,
          el("span", { class: "pos-chip " + positionClass(p.player.position), style: "margin-left:8px" }, p.player.position),
          el("span", { class: "pct", style: "margin-left:8px" }, "Rank " + p.player.combinedRank.toFixed(1)),
        ),
        el("div", { class: "pick-history-by" }, teamName),
      ));
    });
  }
  main.appendChild(projCard);
}

function setActiveTab(view) {
  // The tabs nav is dynamic; just rebuild it so the active state reflects state.view.
  rebuildTabsNav();
}

function render() {
  // Live draft polling toggles with the tab.
  if (state.workspace === "team" && state.view === "liveDraft") {
    if (!state.draft.data && !state.draft.loading) loadDraftLive();
    startDraftPolling();
  } else {
    stopDraftPolling();
  }

  if (state.workspace === "team" && state.view === "liveDraft") {
    renderDraftWorkspace();
    return;
  }

  // Drafts workspace requires picks data: the sheet at home, auto-graded
  // Sleeper+KTC picks elsewhere. Trades / History run off Sleeper directly.
  const PICK_VIEWS = new Set(["overview", "leaderboard", "stats", "year", "person"]);
  if (state.workspace === "drafts" && PICK_VIEWS.has(state.view) && !state.picks.length) {
    if (!IS_DEFAULT_LEAGUE) {
      ensureSleeperLoaded();
      ensureKtcDynastyLoaded();
      ensureTradeHistoryLoaded();
      buildAutoPicks();
    }
    if (!state.picks.length) {
      document.getElementById("main").innerHTML = IS_DEFAULT_LEAGUE
        ? '<div class="empty">No draft data available.</div>'
        : '<div class="empty">Grading league draft history from KTC values…</div>';
      return;
    }
  }

  switch (state.view) {
    // Drafts workspace
    case "year": renderYearView(); break;
    case "person": renderPersonView(); break;
    case "leaderboard": renderLeaderboard(); break;
    case "stats": renderStats(); break;
    case "trades": renderTrades(); break;
    case "history": renderHistory(); break;
    case "insights": renderInsights(); break;
    case "feedback": renderTradeFeedback(); break;
    case "overview": renderOverview(); break;
    // Team workspace
    case "teams": renderTeams(); break;
    case "lineup": renderLineup(); break;
    case "waivers": renderWaivers(); break;
    case "allPlayers": renderAllPlayers(); break;
    // Drilldowns reachable from Drafters / Teams
    case "rankings": renderRankings(); break;
    case "rosters": renderRosters(); break;
    default: renderOverview();
  }
}

function setStatus(kind, text) {
  const dot = document.getElementById("statusDot");
  const txt = document.getElementById("statusText");
  dot.className = "status-dot" + (kind === "loading" ? " loading" : kind === "error" ? " error" : "");
  txt.textContent = text;
}

// Auto-graded rookie-draft picks for leagues without a hand-graded sheet.
// Calibrated against the home league's 205 hand grades (2020-2025): the model
// below agrees with them 78.5% of the time, with almost no false Hits on
// hand-graded Misses. Remaining disagreements are production-vs-market
// judgment calls (e.g. Najee Harris: produced for years, value never popped).
//
// Grade value = geometric mean of (a) the player's peak KTC value measured at
// least a YEAR after the draft — early peaks are just rookie hype echoing the
// pick's cost — and (b) his current value. A pick must have both become good
// and stayed relevant; year-2 hype mirages (Trey Lance, Zach Wilson) and
// pure draft capital fade out, while aged-out hits keep peak credit.
//
// The bar also scales with draft capital: an early first has to become a
// stud, a late third only a useful asset. Picks from drafts less than
// ~a season old stay Pending; their value is still mostly draft capital.
const AUTO_HIT_FLOOR = 4750;
const AUTO_MEH_FLOOR = 3400;
const AUTO_HIT_MULT = 1.1;
const AUTO_MEH_MULT = 0.7;
const AUTO_PENDING_MS = 350 * 24 * 60 * 60 * 1000;
const AUTO_HYPE_MS = 365 * 24 * 60 * 60 * 1000;  // ignore peaks within a year of the draft

// Rough KTC cost of a rookie slot (12-team-equivalent, linear within round).
function autoSlotExpectation(round, pickInRound, nTeams) {
  const frac = nTeams > 1 ? (pickInRound - 1) / (nTeams - 1) : 0;  // 0 = first pick of round
  if (round === 1) return 6800 - 2600 * frac;   // 1.01 ≈ 6800 → 1.12 ≈ 4200
  if (round === 2) return 3400 - 1000 * frac;   // 2.01 ≈ 3400 → 2.12 ≈ 2400
  if (round === 3) return 2000 - 500 * frac;    // 3.01 ≈ 2000 → 3.12 ≈ 1500
  return 1200;
}
function autoGradeThresholds(round, pickInRound, nTeams) {
  const exp = autoSlotExpectation(round, pickInRound, nTeams);
  return {
    hit: Math.max(AUTO_HIT_FLOOR, Math.round(AUTO_HIT_MULT * exp)),
    meh: Math.max(AUTO_MEH_FLOOR, Math.round(AUTO_MEH_MULT * exp)),
  };
}

function buildAutoPicks() {
  if (IS_DEFAULT_LEAGUE) return;
  if (!state.sleeper || !state.ktcDynasty) return;
  const useHistory = !!state.tradeHistory;
  // Rebuild once the historical snapshots arrive so grades upgrade to peak.
  if (state.picks.length && state.autoPicksUsedHistory === useHistory) return;

  const ktc = state.ktcDynasty.players || {};
  const snaps = useHistory ? (state.tradeHistory.snapshots || []) : [];
  function currentValue(name) {
    const e = ktc[ktcNormalizeName(name)];
    return (e && e.value) || 0;
  }
  function peakValueAfter(name, afterMs) {
    const norm = ktcNormalizeName(name);
    let v = currentValue(name);
    snaps.forEach(s => {
      if (s.timestamp_ms != null && s.timestamp_ms < afterMs) return;
      const sv = s.players && s.players[norm];
      if (typeof sv === "number" && sv > v) v = sv;
    });
    return v;
  }
  // See the calibration note above AUTO_HIT_FLOOR.
  function gradeValue(name, draftCreated) {
    const peak = peakValueAfter(name, (draftCreated || 0) + AUTO_HYPE_MS);
    return Math.sqrt(peak * Math.max(currentValue(name), 1));
  }

  const picks = [];
  const seasons = state.sleeper.seasons;
  // Group drafts by the DRAFT's season, not the league's — Sleeper can attach
  // next year's rookie draft to the current league before renewal. A year can
  // also hold several drafts (vet drafts, supplemental rounds); the real
  // rookie draft is the one whose first round carries the most total peak
  // value (Burrow/Caleb/Jeanty classes dwarf vet-scrub boards).
  function draftQuality(d) {
    let s = 0;
    d.picks.forEach(p => {
      if (p.round !== 1 || !p.player_id) return;
      const pl = state.sleeper.players[p.player_id];
      if (pl) s += peakValueAfter(pl.name, 0);
    });
    return s;
  }
  const firstSeason = seasons[0] && seasons[0].season;
  const byYear = {};  // draft season → { draft, sd, q }
  seasons.forEach(sd => {
    (sd.drafts || []).forEach(d => {
      if (!d.picks || !d.picks.length) return;
      const yr = d.season || sd.season;
      if (yr === firstSeason) return;       // startup year
      if ((d.rounds || 0) > 6) return;      // startup-sized draft
      const q = draftQuality(d);
      const cur = byYear[yr];
      if (!cur || q > cur.q) byYear[yr] = { draft: d, sd, q };
    });
  });
  Object.keys(byYear).sort().forEach(yr => {
    const { draft, sd } = byYear[yr];
    const nTeams = sd.rosters.length || 12;
    const pending = draft.created && (Date.now() - draft.created) < AUTO_PENDING_MS;
    draft.picks.forEach(p => {
      if (!p.player_id) return;
      const pl = state.sleeper.players[p.player_id];
      if (!pl) return;
      const pickInRound = p.pick_no - (p.round - 1) * nTeams;
      let result = null;  // null renders as Pending
      if (!pending) {
        const v = gradeValue(pl.name, draft.created);
        const t = autoGradeThresholds(p.round, pickInRound, nTeams);
        result = v >= t.hit ? "Hit" : v >= t.meh ? "Meh" : "Miss";
      }
      let owner = null;
      const u = p.picked_by ? sd.users.find(x => x.user_id === p.picked_by) : null;
      if (u) owner = canonicalOwnerName(userDisplay(u));
      else {
        const ru = rosterToOwner(sd, p.roster_id);
        if (ru) owner = canonicalOwnerName(userDisplay(ru));
      }
      if (!owner) return;
      picks.push({
        year: parseInt(yr, 10),
        round: p.round,
        pickInRound,
        slot: p.round + "." + String(pickInRound).padStart(2, "0"),
        person: owner,
        player: pl.name,
        result,
        color: null,
        pos: ["QB", "RB", "WR", "TE"].includes(pl.position) ? pl.position : null,
      });
    });
  });

  state.picks = picks;
  state.years = uniqueSorted(picks.map(p => p.year));
  const mine = myTeamName();
  state.people = uniqueSorted(picks.map(p => p.person))
    .sort((a, b) => {
      if (mine != null) {
        if (a === mine && b !== mine) return -1;
        if (b === mine && a !== mine) return 1;
      }
      return a.localeCompare(b);
    });
  state.autoPicksUsedHistory = useHistory;
}

async function loadData() {
  // Non-default leagues have no Google Sheet; the rookie-draft analytics are
  // auto-graded from Sleeper drafts + KTC values instead.
  if (!IS_DEFAULT_LEAGUE) {
    ensureSleeperLoaded();
    ensureKtcDynastyLoaded();
    ensureTradeHistoryLoaded();
    buildAutoPicks();
    state.lastUpdated = new Date();
    setStatus("ok", "Updated " + state.lastUpdated.toLocaleTimeString());
    render();
    return;
  }
  setStatus("loading", "Refreshing…");
  try {
    const res = await fetch("/api/sheet?_=" + Date.now(), { cache: "no-store" });
    if (!res.ok) {
      const detail = await res.text();
      throw new Error("API " + res.status + ": " + detail.slice(0, 120));
    }
    const data = await res.json();
    if (!data.rows) throw new Error("malformed response");
    const picks = extractPicks(data.rows);
    state.picks = picks;
    state.years = uniqueSorted(picks.map(p => p.year));
    state.people = uniqueSorted(picks.map(p => p.person))
      .sort((a, b) => {
        if (a === "Henry" && b !== "Henry") return -1;
        if (b === "Henry" && a !== "Henry") return 1;
        return a.localeCompare(b);
      });
    state.lastUpdated = new Date();
    setStatus("ok", "Updated " + state.lastUpdated.toLocaleTimeString());
    render();
  } catch (e) {
    console.error(e);
    setStatus("error", "Failed: " + e.message);
  }
}

document.querySelectorAll(".ws-btn").forEach(b => {
  b.addEventListener("click", () => setWorkspace(b.dataset.ws));
});
// Non-default leagues have no rookie-draft sheet, so the workspace is just
// league-wide Sleeper views.
if (!IS_DEFAULT_LEAGUE) {
  const draftsBtn = document.querySelector('.ws-btn[data-ws="drafts"]');
  if (draftsBtn) draftsBtn.textContent = "League";
}
document.getElementById("refreshBtn").addEventListener("click", () => {
  if (state.workspace === "team" && state.view === "liveDraft") loadDraftLive();
  else loadData();
});
function openLeaguePage() {
  // Don't stack overlays if the page is already open.
  const existing = document.querySelector(".league-page");
  if (existing) { existing.querySelector(".lp-input")?.focus(); return; }
  const prevFocus = document.activeElement;
  const close = () => {
    overlay.remove();
    document.removeEventListener("keydown", onKey);
    if (prevFocus && typeof prevFocus.focus === "function") prevFocus.focus();
  };
  const onKey = e => {
    if (e.key === "Escape") close();
    else if (e.key === "Enter" && document.activeElement === input) submit();
  };

  const errorEl = el("p", { class: "lp-error" });
  const input = el("input", {
    class: "lp-input",
    type: "text",
    inputmode: "numeric",
    placeholder: "e.g. 1312076332460425216",
    value: IS_DEFAULT_LEAGUE ? "" : LEAGUE_ID,
    oninput: () => { errorEl.textContent = ""; },
  });

  function submit() {
    const id = input.value.trim();
    if (!id) {
      if (!IS_DEFAULT_LEAGUE) location.href = location.pathname;
      else { errorEl.textContent = "Enter a league ID, or close to stay here."; input.focus(); }
      return;
    }
    if (!/^\d{10,20}$/.test(id)) {
      errorEl.textContent = "That doesn't look like a Sleeper league ID (it's a long number).";
      input.focus();
      return;
    }
    if (id !== LEAGUE_ID) location.href = location.pathname + "?league=" + id;
    else close();
  }

  const actions = el("div", { class: "lp-actions" },
    el("button", { class: "lp-btn lp-btn-primary", type: "button", onclick: submit }, "View league"),
    !IS_DEFAULT_LEAGUE && el("button", {
      class: "lp-btn lp-btn-ghost",
      type: "button",
      onclick: () => { location.href = location.pathname; },
    }, "Back to home league"),
    el("button", { class: "lp-btn lp-btn-link", type: "button", onclick: close }, "Cancel"),
  );

  const card = el("div", {
    class: "league-page-card",
    role: "dialog",
    "aria-modal": "true",
    "aria-labelledby": "lp-title",
  },
    el("p", { class: "league-page-brand" }, "🏈 Dynasty Sidekick"),
    el("h2", { id: "lp-title" }, "Change league"),
    el("p", { class: "lp-sub" }, "Enter a Sleeper league ID to view its drafts and teams. Leave it blank and choose “Back to home league” to return to the default league."),
    el("label", { class: "lp-label", for: "lp-league-input" }, "Sleeper league ID"),
    input,
    el("p", { class: "lp-hint" }, "Find it in your Sleeper league URL — it's the long number after /leagues/."),
    errorEl,
    actions,
  );
  input.id = "lp-league-input";

  const overlay = el("div", {
    class: "league-page",
    onclick: e => { if (e.target === overlay) close(); },
  }, card);
  document.addEventListener("keydown", onKey);
  document.body.appendChild(overlay);
  input.focus();
}

document.getElementById("leagueBtn").addEventListener("click", openLeaguePage);

// Initial bootstrap
setWorkspace(state.workspace);
loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
