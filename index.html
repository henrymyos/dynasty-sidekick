function buildTierLegendCard() {
  // Collapsed by default: a slim card whose summary row expands into the full
  // star chart + glossary.
  const legendCard = el("div", { class: "card" });
  // Persist the expanded/collapsed state across re-renders (data loads and
  // filter clicks rebuild the DOM, which would otherwise snap it closed).
  const outer = el("details", {});
  let legendOpen = false;
  try { legendOpen = localStorage.getItem("dp.legendOpen") === "1"; } catch {}
  if (legendOpen) outer.setAttribute("open", "");
  outer.addEventListener("toggle", () => {
    try { localStorage.setItem("dp.legendOpen", outer.open ? "1" : "0"); } catch {}
  });
  outer.appendChild(el("summary", {
    style: "cursor:pointer; font-size: 15px; font-weight: 600; color: var(--text); user-select: none;",
  }, "Player Category Information"));
  const body = el("div", { style: "margin-top: 12px" });
  body.appendChild(el("div", { class: "pct", style: "margin-bottom:10px" },
    "Categories assigned daily from each player's KTC superflex dynasty value crossed with his age band on the position curve " +
    "(backup QBs demote to upside tiers; picks classified by value alone). " +
    "Star ratings follow the Dynasty Domain chart: Production Upside = how much they score now; Value Increase Upside = how much their trade value can still grow."
  ));
  function stars(n) {
    if (!n) return el("span", { class: "pct" }, "—");
    return el("span", { class: "star-row" }, "★".repeat(n));
  }
  const chartTable = el("table", {},
    el("thead", {}, el("tr", {},
      el("th", {}, "Player Category"),
      el("th", {}, "Production Upside"),
      el("th", {}, "Value Increase Upside"),
    )),
  );
  const chartBody = el("tbody", {});
  TIER_LEGEND_ORDER.forEach(label => {
    const info = DD_TIER_INFO[label];
    if (!info) return;
    chartBody.appendChild(el("tr", {},
      el("td", {}, el("span", { class: "auto-grade-chip " + info.chip }, label)),
      el("td", {}, stars(info.prod)),
      el("td", {}, stars(info.value)),
    ));
  });
  chartTable.appendChild(chartBody);
  body.appendChild(chartTable);

  // Descriptions under the chart (always visible once expanded).
  const legendGrid = el("div", { class: "tier-legend", style: "margin-top: 14px" });
  TIER_LEGEND_ORDER.forEach(label => {
    const info = DD_TIER_INFO[label] || { chip: "" };
    const card = el("div", { class: "tier-card" });
    card.appendChild(el("div", { class: "tier-head" },
      el("span", { class: "auto-grade-chip " + info.chip }, label)));
    card.appendChild(el("div", { class: "tier-desc" }, TIER_LEGEND_DESC[label] || ""));
    legendGrid.appendChild(card);
  });
  body.appendChild(legendGrid);

  outer.appendChild(body);
  legendCard.appendChild(outer);
  return legendCard;
}

function renderRosters() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();
  ensureKtcDynastyLoaded();
  ensureFlockLoaded();
  ensureLineupDataLoaded();  // powers the projection override for old players

  if (!state.sleeper) {
    main.appendChild(el("div", { class: "empty" },
      state.sleeperError ? "Sleeper error: " + state.sleeperError : "Loading Sleeper data…"));
    return;
  }
  if (!state.ktcDynasty) {
    main.appendChild(el("div", { class: "empty" },
      state.ktcDynastyError ? "KTC error: " + state.ktcDynastyError : "Loading current KTC values…"));
    return;
  }

  const latestSeason = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  const ktcRaw = state.ktcDynasty.players || {};
  const ktcPlayers = {};
  Object.entries(ktcRaw).forEach(([n, e]) => { ktcPlayers[n] = e && e.value ? e.value : 0; });
  const ktcPicks = state.ktcDynasty.picks || {};
  const flockByName = {};
  ((state.flockLive && state.flockLive.allPlayers) || []).forEach(p => {
    flockByName[p.normName] = p.flockValue;
  });
  const tradedPicks = state.sleeper.traded_picks || [];

  // ---------- Team selector ----------
  const users = sortUsersHenryFirst(latestSeason.users);
  if (state.rosterTeam == null && users.length) state.rosterTeam = users[0].user_id;
  const opts = users.map(u => ({ value: u.user_id, label: canonicalOwnerName(userDisplay(u)) }));
  const controls = el("div", { class: "controls" });
  controls.appendChild(customSelect(opts, state.rosterTeam, v => {
    state.rosterTeam = v;
    render();
  }));
  main.appendChild(controls);

  const selectedUser = users.find(u => u.user_id === state.rosterTeam);
  const selectedRoster = latestSeason.rosters.find(r => r.owner_id === state.rosterTeam);
  if (!selectedRoster) {
    main.appendChild(el("div", { class: "empty" }, "Roster not found."));
    return;
  }
  const selectedName = canonicalOwnerName(userDisplay(selectedUser));

  // ---------- Pick ownership map ----------
  const currentRookieDraft = (latestSeason.drafts || []).find(
    d => d.rounds === 3 && (d.status === "pre_draft" || d.status === "drafting" || d.status === "complete")
  ) || (latestSeason.drafts || [])[0];  // other leagues: any draft shape
  const slotMap = currentRookieDraft ? currentRookieDraft.slot_to_roster_id || {} : {};
  const currentYear = parseInt(latestSeason.season, 10);
  // Future-pick tier projection from current contender ranks (strong lineup
  // → late pick, weak → early), mirroring computeManagerRankings.
  const mgrRankedForTiers = computeManagerRankings() || [];
  const conRankForTiers = {};
  mgrRankedForTiers.forEach(r => { conRankForTiers[r.roster_id] = r.cRank; });
  const nTeamsForTiers = mgrRankedForTiers.length || 12;
  function tierFor(season, originalRosterId) {
    if (season !== currentYear) {
      const rank = conRankForTiers[originalRosterId];
      if (rank == null) return "mid";
      if (rank <= nTeamsForTiers / 3) return "late";
      if (rank <= (2 * nTeamsForTiers) / 3) return "mid";
      return "early";
    }
    const entry = Object.entries(slotMap).find(([, r]) => r === originalRosterId);
    if (!entry) return "mid";
    const slot = parseInt(entry[0], 10);
    if (slot <= 4) return "early";
    if (slot <= 8) return "mid";
    return "late";
  }
  const FUTURE_YEARS = [currentYear, currentYear + 1, currentYear + 2];
  const ROUNDS = [1, 2, 3];
  // Picks whose draft has already been held are spent — they've turned into the
  // players now sitting on rosters, so they must not show up as tradeable
  // assets. Keyed "season|round" from every completed draft.
  const usedPickKeys = new Set();
  (state.sleeper.seasons || []).forEach(s => {
    (s.drafts || []).forEach(d => {
      if (d.status !== "complete" || !d.picks || !d.picks.length) return;
      const dSeason = parseInt(d.season, 10);
      for (let r = 1; r <= (d.rounds || 0); r++) usedPickKeys.add(dSeason + "|" + r);
    });
  });
  function picksOwnedBy(rosterId) {
    const out = [];
    FUTURE_YEARS.forEach(season => {
      ROUNDS.forEach(round => {
        if (usedPickKeys.has(season + "|" + round)) return;  // already drafted
        const trades = tradedPicks.filter(t => parseInt(t.season, 10) === season && t.round === round);
        const tradedMap = new Map();
        trades.forEach(t => tradedMap.set(t.roster_id, t.owner_id));
        latestSeason.rosters.forEach(orig => {
          const currentOwner = tradedMap.has(orig.roster_id) ? tradedMap.get(orig.roster_id) : orig.roster_id;
          if (currentOwner !== rosterId) return;
          const tier = tierFor(season, orig.roster_id);
          const ktc = ktcPicks[`${season}|${tier}|${round}`] || 0;
          const tierCap = tier.charAt(0).toUpperCase() + tier.slice(1);
          const ord = round === 1 ? "st" : round === 2 ? "nd" : "rd";
          out.push({
            kind: "pick",
            id: `pick:${season}:${round}:${orig.roster_id}`,
            name: `${season} ${tierCap} ${round}${ord}`,
            position: "PICK",
            age: null,
            ktc, flock: 0,
            value: ktc,
            tier: classifyAsset(ktc, "PICK", null),
            season, round,
          });
        });
      });
    });
    return out.sort((a, b) => b.value - a.value);
  }

  function enrichPlayer(pid) {
    const p = state.sleeper.players[pid];
    if (!p) return null;
    const norm = ktcNormalizeName(p.name);
    const ktc = ktcPlayers[norm] || 0;
    const flock = flockByName[norm] || 0;
    // Weighted blend: 70% Flock expert avg, 30% KTC.
    const blended = ktc && flock ? (0.7 * flock + 0.3 * ktc) : (ktc || flock);
    return {
      kind: "player",
      id: pid,
      name: p.name,
      position: p.position,
      age: p.age,
      ktc, flock,
      value: blended,
      tier: classifyAsset(ktc, p.position, p.age, pid),
    };
  }
  function assetsForRoster(rosterId) {
    const roster = latestSeason.rosters.find(r => r.roster_id === rosterId);
    if (!roster) return [];
    const players = (roster.players || []).map(enrichPlayer).filter(Boolean);
    return players.concat(picksOwnedBy(rosterId));
  }

  // ---------- Positional need ----------
  const POS = ["QB", "RB", "WR", "TE"];
  const valueByPosByRoster = {};
  latestSeason.rosters.forEach(r => {
    const byPos = { QB: 0, RB: 0, WR: 0, TE: 0 };
    (r.players || []).forEach(pid => {
      const p = state.sleeper.players[pid];
      if (!p || !POS.includes(p.position)) return;
      byPos[p.position] += ktcPlayers[ktcNormalizeName(p.name)] || 0;
    });
    valueByPosByRoster[r.roster_id] = byPos;
  });
  const leagueAvgByPos = { QB: 0, RB: 0, WR: 0, TE: 0 };
  Object.values(valueByPosByRoster).forEach(b => POS.forEach(p => leagueAvgByPos[p] += b[p]));
  POS.forEach(p => leagueAvgByPos[p] /= latestSeason.rosters.length || 1);
  function isWeakAt(rosterId, position) {
    return valueByPosByRoster[rosterId][position] < leagueAvgByPos[position] * 0.85;
  }

  // Starter-need fallback: for a roster with no positions below 85% of league
  // avg, find the position whose top starter(s) rank lowest in the league —
  // i.e. the weakest spot of their starting lineup. Used to relax the
  // "must fill a weak position" constraint when nothing is truly weak.
  // Returns a Set of positions to prioritize for incoming assets.
  const STARTING_SLOT_COUNT = { QB: 2, RB: 3, WR: 4, TE: 1 };  // approx for SF
  const starterValByPosByRoster = {};
  latestSeason.rosters.forEach(r => {
    const byPos = { QB: [], RB: [], WR: [], TE: [] };
    (r.players || []).forEach(pid => {
      const p = state.sleeper.players[pid];
      if (!p || !POS.includes(p.position)) return;
      const v = ktcPlayers[ktcNormalizeName(p.name)] || 0;
      byPos[p.position].push(v);
    });
    const starters = { QB: 0, RB: 0, WR: 0, TE: 0 };
    POS.forEach(pos => {
      const sorted = byPos[pos].slice().sort((a, b) => b - a);
      const n = STARTING_SLOT_COUNT[pos];
      starters[pos] = sorted.slice(0, n).reduce((a, b) => a + b, 0);
    });
    starterValByPosByRoster[r.roster_id] = starters;
  });
  // Per-position starter-value rank across all rosters (1 = best, n = worst).
  const starterRankByPos = { QB: {}, RB: {}, WR: {}, TE: {} };
  POS.forEach(pos => {
    const sorted = latestSeason.rosters
      .slice()
      .sort((a, b) => starterValByPosByRoster[b.roster_id][pos] - starterValByPosByRoster[a.roster_id][pos]);
    sorted.forEach((r, i) => { starterRankByPos[pos][r.roster_id] = i + 1; });
  });
  function weakestStarterPositions(rosterId) {
    // Find the 1-2 positions where this roster's starter value ranks worst.
    const ranked = POS.map(pos => ({ pos, rank: starterRankByPos[pos][rosterId] }))
      .sort((a, b) => b.rank - a.rank);
    return new Set(ranked.slice(0, 2).map(r => r.pos));
  }
  // Effective need set for a roster: real weaknesses if any, else weakest starter positions.
  function needSetFor(rosterId) {
    const realWeak = POS.filter(p => isWeakAt(rosterId, p));
    if (realWeak.length) return new Set(realWeak);
    return weakestStarterPositions(rosterId);
  }

  const myAssets = assetsForRoster(selectedRoster.roster_id);

  main.appendChild(buildTierLegendCard());

  // ===== Roster card =====
  const rosterCard = el("div", { class: "card" }, el("h2", {}, selectedName + " — Roster"));
  const TIER_ORDER = [
    "Cornerstone", "Foundational", "Upside Premier", "Mainstay",
    "Productive Vet", "Short Term League Winner",
    "Upside Shot", "Short Term Production", "Serviceable",
    "Jag - Insurance", "Jag - Developmental", "Replaceable",
  ];
  const counts = {};
  TIER_ORDER.forEach(t => { counts[t] = 0; });
  myAssets.forEach(a => { if (a.tier && counts[a.tier.label] != null) counts[a.tier.label]++; });

  // League-wide asset pool (every roster's players + picks) with owners, so the
  // lede can show "N of TOTAL" and the breakdown modal can list every player in
  // a category and who owns them.
  const leaguePool = [];
  latestSeason.rosters.forEach(r => {
    const u = latestSeason.users.find(x => x.user_id === r.owner_id);
    const owner = u ? canonicalOwnerName(userDisplay(u)) : "—";
    assetsForRoster(r.roster_id).forEach(a => leaguePool.push(Object.assign({ owner }, a)));
  });

  // League-wide total per individual tier, for the "N of TOTAL" header.
  const leagueTierTotals = {};
  TIER_ORDER.forEach(t => { leagueTierTotals[t] = 0; });
  leaguePool.forEach(a => { if (a.tier && leagueTierTotals[a.tier.label] != null) leagueTierTotals[a.tier.label]++; });

  // Modal: every league-wide player in a single tier, best value first, each
  // row showing the player, value, and owner. The selected roster's own
  // players are highlighted.
  function showCategoryModal(tier) {
    const inTier = leaguePool
      .filter(a => a.tier && a.tier.label === tier)
      .sort((a, b) => (b.value || 0) - (a.value || 0));
    const body = el("div", {});
    inTier.forEach(a => {
      const nameLine = el("div", { style: "display:flex;align-items:center;gap:8px;flex:1;min-width:0" },
        el("span", { class: "mr-name" }, a.name),
      );
      if (a.position && a.position !== "PICK") {
        nameLine.appendChild(el("span", { class: "pos-chip " + positionClass(a.position) }, a.position));
      }
      if (a.ktc) nameLine.appendChild(el("span", { class: "mr-val" }, "KTC " + a.ktc.toLocaleString()));
      body.appendChild(el("div", { class: "modal-row" + (a.owner === selectedName ? " is-mine" : "") },
        nameLine,
        el("span", { class: "mr-owner" }, a.owner),
      ));
    });
    if (!inTier.length) body.appendChild(el("div", { class: "empty" }, "No players in this category."));
    openModal(tier + " — " + inTier.length + " league-wide", body);
  }

  // One section per category: a clickable "Tier (mine of total)" header — shown
  // even when this roster has none, so you can see how many exist league-wide —
  // followed by this roster's assets in that tier.
  TIER_ORDER.forEach(tier => {
    const total = leagueTierTotals[tier];
    if (!total) return;  // category nobody in the league has at all
    const mine = counts[tier];
    const tierAssets = myAssets.filter(a => a.tier.label === tier).sort((a, b) => b.value - a.value);
    const header = el("div", {
      class: "round-header clickable" + (mine ? "" : " empty-cat"),
      title: "See all " + tier + " players in the league",
      onclick: () => showCategoryModal(tier),
    }, tier + " ", el("span", { class: "rh-total" }, "(" + mine + " of " + total + ")"));
    rosterCard.appendChild(header);
    if (!tierAssets.length) {
      header.appendChild(el("span", { class: "rh-none" }, "  —  none on this roster"));
      return;
    }
    tierAssets.forEach(a => {
      const valueBits = [];
      if (a.ktc) valueBits.push("KTC " + a.ktc.toLocaleString());
      if (a.flock) valueBits.push("Flock " + a.flock.toLocaleString());
      const nameLine = el("div", { class: "name-line" },
        el("span", { class: "player-name" }, a.name),
      );
      if (a.position) nameLine.appendChild(el("span", { class: "pos-chip " + positionClass(a.position) }, a.position));
      if (a.age != null) nameLine.appendChild(el("span", { class: "pct" }, "age " + a.age));
      nameLine.appendChild(el("span", { class: "auto-grade-chip " + a.tier.chip }, a.tier.label));
      rosterCard.appendChild(el("div", { class: "roster-row" },
        nameLine,
        el("div", { class: "meta" }, valueBits.length ? valueBits.join("  ·  ") : "—"),
      ));
    });
  });
  main.appendChild(rosterCard);

  // ===== Multi-asset Trade Explorer =====
  const tradeCard = el("div", { class: "card" }, el("h2", {}, "Suggested Trades"));

  function movablePool(assets) {
    // Every tier is tradeable. Keep a tiny value floor so literal zero-KTC
    // bodies don't clutter the combo search — they can't balance a trade
    // within the fairness tolerance anyway.
    return assets.filter(a => a.value >= 500);
  }
  function rosterImpact(rosterId, gives, gets, needSet) {
    const before = { ...valueByPosByRoster[rosterId] };
    POS.forEach(pos => { before[pos] = before[pos] || 0; });
    const after = { ...before };
    gives.forEach(a => {
      if (a.kind === "player" && POS.includes(a.position)) after[a.position] -= a.ktc || 0;
    });
    gets.forEach(a => {
      if (a.kind === "player" && POS.includes(a.position)) after[a.position] += a.ktc || 0;
    });
    // A "fit" = a position in the roster's need set that improved.
    const fits = [];
    POS.forEach(pos => {
      if (needSet.has(pos) && after[pos] > before[pos]) fits.push(pos);
    });
    return { before, after, fits };
  }
  function sumValues(assets) {
    let ktc = 0, flock = 0;
    assets.forEach(a => { ktc += a.ktc || 0; flock += a.flock || 0; });
    return { ktc, flock };
  }
  // The position of the most valuable PLAYER on a side (picks ignored). This is
  // the "anchor" of the side — the headline piece a trade is really about.
  function headlinerPos(side) {
    let best = null;
    side.forEach(a => {
      if (a.kind !== "player" || !POS.includes(a.position)) return;
      if (!best || a.value > best.value) best = a;
    });
    return best ? best.position : null;
  }
  // Min "useful" depth a roster needs at each position after a trade. Counts
  // QB-eligible (1 QB + 1 SF + 1 backup = 3), RB (2 + flex + backup = 4),
  // WR (3 + flex + backup = 4), TE (1 + backup = 2). A player counts toward
  // depth only if their KTC value is at least 1000 — three garbage QBs aren't
  // a real backup.
  const MIN_DEPTH_AFTER = { QB: 3, RB: 4, WR: 4, TE: 2 };
  const BACKUP_VALUE_FLOOR = 1000;
  function depthCounts(rosterId) {
    const out = { QB: 0, RB: 0, WR: 0, TE: 0 };
    const roster = latestSeason.rosters.find(r => r.roster_id === rosterId);
    if (!roster) return out;
    (roster.players || []).forEach(pid => {
      const p = state.sleeper.players[pid];
      if (!p || !(p.position in out)) return;
      const v = ktcPlayers[ktcNormalizeName(p.name)] || 0;
      if (v < BACKUP_VALUE_FLOOR) return;
      out[p.position]++;
    });
    return out;
  }
  // Base depth per roster is constant during the search but hasAdequateBackup
  // runs millions of times, so scan each roster only once.
  const _depthMemo = {};
  function baseDepth(rosterId) {
    return _depthMemo[rosterId] || (_depthMemo[rosterId] = depthCounts(rosterId));
  }
  function hasAdequateBackup(rosterId, gives, gets) {
    const before = baseDepth(rosterId);
    const after = { ...before };
    gives.forEach(a => {
      if (a.kind === "player" && a.position in after && (a.ktc || 0) >= BACKUP_VALUE_FLOOR) after[a.position]--;
    });
    gets.forEach(a => {
      if (a.kind === "player" && a.position in after && (a.ktc || 0) >= BACKUP_VALUE_FLOOR) after[a.position]++;
    });
    for (const a of gives) {
      if (a.kind !== "player") continue;
      if (!(a.position in after)) continue;
      // Required floor = min(pre-trade depth, league-recommended min). So a
      // roster that was already below the recommended depth at a position
      // only needs to maintain what it had — not magically gain a backup.
      const required = Math.min(before[a.position], MIN_DEPTH_AFTER[a.position]);
      if (after[a.position] < required) return false;
    }
    return true;
  }

  function bothCalcsAgree(givesSum, getsSum, tol = 0.12) {
    if (!givesSum.ktc || !getsSum.ktc) return false;
    const ktcDiff = Math.abs(givesSum.ktc - getsSum.ktc) / Math.max(givesSum.ktc, getsSum.ktc);
    if (ktcDiff > tol) return false;
    if (givesSum.flock && getsSum.flock) {
      const flockDiff = Math.abs(givesSum.flock - getsSum.flock) / Math.max(givesSum.flock, getsSum.flock);
      if (flockDiff > tol) return false;
    }
    return true;
  }
  function combos(arr, k) {
    if (k === 1) return arr.map(a => [a]);
    const out = [];
    for (let i = 0; i < arr.length; i++) {
      const tail = combos(arr.slice(i + 1), k - 1);
      tail.forEach(t => out.push([arr[i], ...t]));
    }
    return out;
  }

  // ---------- Manager type per roster (Contender / Middler / Reloader) ----------
  // Reuses the same algorithm as the Teams > League Power view so trade
  // recommendations align with what that view shows.
  const ranked = computeManagerRankings();
  const managerType = {};
  if (ranked) {
    ranked.forEach(r => { managerType[r.roster_id] = classifyManager(r.cRank, ranked.length).label; });
  }
  const myType = managerType[selectedRoster.roster_id] || "Middler";

  // How well a given asset fits the recipient's window. 0..1, higher = better.
  // How well an asset fits the RECEIVING team's window, by tier.
  // Reloaders don't want production-now tiers (Mainstay, Productive Vet,
  // Short Term LW, Short Term Production, Jag - Insurance); they want youth,
  // upside, and picks. Contenders want exactly those production tiers and
  // ship out Upside Premier / Upside Shot / Jag - Developmental.
  const RECEIVE_ALIGNMENT = {
    Contender: {
      "Cornerstone": 1.00, "Foundational": 1.00, "Mainstay": 1.00,
      "Productive Vet": 1.00, "Short Term League Winner": 1.00,
      "Short Term Production": 0.90, "Jag - Insurance": 0.80,
      "Upside Premier": 0.70, "Upside Shot": 0.40,
      "Jag - Developmental": 0.10, "Serviceable": 0.45, "Replaceable": 0.10,
    },
    Reloader: {
      "Cornerstone": 1.00, "Foundational": 0.95, "Upside Premier": 1.00,
      "Upside Shot": 0.90, "Jag - Developmental": 0.70,
      "Mainstay": 0.20, "Productive Vet": 0.15,
      "Short Term League Winner": 0.15, "Short Term Production": 0.15,
      "Jag - Insurance": 0.10, "Serviceable": 0.30, "Replaceable": 0.10,
    },
    Middler: {
      "Cornerstone": 1.00, "Foundational": 0.90, "Upside Premier": 0.80,
      "Mainstay": 0.85, "Productive Vet": 0.70,
      "Short Term League Winner": 0.65, "Upside Shot": 0.65,
      "Short Term Production": 0.60, "Serviceable": 0.45,
      "Jag - Insurance": 0.40, "Jag - Developmental": 0.45, "Replaceable": 0.20,
    },
  };
  function typeAlignment(asset, type) {
    if (asset.kind === "pick") {
      const yearOffset = Math.max(0, Math.min(2, asset.season - currentYear));
      if (type === "Contender") return [1.00, 0.55, 0.30][yearOffset];
      if (type === "Reloader")  return [0.40, 0.80, 1.00][yearOffset];
      return                       [0.65, 0.70, 0.65][yearOffset];
    }
    const table = RECEIVE_ALIGNMENT[type] || RECEIVE_ALIGNMENT.Middler;
    const tierLabel = asset.tier && asset.tier.label;
    return table[tierLabel] != null ? table[tierLabel] : 0.5;
  }
  function alignmentAvg(assets, type) {
    if (!assets.length) return 0.65;
    return assets.reduce((s, a) => s + typeAlignment(a, type), 0) / assets.length;
  }

  const myMovable = movablePool(myAssets);
  const myNeed = needSetFor(selectedRoster.roster_id);
  const myHasRealWeakness = POS.some(p => isWeakAt(selectedRoster.roster_id, p));
  // Reward asymmetric player ↔ pick swaps (a contender/reloader staple).
  function pickFraction(side) {
    return side.filter(a => a.kind === "pick").length / side.length;
  }
  // Build the candidate trade "sides" for a pool, each paired with its value
  // sum (computed once). Every asset is tradeable: 1- and 2-asset sides use the
  // FULL movable pool, so deep bench players and late picks can headline or fill
  // a deal. Only 3-asset PACKAGES stay anchored to the top ~14 by value — three
  // scrubs never balance a real trade, and the full C(n,3) is the term that
  // blows up the cross-product. Weak-position givers are dropped up front.
  function buildSides(pool, rosterId) {
    const all = pool.slice().sort((a, b) => b.value - a.value);
    const core = all.slice(0, 14);
    const out = [];
    for (const side of [...combos(all, 1), ...combos(all, 2), ...combos(core, 3)]) {
      if (side.some(g => g.kind === "player" && isWeakAt(rosterId, g.position))) continue;
      out.push({ side, sum: sumValues(side) });
    }
    return out;
  }
  // mySides are identical for every partner, so build them just once.
  const mySideData = buildSides(myMovable, selectedRoster.roster_id);
  const allTrades = [];
  latestSeason.rosters.forEach(other => {
    if (other.roster_id === selectedRoster.roster_id) return;
    const otherUser = latestSeason.users.find(u => u.user_id === other.owner_id);
    const otherName = otherUser ? canonicalOwnerName(userDisplay(otherUser)) : "—";
    const otherAssets = assetsForRoster(other.roster_id);
    const theirNeed = needSetFor(other.roster_id);
    const theirSideData = buildSides(movablePool(otherAssets), other.roster_id);

    for (const { side: gives, sum: myGivesSum } of mySideData) {
      for (const { side: gets, sum: getsSum } of theirSideData) {
        // Cheapest discriminator first — the vast majority of pairs fail the
        // value match, so prune on it before the costlier depth/impact checks.
        if (!bothCalcsAgree(myGivesSum, getsSum)) continue;
        // Both sides must keep a useful backup at every position they ship out.
        if (!hasAdequateBackup(selectedRoster.roster_id, gives, gets)) continue;
        if (!hasAdequateBackup(other.roster_id, gets, gives)) continue;
        const myFinal = rosterImpact(selectedRoster.roster_id, gives, gets, myNeed);
        const theirFinal = rosterImpact(other.roster_id, gets, gives, theirNeed);
        if (!myFinal.fits.length || !theirFinal.fits.length) continue;
        const ktcDiff = Math.abs(myGivesSum.ktc - getsSum.ktc) / Math.max(myGivesSum.ktc, getsSum.ktc);
        const flockDiff = (myGivesSum.flock && getsSum.flock)
          ? Math.abs(myGivesSum.flock - getsSum.flock) / Math.max(myGivesSum.flock, getsSum.flock)
          : null;
        const worstDiff = Math.max(ktcDiff, flockDiff != null ? flockDiff : 0);
        const fairness = 1 - worstDiff;
        const fitScore = (myFinal.fits.length + theirFinal.fits.length);
        const sizePenalty = (gives.length + gets.length - 2) * 0.06;
        const mixBonus = Math.abs(pickFraction(gives) - pickFraction(gets)) * 0.10;
        // Positional realism. The most natural dynasty trade is a same-position
        // tier-up: one team ships a stud at a position and gets back a lesser
        // starter at THAT position plus extra capital (a pick or depth piece) to
        // balance the value. We reward those and bury arbitrary cross-position
        // 1-for-1 player swaps, which feel unrealistic.
        const givesPos = headlinerPos(gives);
        const getsPos = headlinerPos(gets);
        const samePosAnchor = givesPos && getsPos && givesPos === getsPos;
        // One side is a lone star, the other is that-position-plus-extra.
        const oneStarVsPackage =
          (gives.length === 1 && gives[0].kind === "player" && gets.length >= 2) ||
          (gets.length === 1 && gets[0].kind === "player" && gives.length >= 2);
        const crossPos1for1 =
          gives.length === 1 && gets.length === 1 &&
          gives[0].kind === "player" && gets[0].kind === "player" && givesPos !== getsPos;
        let shape, realismBonus = 0, realismPenalty = 0;
        if (samePosAnchor && oneStarVsPackage) { shape = "upgrade"; realismBonus = 0.30; }
        else if (samePosAnchor) { shape = "swap"; realismBonus = 0.15; }
        else if (!givesPos || !getsPos) { shape = "playerPick"; }  // player(s) for picks
        else { shape = "cross"; realismPenalty = crossPos1for1 ? 0.30 : 0.12; }
        // Type alignment: how well "what you receive" fits your team's window.
        const theirType = managerType[other.roster_id] || "Middler";
        const myAlign = alignmentAvg(gets, myType);
        const theirAlign = alignmentAvg(gives, theirType);
        const alignScore = (myAlign + theirAlign) / 2;
        const score = fairness * 0.45 + (fitScore / 4) * 0.15 + alignScore * 0.15
          + mixBonus + realismBonus - realismPenalty - sizePenalty;
        allTrades.push({
          partnerName: otherName,
          partnerRosterId: other.roster_id,
          gives, gets,
          myGivesSum, getsSum,
          myFits: myFinal.fits,
          theirFits: theirFinal.fits,
          fairness, score, shape,
          anchorPos: samePosAnchor ? givesPos : null,
          dealValue: Math.max(myGivesSum.ktc, getsSum.ktc),
        });
      }
    }
  });

  allTrades.sort((a, b) => b.score - a.score);
  const seenPartner = {};
  const seenSize = {};
  const seenMix = {};
  const seenShape = {};
  const seenKeys = new Set();
  const topTrades = [];
  let highDealCount = 0;
  function mixTag(t) {
    const givesHasPicks = t.gives.some(a => a.kind === "pick");
    const givesHasPlayers = t.gives.some(a => a.kind === "player");
    const getsHasPicks = t.gets.some(a => a.kind === "pick");
    const getsHasPlayers = t.gets.some(a => a.kind === "player");
    if ((givesHasPlayers && !givesHasPicks && getsHasPicks && !getsHasPlayers)
        || (getsHasPlayers && !getsHasPicks && givesHasPicks && !givesHasPlayers)) return "playerPick";
    if (!givesHasPicks && !getsHasPicks) return "playerOnly";
    if (!givesHasPlayers && !getsHasPlayers) return "pickOnly";
    return "mixed";
  }
  for (const t of allTrades) {
    if (topTrades.length >= 10) break;
    const key = t.partnerRosterId + "|" + t.gives.map(g => g.id).sort().join(",") + "|" + t.gets.map(g => g.id).sort().join(",");
    if (seenKeys.has(key)) continue;
    seenKeys.add(key);
    const c = seenPartner[t.partnerName] || 0;
    if (c >= 2) continue;
    const sizeKey = t.gives.length + "x" + t.gets.length;
    const sc = seenSize[sizeKey] || 0;
    if (sc >= 3) continue;
    const mix = mixTag(t);
    const mc = seenMix[mix] || 0;
    if (mix === "playerOnly" && mc >= 4) continue;
    if (mix === "pickOnly" && mc >= 2) continue;
    // Keep arbitrary cross-position player swaps to a minimum — the list should
    // lean on same-position tier-ups and player-for-pick deals.
    const shc = seenShape[t.shape] || 0;
    if (t.shape === "cross" && shc >= 2) continue;
    // Bias the list toward lower-value deals: cap "big" trades (a side worth a
    // stud) at 3, so most surfaced trades involve mid/upside-tier assets and
    // only a couple are headliner swaps.
    const isHighDeal = t.dealValue >= 4000;
    if (isHighDeal && highDealCount >= 3) continue;
    seenPartner[t.partnerName] = c + 1;
    seenSize[sizeKey] = sc + 1;
    seenMix[mix] = mc + 1;
    seenShape[t.shape] = shc + 1;
    if (isHighDeal) highDealCount++;
    topTrades.push(t);
  }

  // Type banner: tells the user what slant their recommendations are getting.
  const typeBanner = el("div", { class: "card-lede" });
  if (myType === "Contender") {
    typeBanner.innerHTML = `<strong>${selectedName}</strong> is a <strong>Contender</strong>. ` +
      `Trade suggestions favor proven, in-prime players and near-term picks.`;
  } else if (myType === "Reloader") {
    typeBanner.innerHTML = `<strong>${selectedName}</strong> is a <strong>Reloader</strong>. ` +
      `Trade suggestions favor young upside players and future picks.`;
  } else {
    typeBanner.innerHTML = `<strong>${selectedName}</strong> is a <strong>Middler</strong>. ` +
      `Trade suggestions balance proven production and upside.`;
  }
  tradeCard.appendChild(typeBanner);
  if (!myHasRealWeakness) {
    tradeCard.appendChild(el("div", { class: "pct", style: "margin-bottom:10px" },
      `No positions below 85% of league average. Targeting weakest starter spots: ${[...myNeed].join(", ") || "—"}.`));
  }
  if (!topTrades.length) {
    tradeCard.appendChild(el("div", { class: "empty" },
      "No mutually-beneficial trades found within 12% value across 1-for-1 through 3-for-3 combinations."));
  } else {
    topTrades.forEach(t => {
      const block = el("div", { class: "trade-block" });
      const partnerType = managerType[t.partnerRosterId] || "Middler";
      const shapeLabel = t.anchorPos
        ? `  ·  ${t.anchorPos} ${t.shape === "upgrade" ? "tier-up" : "swap"}`
        : "";
      block.appendChild(el("div", { class: "trade-header" },
        el("span", { class: "trade-date" }, `with ${t.partnerName} (${partnerType})`),
        el("span", { class: "trade-meta" }, `${Math.round(t.fairness * 100)}% fair  ·  ${t.gives.length}-for-${t.gets.length}${shapeLabel}`),
      ));
      const cols = el("div", { class: "trade-cols" });
      function side(title, items) {
        const col = el("div", { class: "trade-col" },
          el("div", { class: "trade-col-label" }, title));
        items.forEach(a => {
          const valueBits = [];
          if (a.ktc) valueBits.push("KTC " + a.ktc.toLocaleString());
          if (a.flock) valueBits.push("Flock " + a.flock.toLocaleString());
          col.appendChild(el("div", { class: "trade-line" },
            el("span", { class: "trade-player" }, a.name),
            el("span", { class: "pos-chip " + positionClass(a.position) }, a.position),
            el("span", { class: "trade-where" }, valueBits.join("  ·  ")),
          ));
        });
        const sum = sumValues(items);
        col.appendChild(el("div", { class: "pct", style: "margin-top:6px" },
          `Total: KTC ${Math.round(sum.ktc).toLocaleString()}` +
          (sum.flock ? `  ·  Flock ${Math.round(sum.flock).toLocaleString()}` : "")));
        return col;
      }
      cols.appendChild(side("You send", t.gives));
      cols.appendChild(side("You get", t.gets));
      block.appendChild(cols);
      const fitBits = [];
      if (t.myFits.length) fitBits.push("You fill: " + t.myFits.join(", "));
      if (t.theirFits.length) fitBits.push(t.partnerName + " fills: " + t.theirFits.join(", "));
      block.appendChild(el("div", { class: "pct", style: "margin-top:6px" }, fitBits.join("  ·  ")));

      // Per-trade action row: copy + open Sleeper trade page.
      function tradeText() {
        const sendList = t.gives.map(a => `  - ${a.name} (${a.position})`).join("\n");
        const recvList = t.gets.map(a => `  - ${a.name} (${a.position})`).join("\n");
        return `Proposed trade with ${t.partnerName} (${partnerType})\n` +
          `${selectedName} sends:\n${sendList}\n${selectedName} receives:\n${recvList}\n` +
          `${Math.round(t.fairness * 100)}% fair (KTC + Flock)`;
      }
      const tradeActions = el("div", { class: "action-row" });
      tradeActions.appendChild(actionButton("Copy trade", (e, btn) => copyToClipboard(tradeText(), btn)));
      tradeActions.appendChild(actionButton("Open trade page ↗", null, { href: sleeperUrl("/team"), primary: true }));
      block.appendChild(tradeActions);

      tradeCard.appendChild(block);
    });
  }
  tradeCard.appendChild(el("div", { class: "pct", style: "margin-top:10px" },
    "Algorithm: exhaustive search across all 1-for-1 through 3-for-3 swaps between you and every other manager. " +
    "Movable pool includes every player and pick on either roster regardless of tier (tiny value floor only), with each side trimmed to its top 12 assets by value. " +
    "Blended value = 0.7 × Flock expert-avg + 0.3 × KTC (Flock-only or KTC-only if one source is missing). " +
    "Asset tiers use a position-aware age curve (QB cliff 33, WR 28, TE 30, RB 26 — picks classified by value alone). " +
    "A swap qualifies only when (a) every calculator with data on both sides agrees the value gap is < 12%, " +
    "(b) the giver is not parting with a position they're already weak at, " +
    "(c) after the swap, the giver doesn't lose depth at any shipped-out position — required floor is min(pre-trade depth, league-recommended QB ≥ 3, RB ≥ 4, WR ≥ 4, TE ≥ 2), so a roster that was already below the floor only has to hold what it had, and " +
    "(d) at least one need-set position improves on each side. " +
    "Need set = positions below 85% of league average value; if a roster has none, the two weakest starter positions are used as the need set instead. " +
    "Composite score: 50% fairness + 20% mutual fit count + 20% type alignment + up to 10% player↔pick mix bonus − size penalty. " +
    "Type alignment is tier-based: Contenders are rewarded for receiving Foundational / Mainstay / Productive Vet / Short Term League Winner / Short Term Production / Jag - Insurance assets and shipping out Upside Premier / Upside Shot / Jag - Developmental; Reloaders are the reverse and are penalized for receiving any production-now tier; Middlers stay neutral. " +
    "max 2 per partner, max 3 per combo size, max 3 trades involving any Cornerstone asset, and capped at 4 player-only and 2 pick-only trades so the list spans every trade type."
  ));
  main.appendChild(tradeCard);
}

// Shared: standard fantasy starting slots (1 QB, 2 RB, 3 WR, 1 TE, 1 FLEX, 1 SF).
// roster_positions in the league config tells us exactly what to fill.
function fillOptimalLineup(rosterPositions, candidates) {
  const flexEligible = ["RB", "WR", "TE"];
  const sfEligible = ["QB", "RB", "WR", "TE"];
  const used = new Set();
  const lineup = [];
  for (const slot of rosterPositions) {
    if (slot === "BN" || slot === "TAXI" || slot === "IR" || slot === "RES" || slot === "BE") continue;
    let pool;
    if (slot === "FLEX") pool = candidates.filter(c => flexEligible.includes(c.position));
    else if (slot === "SUPER_FLEX" || slot === "SF") pool = candidates.filter(c => sfEligible.includes(c.position));
    else pool = candidates.filter(c => c.position === slot);
    const available = pool.filter(c => !used.has(c.id)).sort((a, b) => b.projected - a.projected);
    const pick = available[0] || null;
    if (pick) used.add(pick.id);
    lineup.push({ slot, player: pick });
  }
  return lineup;
}

function teamPickerControls(latestSeason) {
  const users = sortUsersHenryFirst(latestSeason.users);
  if (state.rosterTeam == null && users.length) state.rosterTeam = users[0].user_id;
  const opts = users.map(u => ({ value: u.user_id, label: canonicalOwnerName(userDisplay(u)) }));
  const controls = el("div", { class: "controls" });
  controls.appendChild(customSelect(opts, state.rosterTeam, v => {
    state.rosterTeam = v;
    render();
  }));
  return { controls, users };
}

// Render a single player into a .lineup-row.
function renderPlayerRow(player, opts) {
  opts = opts || {};
  const row = el("div", { class: "lineup-row " + (opts.bench ? "is-bench " : "") + (player ? "pos-" + (player.position || "").toLowerCase() : "is-empty") });
  row.appendChild(el("span", { class: "slot-chip" }, opts.slotLabel || "·"));
  if (!player) {
    const block = el("div", { class: "player-block" },
      el("div", { class: "player-name-line" }, el("span", { class: "player-name pct" }, "no eligible player")),
    );
    row.appendChild(block);
    row.appendChild(el("div", { class: "proj-points dim" }, "—"));
    return row;
  }
  const block = el("div", { class: "player-block" });
  const nameLine = el("div", { class: "player-name-line" },
    el("span", { class: "player-name" }, player.name),
    el("span", { class: "pos-chip " + positionClass(player.position) }, player.position),
  );
  if (player.injury) nameLine.appendChild(el("span", { class: "injury-chip" }, player.injury));
  block.appendChild(nameLine);
  const metaLine = el("div", { class: "player-meta-line" });
  const metaParts = [];
  if (player.team) metaParts.push(player.team);
  if (player.opponent) metaParts.push("vs " + player.opponent);
  metaLine.appendChild(el("span", { class: "matchup" }, metaParts.join(" · ")));
  if (opts.upgrade) {
    const u = opts.upgrade;
    const label = u.replaced
      ? `+${u.diff.toFixed(1)} over ${u.replaced.name}`
      : `Fills empty ${u.slot === "SUPER_FLEX" ? "SF" : u.slot}`;
    metaLine.appendChild(el("span", { class: "upgrade-chip" }, label));
  } else if (opts.stash) {
    metaLine.appendChild(el("span", { class: "pct" }, "Stash · KTC " + opts.stash.toLocaleString()));
  }
  block.appendChild(metaLine);
  row.appendChild(block);
  const proj = el("div", { class: "proj-points" + (player.projected ? "" : " dim") },
    player.projected != null ? player.projected.toFixed(1) : "—");
  proj.appendChild(el("span", { class: "proj-sub" }, "pts"));
  row.appendChild(proj);
  return row;
}

function renderLineup() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();
  ensureLineupDataLoaded();

  if (!state.sleeper) {
    main.appendChild(el("div", { class: "empty" },
      state.sleeperError ? "Sleeper error: " + state.sleeperError : "Loading Sleeper data…"));
    return;
  }
  if (!state.lineupData) {
    main.appendChild(el("div", { class: "empty" },
      state.lineupDataError ? "Lineup error: " + state.lineupDataError : "Loading weekly projections…"));
    return;
  }

  const latestSeason = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  const { controls, users } = teamPickerControls(latestSeason);
  main.appendChild(controls);

  const selectedUser = users.find(u => u.user_id === state.rosterTeam);
  const selectedRoster = latestSeason.rosters.find(r => r.owner_id === state.rosterTeam);
  if (!selectedRoster) {
    main.appendChild(el("div", { class: "empty" }, "Roster not found."));
    return;
  }
  const selectedName = canonicalOwnerName(userDisplay(selectedUser));

  const { week, season, projections, league } = state.lineupData;
  const scoring = league.scoring_settings || {};
  const rosterPositions = league.roster_positions || [];

  const candidates = (selectedRoster.players || []).map(pid => {
    const p = state.sleeper.players[pid];
    if (!p) return null;
    const proj = projections[pid];
    const projected = proj ? scoreProjection(proj.stats, scoring) : 0;
    return {
      id: pid, name: p.name, position: p.position,
      team: proj ? proj.team : p.team,
      projected,
      opponent: proj ? proj.opponent : null,
      injury: proj ? proj.injury_status : null,
    };
  }).filter(Boolean);

  const lineup = fillOptimalLineup(rosterPositions, candidates);
  const startedIds = new Set(lineup.filter(s => s.player).map(s => s.player.id));
  const projectedTotal = lineup.reduce((s, l) => s + (l.player ? l.player.projected : 0), 0);
  const offSeason = state.lineupData.season_type === "off" || projectedTotal < 1;

  const bench = candidates.filter(c => !startedIds.has(c.id))
    .sort((a, b) => b.projected - a.projected);
  function bestUpgrade(b) {
    let best = null;
    lineup.forEach(s => {
      const eligible = (s.slot === b.position)
        || (s.slot === "FLEX" && ["RB","WR","TE"].includes(b.position))
        || ((s.slot === "SUPER_FLEX" || s.slot === "SF") && ["QB","RB","WR","TE"].includes(b.position));
      if (!eligible) return;
      if (!s.player) { best = { diff: b.projected, replaced: null, slot: s.slot }; return; }
      const diff = b.projected - s.player.projected;
      if (diff > 0 && (!best || diff > best.diff)) {
        best = { diff, replaced: s.player, slot: s.slot };
      }
    });
    return best;
  }
  const upgrades = bench.map(b => ({ player: b, upgrade: bestUpgrade(b) }))
    .filter(x => x.upgrade)
    .sort((a, b) => b.upgrade.diff - a.upgrade.diff);
  const upgradeIds = new Set(upgrades.map(u => u.player.id));
  const others = bench.filter(b => !upgradeIds.has(b.id));
  const injuredStarters = lineup.filter(s => s.player && s.player.injury).length;

  // Header card
  const headerCard = el("div", { class: "card" });
  headerCard.appendChild(el("h2", {}, selectedName + " — Week " + week));
  if (offSeason) {
    headerCard.appendChild(el("div", { class: "offseason-banner" },
      "Off-season — Sleeper's projection endpoint returns zero values until games start. The lineup ordering still works; totals will read 0.0 until then."
    ));
  }
  headerCard.appendChild(el("div", { class: "stat-grid" },
    el("div", { class: "stat" },
      el("div", { class: "stat-label" }, "Projected"),
      el("div", { class: "stat-value" }, projectedTotal.toFixed(1)),
    ),
    el("div", { class: "stat" },
      el("div", { class: "stat-label" }, "Bench Upgrades"),
      el("div", { class: "stat-value" }, String(upgrades.length)),
    ),
    el("div", { class: "stat" },
      el("div", { class: "stat-label" }, "Injured Starters"),
      el("div", { class: "stat-value" }, String(injuredStarters)),
    ),
  ));
  function buildLineupText() {
    const lines = [`${selectedName} — Week ${week} Optimal Lineup (proj ${projectedTotal.toFixed(1)})`];
    lineup.forEach(({ slot, player }) => {
      const slotLabel = slot === "SUPER_FLEX" ? "SF" : slot;
      if (!player) lines.push(`  ${slotLabel}: (no eligible player)`);
      else lines.push(`  ${slotLabel}: ${player.name} (${player.position}${player.team ? " " + player.team : ""})  ${player.projected.toFixed(1)}`);
    });
    return lines.join("\n");
  }
  const startersActions = el("div", { class: "action-row" });
  startersActions.appendChild(actionButton("Copy lineup", (e, btn) => copyToClipboard(buildLineupText(), btn)));
  startersActions.appendChild(actionButton("Open in Sleeper ↗", null, { href: sleeperUrl("/team"), primary: true }));
  headerCard.appendChild(startersActions);
  main.appendChild(headerCard);

  // Lineup card
  const lineupCard = el("div", { class: "card" }, el("h2", {}, "Optimal Lineup"));
  lineup.forEach(({ slot, player }) => {
    const slotLabel = slot === "SUPER_FLEX" ? "SF" : slot;
    lineupCard.appendChild(renderPlayerRow(player, { slotLabel }));
  });
  main.appendChild(lineupCard);

  // Bench card — grouped by position (QB / RB / WR / TE), sorted by projection within each.
  const benchCard = el("div", { class: "card" }, el("h2", {}, "Bench"));
  const POSITION_ORDER = ["QB", "RB", "WR", "TE"];
  // Index upgrades by player id for quick lookup.
  const upgradeByPid = {};
  upgrades.forEach(({ player, upgrade }) => { upgradeByPid[player.id] = upgrade; });

  let benchHasContent = false;
  POSITION_ORDER.forEach(pos => {
    const posBench = bench
      .filter(p => p.position === pos)
      .sort((a, b) => b.projected - a.projected);
    if (!posBench.length) return;
    benchHasContent = true;
    benchCard.appendChild(el("div", { class: "sub-header" },
      pos, el("span", { class: "count" }, String(posBench.length))
    ));
    posBench.forEach(p => {
      const upgrade = upgradeByPid[p.id];
      benchCard.appendChild(renderPlayerRow(p, {
        bench: true,
        slotLabel: upgrade ? (upgrade.slot === "SUPER_FLEX" ? "SF" : upgrade.slot) : pos,
        upgrade,
      }));
    });
  });
  // Catch-all for any non-FantPos players (rare).
  const otherBench = bench.filter(p => !POSITION_ORDER.includes(p.position))
    .sort((a, b) => b.projected - a.projected);
  if (otherBench.length) {
    benchHasContent = true;
    benchCard.appendChild(el("div", { class: "sub-header" },
      "Other", el("span", { class: "count" }, String(otherBench.length))
    ));
    otherBench.forEach(p => benchCard.appendChild(renderPlayerRow(p, { bench: true, slotLabel: p.position })));
  }
  if (!benchHasContent) {
    benchCard.appendChild(el("div", { class: "empty" }, "Bench is empty."));
  }
  main.appendChild(benchCard);

  main.appendChild(el("div", { class: "pct", style: "margin-top:14px" },
    "Projections scored with your league's scoring_settings. Starters filled greedily highest-projection first into QB → RB → WR → TE → FLEX (RB/WR/TE) → SF (any). Bench is grouped by position (QB / RB / WR / TE) and sorted by projected points within each; upgrade chips highlight bench players who project ahead of a current starter."
  ));
}

function renderWaivers() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();
  ensureLineupDataLoaded();
  ensureKtcDynastyLoaded();

  if (!state.sleeper) {
    main.appendChild(el("div", { class: "empty" },
      state.sleeperError ? "Sleeper error: " + state.sleeperError : "Loading Sleeper data…"));
    return;
  }
  if (!state.lineupData) {
    main.appendChild(el("div", { class: "empty" },
      state.lineupDataError ? "Projections error: " + state.lineupDataError : "Loading weekly projections…"));
    return;
  }

  const latestSeason = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  const { controls, users } = teamPickerControls(latestSeason);
  main.appendChild(controls);

  const selectedUser = users.find(u => u.user_id === state.rosterTeam);
  const selectedRoster = latestSeason.rosters.find(r => r.owner_id === state.rosterTeam);
  if (!selectedRoster) {
    main.appendChild(el("div", { class: "empty" }, "Roster not found."));
    return;
  }
  const selectedName = canonicalOwnerName(userDisplay(selectedUser));

  const { week, projections, league, season_type } = state.lineupData;
  const scoring = league.scoring_settings || {};
  const rosterPositions = league.roster_positions || [];
  const offSeason = season_type === "off";

  const rostered = new Set();
  latestSeason.rosters.forEach(r => (r.players || []).forEach(pid => rostered.add(pid)));

  const ktcRaw = (state.ktcDynasty && state.ktcDynasty.players) || {};
  const FA_PLAYABLE = new Set(["QB", "RB", "WR", "TE"]);

  // Build FA list. Off-season has 0 projections — fall back to KTC values.
  const fas = [];
  if (offSeason) {
    for (const pid in state.sleeper.players) {
      if (rostered.has(pid)) continue;
      const sp = state.sleeper.players[pid];
      if (!sp || !FA_PLAYABLE.has(sp.position)) continue;
      const ktc = ktcRaw[ktcNormalizeName(sp.name)];
      if (!ktc || !ktc.value || ktc.value < 1500) continue;
      const proj = projections[pid];
      fas.push({
        id: pid, name: sp.name, position: sp.position,
        team: (proj && proj.team) || sp.team || null,
        opponent: (proj && proj.opponent) || null,
        injury: (proj && proj.injury_status) || null,
        projected: proj ? scoreProjection(proj.stats, scoring) : 0,
        ktcValue: ktc.value,
      });
    }
  } else {
    Object.entries(projections).forEach(([pid, proj]) => {
      if (rostered.has(pid)) return;
      const sp = state.sleeper.players[pid];
      if (!sp || !FA_PLAYABLE.has(sp.position)) return;
      const projected = scoreProjection(proj.stats, scoring);
      if (projected <= 0) return;
      const ktc = ktcRaw[ktcNormalizeName(sp.name)] || null;
      fas.push({
        id: pid, name: sp.name, position: sp.position,
        team: proj.team || sp.team,
        opponent: proj.opponent,
        injury: proj.injury_status,
        projected,
        ktcValue: ktc ? ktc.value : 0,
      });
    });
  }

  const ownCandidates = (selectedRoster.players || []).map(pid => {
    const p = state.sleeper.players[pid];
    if (!p) return null;
    const proj = projections[pid];
    return {
      id: pid, name: p.name, position: p.position,
      projected: proj ? scoreProjection(proj.stats, scoring) : 0,
    };
  }).filter(Boolean);
  const lineup = fillOptimalLineup(rosterPositions, ownCandidates);
  function bestUpgrade(fa) {
    let best = null;
    lineup.forEach(s => {
      const eligible = (s.slot === fa.position)
        || (s.slot === "FLEX" && ["RB","WR","TE"].includes(fa.position))
        || ((s.slot === "SUPER_FLEX" || s.slot === "SF") && ["QB","RB","WR","TE"].includes(fa.position));
      if (!eligible) return;
      if (!s.player) { best = { diff: fa.projected, replaced: null, slot: s.slot }; return; }
      const diff = fa.projected - s.player.projected;
      if (diff > 0 && (!best || diff > best.diff)) {
        best = { diff, replaced: s.player, slot: s.slot };
      }
    });
    return best;
  }

  fas.sort((a, b) => {
    if (offSeason) return b.ktcValue - a.ktcValue;
    if (b.projected !== a.projected) return b.projected - a.projected;
    return b.ktcValue - a.ktcValue;
  });
  const filter = state.waiversFilter || "ALL";
  const filtered = filter === "ALL" ? fas : fas.filter(f => f.position === filter);
  const upgrades = filtered.map(fa => ({ fa, upgrade: bestUpgrade(fa) })).filter(x => x.upgrade);
  const stashes = filtered.filter(fa => !bestUpgrade(fa) && fa.ktcValue >= 1500);
  const lowValue = filtered.filter(fa => !bestUpgrade(fa) && !(fa.ktcValue >= 1500));

  // Header card
  const headerCard = el("div", { class: "card" });
  headerCard.appendChild(el("h2", {}, selectedName + " — Free Agents · Week " + week));
  if (offSeason) {
    headerCard.appendChild(el("div", { class: "offseason-banner" },
      "Off-season — projections are zero. Showing free agents ranked by KTC dynasty value so you can plan stashes ahead of the season."));
  }
  headerCard.appendChild(el("div", { class: "stat-grid" },
    el("div", { class: "stat" },
      el("div", { class: "stat-label" }, "Total FAs"),
      el("div", { class: "stat-value" }, String(filtered.length)),
    ),
    el("div", { class: "stat" },
      el("div", { class: "stat-label" }, "Lineup Upgrades"),
      el("div", { class: "stat-value" }, String(upgrades.length)),
    ),
    el("div", { class: "stat" },
      el("div", { class: "stat-label" }, "Stash Candidates"),
      el("div", { class: "stat-value" }, String(stashes.length)),
    ),
  ));
  const filterRow = el("div", { class: "action-row" });
  const posFilter = el("div", { class: "pos-filter" });
  ["ALL", "QB", "RB", "WR", "TE"].forEach(p => {
    const btn = el("button", { class: state.waiversFilter === p ? "active" : "" }, p === "ALL" ? "All" : p);
    btn.addEventListener("click", () => {
      state.waiversFilter = p;
      render();
    });
    posFilter.appendChild(btn);
  });
  filterRow.appendChild(posFilter);
  function buildWaiverText() {
    const lines = [`${selectedName} — Week ${week} Free Agent Adds`];
    if (upgrades.length) {
      lines.push("Upgrades:");
      upgrades.slice(0, 10).forEach((u, i) => {
        const tail = u.upgrade.replaced ? ` over ${u.upgrade.replaced.name}` : "";
        lines.push(`  ${i + 1}. ${u.fa.name} (${u.fa.position})  proj ${u.fa.projected.toFixed(1)}  +${u.upgrade.diff.toFixed(1)}${tail}`);
      });
    }
    if (stashes.length) {
      lines.push("Stashes:");
      stashes.slice(0, 5).forEach((s, i) => {
        lines.push(`  ${i + 1}. ${s.name} (${s.position})  KTC ${s.ktcValue.toLocaleString()}`);
      });
    }
    return lines.join("\n");
  }
  filterRow.appendChild(actionButton("Copy", (e, btn) => copyToClipboard(buildWaiverText(), btn)));
  filterRow.appendChild(actionButton("Open Free Agents ↗", null, { href: sleeperUrl("/players?type=free_agents"), primary: true }));
  headerCard.appendChild(filterRow);
  main.appendChild(headerCard);

  if (upgrades.length) {
    const upCard = el("div", { class: "card" }, el("h2", {}, "Lineup Upgrades"));
    upgrades.slice(0, 20).forEach(({ fa, upgrade }) => {
      upCard.appendChild(renderPlayerRow(fa, {
        bench: true,
        slotLabel: upgrade.slot === "SUPER_FLEX" ? "SF" : upgrade.slot,
        upgrade,
      }));
    });
    main.appendChild(upCard);
  }
  if (stashes.length) {
    const stashCard = el("div", { class: "card" }, el("h2", {}, "Stash Candidates"));
    stashCard.appendChild(el("div", { class: "pct", style: "margin-bottom:8px" },
      "Players without an immediate lineup upgrade but with strong KTC dynasty value — worth a roster spot if you have one open."));
    stashes.slice(0, 15).forEach(fa => {
      stashCard.appendChild(renderPlayerRow(fa, {
        bench: true,
        slotLabel: fa.position,
        stash: fa.ktcValue,
      }));
    });
    main.appendChild(stashCard);
  }
  if (lowValue.length) {
    const otherCard = el("div", { class: "card" }, el("h2", {}, "Other Available"));
    lowValue.slice(0, 20).forEach(fa => {
      otherCard.appendChild(renderPlayerRow(fa, { bench: true, slotLabel: fa.position }));
    });
    main.appendChild(otherCard);
  }
  if (!upgrades.length && !stashes.length && !lowValue.length) {
    main.appendChild(el("div", { class: "card empty" }, "No free agents match this filter."));
  }

  main.appendChild(el("div", { class: "pct", style: "margin-top:14px" },
    "Free agents = QB / RB / WR / TE not on any roster. Lineup Upgrades show the projected gain over your current starter. Stash Candidates are players with KTC dynasty value ≥ 1500 but no immediate upgrade."
  ));
}

  if (!filtered.length) {

  }
  main.appendChild(listCard);
}

// Drill-down modal: every pick in a group (a row/cell of any hit-rate table),
// listed in order of draft year, then draft slot. Shows slot, player,
// position, drafter, and result.
function showPicksModal(title, picks) {
  const sorted = picks.slice().sort((a, b) =>
    (a.year - b.year) || (a.round - b.round) || ((a.pickInRound || 0) - (b.pickInRound || 0)));
  const body = el("div", {});
  if (!sorted.length) {
    body.appendChild(el("div", { class: "empty" }, "No picks in this group."));
    openModal(title, body);
    return;
  }
  let lastYear = null;
  sorted.forEach(p => {
    if (p.year !== lastYear) {
      lastYear = p.year;
      body.appendChild(el("div", { class: "round-header" }, String(p.year)));
    }
    const nameLine = el("div", { style: "display:flex;align-items:center;gap:8px;flex:1;min-width:0" },
      el("span", { class: "mr-val", style: "min-width:34px" }, p.slot || "—"),
      el("span", { class: "mr-name" }, p.player || el("span", { class: "pct" }, "(empty)")),
    );
    if (p.pos) nameLine.appendChild(el("span", { class: "pos-chip " + positionClass(p.pos) }, p.pos));
    body.appendChild(el("div", { class: "modal-row" },
      nameLine,
      el("span", { class: "pick-result " + resultClass(p.result), style: "flex:0 0 auto" }, p.result || "Pending"),
      el("span", { class: "mr-owner" }, p.person || "—"),
    ));
  });
  const graded = sorted.filter(p => p.result).length;
  const hits = sorted.filter(p => p.result === "Hit").length;
  const sub = graded ? "  ·  " + ((hits / graded) * 100).toFixed(0) + "% hit" : "";
  openModal(title + " — " + sorted.length + " picks" + sub, body);
}

  const PS_POSITIONS = ["QB", "RB", "WR", "TE"];
  const PS_SECTIONS = [
    { round: 1, tier: "Early", label: "R1 Early", slots: "1.01–1.04" },
    { round: 1, tier: "Mid", label: "R1 Mid", slots: "1.05–1.08" },

    );

      const t = tally(subset);
      return { pos, t, metric: psMetric(t) };
    });
    const valid = posData.filter(d => d.metric !== null && d.t.total >= MIN_SAMPLE);

        const cellClass = "num tight" + (isBest ? " cell-best" : "") + (clickable ? " cell-clickable" : "");
        const onclick = clickable ? () => showPicksModal(`${section.label} — ${d.pos}`, subset) : undefined;
        if (d.metric === null) {

      // stopPropagation so a cell click shows only that round's picks, while a

      );
    }
    function cellForGap(picks, title) { return cellFor(picks, title, true); }
    ["QB", "RB", "WR", "TE"].forEach(pos => {
      const posPicks = drafterPicks.filter(p => p.pos === pos);
      if (!posPicks.length) return;
      // Bold "Position — Total" header row; clicking the row shows every pick
      // this drafter made at that position.
      itbody.appendChild(el("tr", {
        class: "pos-total row-clickable",
        onclick: () => showPicksModal(`${state.statsInsightDrafter} — ${pos} (all picks)`, posPicks),
      },
        el("td", {},
          el("span", { class: "swatch", style: "background:" + POSITION_COLORS[pos] }),
          pos + " — Total"
        ),
        cellFor(posPicks.filter(p => p.round === 1), pos + " Round 1"),

        cellFor(posPicks.filter(p => p.round === 3), pos + " Round 3"),
        cellForGap(posPicks, pos + " all rounds"),
      ));
      // For each round, nest Early / Mid / Late sub-rows underneath.
      [1, 2, 3].forEach(rd => {
        const roundPicks = posPicks.filter(p => p.round === rd);
        if (!roundPicks.length) return;
        ["Early", "Mid", "Late"].forEach(tier => {
          const tierPicks = roundPicks.filter(p => tierOfPickInRound(p.pickInRound) === tier);
          if (!tierPicks.length) return;
          const slotRange = tier === "Early" ? "1-4" : tier === "Mid" ? "5-8" : "9-12";

    ));

  // ----- Card: Year Strength -----
  const ysCard = el("div", { class: "card" }, el("h2", {}, "Year Strength"));
  const overall = tally(state.picks.filter(p => p.round));
  const overallHit = overall.graded ? overall.hit / overall.graded : 0;
  const overallHM = overall.graded ? (overall.hit + overall.meh) / overall.graded : 0;
  // Composite score weights Hit % at 0.7 and (Hit + Meh) % at 0.3, so straight
  // hits drive the rating but a year with extra Mehs still gets some credit.
  const HIT_WEIGHT = 0.7, HM_WEIGHT = 0.3;
  function strengthScore(hp, hmp) { return HIT_WEIGHT * hp + HM_WEIGHT * hmp; }
  const overallScore = strengthScore(overallHit, overallHM);
  // Compute strongest and weakest years for lede
  const yearStats = state.years
    .map(y => {
      const t = tally(state.picks.filter(p => p.year === y && p.round));
      const hp = t.graded ? t.hit / t.graded : 0;
      const hmp = t.graded ? (t.hit + t.meh) / t.graded : 0;
      return { y, t, hp, hmp, score: strengthScore(hp, hmp) };
    })
    .filter(r => r.t.graded > 0);
  if (yearStats.length >= 2) {
    const sorted = yearStats.slice().sort((a, b) => b.score - a.score);
    const best = sorted[0], worst = sorted[sorted.length - 1];
