<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d1117" />
<title>Draft Picks Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%88%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c232c;
    --border: #2a313a;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --hit: #2ea043;
    --hit-bg: rgba(46,160,67,0.15);
    --meh: #d29922;
    --meh-bg: rgba(210,153,34,0.15);
    --miss: #f85149;
    --miss-bg: rgba(248,81,73,0.12);
    --pending: #6e7681;
    --pending-bg: rgba(110,118,129,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
  }
  .status {
    color: var(--muted);
    font-size: 13px;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--hit);
  }
  .status-dot.loading { background: var(--meh); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--miss); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  button.refresh {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  button.refresh:hover { background: var(--border); }
  nav.tabs {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: -17px;
  }
  nav.tabs button {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  nav.tabs button.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  nav.tabs button:hover:not(.active) { color: var(--text); }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .custom-select { position: relative; min-width: 200px; }
  .custom-select-trigger {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .custom-select-trigger:hover {
    border-color: var(--accent);
    background: var(--panel-2);
  }
  .custom-select.open .custom-select-trigger {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  }
  .custom-select-chevron {
    color: var(--muted);
    font-size: 10px;
    transition: transform 0.15s;
  }
  .custom-select.open .custom-select-chevron { transform: rotate(180deg); }
  .custom-select-menu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    max-height: 320px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    padding: 4px;
  }
  .custom-select.open .custom-select-menu { display: block; }
  .custom-select-option {
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
  }
  .custom-select-option:hover { background: var(--panel-2); }
  .custom-select-option.selected {
    background: rgba(88, 166, 255, 0.12);
    color: var(--accent);
  }
  .grid {
    display: grid;
    gap: 16px;
  }
  .grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card h2, .card h3 {
    margin: 0 0 12px;
    font-size: 16px;
    font-weight: 600;
  }
  .card h2 { font-size: 18px; }
  .round-header {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .round-header:first-child { margin-top: 0; }
  .pick-row {
    display: grid;
    grid-template-columns: 110px 1fr 70px;
    gap: 12px;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .pick-row.with-slot {
    grid-template-columns: 110px 56px 1fr 70px;
  }
  .pick-slot {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }
  .pick-row:hover { background: var(--panel-2); }
  .pick-person {
    font-weight: 600;
    color: var(--text);
  }
  .pick-player { color: var(--text); }
  .pick-result {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .result-hit { background: var(--hit-bg); color: var(--hit); }
  .result-meh { background: var(--meh-bg); color: var(--meh); }
  .result-miss { background: var(--miss-bg); color: var(--miss); }
  .result-pending { background: var(--pending-bg); color: var(--pending); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--muted);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.tight, th.tight { padding-left: 6px; padding-right: 6px; white-space: nowrap; width: 1%; }
  td.gap-left, th.gap-left { padding-left: 24px; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th.sortable .arrow { margin-left: 4px; opacity: 0.6; }
  th.sortable.active { color: var(--accent); }
  th.sortable.active .arrow { opacity: 1; }
  tr:hover td { background: var(--panel-2); }
  .bar-row {
    display: flex;
    height: 6px;
    min-width: 60px;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
    background: var(--panel-2);
  }
  .bar-hit { background: var(--hit); }
  .bar-meh { background: var(--meh); }
  .bar-miss { background: var(--miss); }
  .pct { color: var(--muted); font-size: 12px; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 600;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .empty {
    color: var(--muted);
    text-align: center;
    padding: 40px 20px;
    font-style: italic;
  }
  .swatch {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
    vertical-align: middle;
    margin-right: 8px;
  }
  .color-row {
    display: grid;
    grid-template-columns: 28px 110px 1fr;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 6px;
  }
  .color-row:hover { background: var(--panel-2); }
  .color-row input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    width: 90px;
  }
  .color-row input:focus { outline: none; border-color: var(--accent); }
  tr.pos-total td { font-weight: 600; border-top: 1px solid var(--border); }
  tr.pos-sub td:first-child {
    padding-left: 28px;
    color: var(--muted);
    font-size: 13px;
  }
  tr.pos-sub td { color: var(--muted); }
  tr.pos-tier td:first-child {
    padding-left: 52px;
    color: var(--muted);
    font-size: 12px;
  }
  tr.pos-tier td { color: var(--muted); font-size: 12px; }
  td.cell-best {
    background: rgba(46, 160, 67, 0.14);
    color: var(--hit);
    font-weight: 600;
  }

  .ws-switch {
    display: inline-flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .ws-switch .ws-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  .ws-switch .ws-btn.active {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--border);
  }
  .ws-switch .ws-btn:hover:not(.active) { color: var(--text); }

  .draft-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 800px) {
    .draft-grid { grid-template-columns: 1fr; }
  }
  .on-clock-banner {
    background: linear-gradient(90deg, rgba(46,160,67,0.18), rgba(46,160,67,0.05));
    border-left: 4px solid var(--hit);
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 15px;
    font-weight: 600;
  }
  .rec-card {
    background: rgba(46,160,67,0.10);
    border: 1px solid rgba(46,160,67,0.4);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .rec-card .rec-label {
    color: var(--hit);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .rec-card .rec-player {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .rec-card .rec-meta {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
  }
  .roster-section { margin-bottom: 12px; }
  .roster-section h4 {
    margin: 0 0 6px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .roster-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .roster-chip {
    background: var(--panel-2);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text);
  }
  .roster-chip.is-rookie { color: var(--accent); border: 1px solid rgba(88,166,255,0.4); }
  .draft-pill {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--panel-2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
  }
  .draft-pill.live { background: rgba(248,81,73,0.15); color: var(--miss); }
  .draft-pill.pre { background: var(--panel-2); }
  .draft-pill.done { background: rgba(46,160,67,0.15); color: var(--hit); }
  .pick-history-row {
    display: grid;
    grid-template-columns: 56px 1fr 110px;
    gap: 8px;
    align-items: center;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  .pick-history-row.is-mine { background: rgba(88,166,255,0.10); }
  .pick-history-slot { color: var(--muted); font-variant-numeric: tabular-nums; }
  .pick-history-by { color: var(--muted); font-size: 12px; text-align: right; }
  .toggle-row {
    display: flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 12px;
  }
  .toggle-row button {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
  }
  .toggle-row button.active {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--border);
  }

  .section-header {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    margin: 28px 4px 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-header:first-child { margin-top: 0; }
  .section-header .section-sub {
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    color: var(--muted);
    margin-left: 12px;
    font-size: 12px;
    opacity: 0.7;
  }

  .card-lede {
    background: var(--panel-2);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    margin: -4px 0 14px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .card-lede strong { color: var(--accent); }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .pill-strong { background: rgba(46,160,67,0.18); color: var(--hit); }
  .pill-weak { background: rgba(248,81,73,0.15); color: var(--miss); }
  .pill-avg { background: var(--panel-2); color: var(--muted); }

  .surplus-list { display: flex; flex-direction: column; gap: 4px; }
  .surplus-row {
    display: grid;
    grid-template-columns: 80px minmax(0, 1fr) 140px 80px;
    gap: 12px;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .surplus-row:hover { background: var(--panel-2); }
  .surplus-slot { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; }
  .surplus-player { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .surplus-by { color: var(--muted); font-size: 13px; text-align: right; }
  .surplus-delta {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 13px;
  }
  .delta-pos { color: var(--hit); }
  .delta-neg { color: var(--miss); }

  @media (max-width: 640px) {
    .surplus-row {
      grid-template-columns: 70px minmax(0,1fr) 70px;
      font-size: 13px;
    }
    .surplus-by { display: none; }
  }

  .pos-chip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .pos-qb { background: rgba(224,102,102,0.18); color: #f08585; }
  .pos-rb { background: rgba(106,168,79,0.18); color: #8bc46c; }
  .pos-wr { background: rgba(60,120,216,0.18); color: #6da3ed; }
  .pos-te { background: rgba(246,178,107,0.18); color: #f6c084; }
  .pos-other { background: var(--panel-2); color: var(--muted); }

  .trade-block {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.015);
  }
  .trade-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .trade-date { font-weight: 600; }
  .trade-meta { color: var(--muted); font-size: 13px; }
  .trade-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .trade-col {
    background: var(--panel-2);
    border-radius: 6px;
    padding: 10px;
  }
  .trade-col-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .trade-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 14px;
    flex-wrap: wrap;
  }
  .trade-player { font-weight: 500; }
  .trade-where { color: var(--muted); font-size: 12px; margin-left: auto; }
  .trade-resolved { color: var(--muted); font-size: 13px; }
  .auto-grade-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .auto-big-hit { background: rgba(46,160,67,0.30); color: #74e08c; }
  .auto-hit { background: rgba(46,160,67,0.15); color: var(--hit); }
  .auto-meh { background: rgba(210,153,34,0.15); color: var(--meh); }
  .auto-miss { background: rgba(248,81,73,0.15); color: var(--miss); }
  .auto-big-miss { background: rgba(248,81,73,0.30); color: #ff7e74; }
  .auto-pending { background: var(--panel-2); color: var(--muted); }

  .trade-value-tag {
    margin-left: auto;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
  }
  .trade-empty { color: var(--muted); font-style: italic; font-size: 13px; }

  @media (max-width: 640px) {
    .trade-cols { grid-template-columns: 1fr; }
    .trade-where { margin-left: 0; }
    .trade-header { flex-direction: column; gap: 4px; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 640px) {
    header { padding: 10px 14px; }
    h1 { font-size: 17px; }
    .header-row { gap: 10px; }
    .status { font-size: 12px; gap: 6px; }
    button.refresh { padding: 5px 10px; font-size: 12px; }

    nav.tabs {
      margin: 12px -14px -11px;
      padding: 0 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav.tabs::-webkit-scrollbar { display: none; }
    nav.tabs button {
      flex-shrink: 0;
      padding: 8px 12px;
      font-size: 13px;
    }

    main { padding: 14px 12px 24px; }
    .controls { gap: 8px; }
    .custom-select { min-width: 100%; }
    .custom-select-menu { max-height: 60vh; }

    .stat-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat { padding: 10px 12px; }
    .stat-label { font-size: 11px; }
    .stat-value { font-size: 20px; }

    .card { padding: 12px; overflow-x: auto; }
    .card h2 { font-size: 15px; margin-bottom: 10px; }
    .card h3 { font-size: 14px; }

    table { font-size: 12px; }
    th, td { padding: 8px 6px; }
    td.tight, th.tight { padding-left: 4px; padding-right: 4px; }
    td.gap-left, th.gap-left { padding-left: 14px; }

    .pick-row {
      grid-template-columns: 64px minmax(0, 1fr) 72px;
      gap: 6px;
      padding: 7px 4px;
      font-size: 13px;
    }
    .pick-row.with-slot {
      grid-template-columns: 60px 42px minmax(0, 1fr) 72px;
    }
    .pick-player { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pick-result { font-size: 10px; padding: 2px 4px; }
    .round-header { font-size: 11px; }

    /* Keep the Result/Mix bar visible on mobile — tables can scroll horizontally */

    .section-header {
      margin: 22px 0 10px;
      font-size: 11px;
    }
    .section-header .section-sub {
      display: block;
      margin: 3px 0 0;
      font-size: 11px;

<body>
<header>
  <div class="header-row">
    <h1>🏈 Draft Picks Tracker</h1>
    <div class="ws-switch" id="wsSwitch">
      <button class="ws-btn" data-ws="stats">Stats</button>
      <button class="ws-btn" data-ws="draft">Live Draft</button>
    </div>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Loading…</span>

    </div>
  </div>
  <nav class="tabs" id="statsTabs">
    <button data-view="overview" class="active">Overview</button>
    <button data-view="year">By Year</button>

    <button data-view="leaderboard">Leaderboard</button>
    <button data-view="rankings">Rankings</button>
    <button data-view="rosters">Rosters</button>
    <button data-view="stats">Stats</button>
    <button data-view="trades">Trades</button>
  </nav>
</header>
<main id="main">
  <div class="empty">Loading draft data…</div>
</main>
<footer>
  Live from <a class="subtle" href="https://docs.google.com/spreadsheets/d/116MXUbHLTCDdSgVx5dZZYW0lydVyAN0rkeItdq-U7Bo/edit" target="_blank" rel="noopener">Google Sheets</a>.
  Auto-refreshes every 60 seconds.
</footer>
<script>
const REFRESH_MS = 60_000;

// Fixed color → position mapping. Cells in the sheet are colored:
//   red → QB, green → RB, blue → WR, orange → TE
const POSITION_COLORS = {
  QB: "#e06666",
  RB: "#6aa84f",
  WR: "#3c78d8",
  TE: "#f6b26b",
};
function classifyColor(hex) {
  if (!hex) return null;
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  if (max === min) return null;
  const d = max - min;
  let h;
  if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) * 60;
  else if (max === g) h = ((b - r) / d + 2) * 60;
  else h = ((r - g) / d + 4) * 60;
  if (h < 0) h += 360;
  if (h >= 330 || h < 20) return "QB";       // red
  if (h >= 20 && h < 60) return "TE";        // orange/yellow
  if (h >= 60 && h < 170) return "RB";       // green
  if (h >= 170 && h < 270) return "WR";      // blue
  return null;
}

const LS_WORKSPACE = "dp.workspace.v1";
const LS_DRAFT_USER = "dp.draftUserId.v1";
const LS_DRAFT_MODE = "dp.draftMode.v1";

let state = {
  workspace: (() => { try { return localStorage.getItem(LS_WORKSPACE) || "stats"; } catch { return "stats"; } })(),
  draft: {
    data: null,
    ktcLive: null,
    ktcDynasty: null,
    flockLive: null,
    flockError: null,
    loading: false,
    error: null,
    myUserId: (() => { try { return localStorage.getItem(LS_DRAFT_USER); } catch { return null; } })(),
    posMode: (() => { try { return localStorage.getItem(LS_DRAFT_MODE) === "pos"; } catch { return false; } })(),
    lastPoll: null,
    pollTimer: null,
  },
  picks: [],          // {year, round, person, player, result, color, pos}
  years: [],
  people: [],
  view: "overview",
  selectedYear: null,
  selectedPerson: null,
  lastUpdated: null,
  overviewSort: { col: "year", dir: "asc" },
  leaderboardSort: { col: "hitPct", dir: "desc" },
  rankingsSort: "composite",  // "composite" | "value" | "contender"
  rosterTeam: null,            // selected user_id on the Rosters tab
  flockLive: null,             // shared flock-live response for non-draft views
  flockLiveLoading: false,
  flockLiveError: null,
  ktcDynasty: null,            // current KTC superflex dynasty values (shared)
  ktcDynastyLoading: false,
  ktcDynastyError: null,
  leaderboardRound: null,
  statsRound: null,
  statsInsightDrafter: null,
  bestPosMetric: "hit",  // "hit" or "hm"
  sleeper: null,            // {seasons, players}
  sleeperLoading: false,
  sleeperError: null,
  draftsSeason: null,
  tradesUserId: null,
  ktc: null,                // {seasons: {year: {snapshot, players: {normName: {rank,value,position}}}}}
  ktcLoading: false,
  ktcError: null,
  tradeHistory: null,
  tradeHistoryLoading: false,
  tradeHistoryError: null,
};

function rgbToHex(bg) {
  if (!bg) return null;
  const r = Math.round((bg.red || 0) * 255);
  const g = Math.round((bg.green || 0) * 255);
  const b = Math.round((bg.blue || 0) * 255);
  if (r >= 248 && g >= 248 && b >= 248) return null;  // treat white-ish as no color
  return "#" + [r, g, b].map(x => x.toString(16).padStart(2, "0")).join("");
}

function toggleSort(sortState, col) {
  if (sortState.col === col) {
    sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
  } else {
    sortState.col = col;
    sortState.dir = "desc";
  }
}

function sortHeader(label, col, sortState, onClick, extraClass, baseClass) {
  const active = sortState.col === col;
  const arrow = active ? (sortState.dir === "asc" ? "▲" : "▼") : "";
  const base = baseClass != null ? baseClass : "num tight";
  return el("th", {
    class: base + " sortable" + (active ? " active" : "") + (extraClass ? " " + extraClass : ""),
    onclick: onClick,
  }, label, arrow ? el("span", { class: "arrow" }, arrow) : "");
}

function cellVal(rows, r, c) {
  const row = rows[r];
  if (!row) return "";
  const cell = row[c];
  return cell ? (cell.v || "") : "";
}
function cellColor(rows, r, c) {
  const row = rows[r];
  if (!row) return null;
  const cell = row[c];
  return cell ? rgbToHex(cell.bg) : null;
}

function extractPicks(rows) {
  // Find year headers: cellVal matches /^(\d{4}) Draft$/
  const yearHeaders = [];
  rows.forEach((row, ri) => {
    row.forEach((cell, ci) => {
      const m = ((cell && cell.v) || "").trim().match(/^(\d{4}) Draft$/);
      if (m) yearHeaders.push({ year: parseInt(m[1], 10), row: ri, col: ci });
    });
  });
  yearHeaders.sort((a, b) => a.row - b.row);

  const picks = [];
  yearHeaders.forEach((yh, idx) => {
    const endRow = idx + 1 < yearHeaders.length ? yearHeaders[idx + 1].row : rows.length;
    const yearCol = yh.col;
    const personCol = yearCol - 1;
    const playerCol = yearCol;
    const resultCol = yearCol + 1;
    let currentRound = null;
    let pickInRound = 0;
    for (let r = yh.row + 1; r < endRow; r++) {
      const yearColVal = cellVal(rows, r, yearCol).trim();
      const roundMatch = yearColVal.match(/^Round\s*(\d+)$/i);
      if (roundMatch) {
        currentRound = parseInt(roundMatch[1], 10);
        pickInRound = 0;
        continue;
      }
      const person = cellVal(rows, r, personCol).trim();
      const player = cellVal(rows, r, playerCol).trim();
      const result = cellVal(rows, r, resultCol).trim();
      if (!person) continue;
      if (/^Round\s*\d+$/i.test(person)) continue;
      if (/^Round\s*\d+$/i.test(player)) continue;
      if (/^[\d,\s]+$/.test(person)) continue;
      pickInRound += 1;
      const slot = currentRound ? `${currentRound}.${String(pickInRound).padStart(2, "0")}` : null;
      const color = cellColor(rows, r, playerCol);
      picks.push({
        year: yh.year,
        round: currentRound,
        pickInRound,
        slot,
        person: person === "Me" ? "Henry" : person,
        player: player || null,
        result: normalizeResult(result),
        color,
        pos: classifyColor(color),
      });
    }
  });
  return picks;
}

function normalizeResult(r) {
  if (!r) return null;
  const s = r.trim().toLowerCase();
  if (s === "hit") return "Hit";
  if (s === "meh") return "Meh";
  if (s === "miss") return "Miss";
  return null;
}

function resultClass(r) {
  if (r === "Hit") return "result-hit";
  if (r === "Meh") return "result-meh";
  if (r === "Miss") return "result-miss";
  return "result-pending";
}

function tally(picks) {
  let hit = 0, meh = 0, miss = 0, pending = 0;
  picks.forEach(p => {
    if (p.result === "Hit") hit++;
    else if (p.result === "Meh") meh++;
    else if (p.result === "Miss") miss++;
    else if (p.player) pending++;
    // Picks with no player assigned (future slots) are excluded from totals.
  });
  return { hit, meh, miss, pending, total: hit + meh + miss + pending, graded: hit + meh + miss };
}

function uniqueSorted(arr) { return [...new Set(arr)].sort(); }

function formatPct(n, d) {
  if (!d) return "—";
  return ((n / d) * 100).toFixed(1) + "%";
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === "class") e.className = attrs[k];
    else if (k === "html") e.innerHTML = attrs[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function customSelect(options, currentValue, onChange) {
  const wrap = el("div", { class: "custom-select" });
  const currentOpt = options.find(o => o.value === currentValue);
  const triggerLabel = el("span", {}, currentOpt ? currentOpt.label : "");
  const trigger = el("button", {
    class: "custom-select-trigger",
    type: "button",
    "aria-haspopup": "listbox",
    "aria-expanded": "false",
  }, triggerLabel, el("span", { class: "custom-select-chevron" }, "▼"));
  const menu = el("div", { class: "custom-select-menu", role: "listbox" });

  function close() {
    wrap.classList.remove("open");
    trigger.setAttribute("aria-expanded", "false");
    document.removeEventListener("click", outside);
    document.removeEventListener("keydown", onKey);
  }
  function openMenu() {
    document.querySelectorAll(".custom-select.open").forEach(s => {
      if (s !== wrap) s.classList.remove("open");
    });
    wrap.classList.add("open");
    trigger.setAttribute("aria-expanded", "true");
    setTimeout(() => {
      document.addEventListener("click", outside);
      document.addEventListener("keydown", onKey);
    }, 0);
  }
  function outside(e) { if (!wrap.contains(e.target)) close(); }
  function onKey(e) { if (e.key === "Escape") close(); }

  options.forEach(opt => {
    const item = el("div", {
      class: "custom-select-option" + (opt.value === currentValue ? " selected" : ""),
      role: "option",
      onclick: e => {
        e.stopPropagation();
        close();
        onChange(opt.value);
      },
    }, opt.label);
    menu.appendChild(item);
  });

  trigger.addEventListener("click", e => {
    e.stopPropagation();
    wrap.classList.contains("open") ? close() : openMenu();
  });

  wrap.appendChild(trigger);
  wrap.appendChild(menu);
  return wrap;
}

function renderBar(t) {
  const total = t.graded || 1;
  const hitW = (t.hit / total) * 100;
  const mehW = (t.meh / total) * 100;
  const missW = (t.miss / total) * 100;
  return el("div", { class: "bar-row" },
    el("div", { class: "bar-hit", style: `width:${hitW}%` }),
    el("div", { class: "bar-meh", style: `width:${mehW}%` }),
    el("div", { class: "bar-miss", style: `width:${missW}%` }),
  );
}

function renderPickRow(p) {
  return el("div", { class: "pick-row with-slot" },
    el("div", { class: "pick-person" }, p.person),
    el("div", { class: "pick-slot" }, p.slot || "—"),
    el("div", { class: "pick-player" }, p.player || el("span", { class: "pct" }, "—")),
    el("div", { class: "pick-result " + resultClass(p.result) }, p.result || "Pending"),
  );
}

function renderOverview() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  const t = tally(state.picks);
  const stats = el("div", { class: "stat-grid" },
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Total Picks"), el("div", { class: "stat-value" }, String(t.total))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Years"), el("div", { class: "stat-value" }, String(state.years.length))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Drafters"), el("div", { class: "stat-value" }, String(state.people.length))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit Rate"), el("div", { class: "stat-value" }, formatPct(t.hit, t.graded))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit + Meh %"), el("div", { class: "stat-value" }, formatPct(t.hit + t.meh, t.graded))),
  );
  main.appendChild(stats);

  // Per-year summary card
  const yearCard = el("div", { class: "card" }, el("h2", {}, "By Year"));
  const yearTable = el("table", {},
    el("thead", {}, el("tr", {},
      el("th", {}, "Year"),
      el("th", { class: "num" }, "Picks"),
      el("th", { class: "num tight" }, "Hit"),
      el("th", { class: "num tight" }, "Meh"),
      el("th", { class: "num tight" }, "Miss"),
      sortHeader("Hit %", "hitPct", state.overviewSort, () => { toggleSort(state.overviewSort, "hitPct"); render(); }, "gap-left"),
      sortHeader("Hit + Meh", "hmPct", state.overviewSort, () => { toggleSort(state.overviewSort, "hmPct"); render(); }),
      el("th", { class: "mobile-hide" }, "Result"),
    ))
  );
  const tbody = el("tbody", {});
  const yearRows = state.years.map(y => {
    const yp = state.picks.filter(p => p.year === y);
    const t = tally(yp);
    return { y, t, hitPct: t.graded ? t.hit / t.graded : -1, hmPct: t.graded ? (t.hit + t.meh) / t.graded : -1 };
  });
  const sd = state.overviewSort.dir === "asc" ? 1 : -1;
  if (state.overviewSort.col === "year") yearRows.sort((a, b) => sd * (a.y - b.y));
  else yearRows.sort((a, b) => sd * (a[state.overviewSort.col] - b[state.overviewSort.col]));
  yearRows.forEach(({ y, t }) => {
    const tr = el("tr", {
      style: "cursor:pointer",
      onclick: () => { state.view = "year"; state.selectedYear = y; setActiveTab("year"); render(); }
    },
      el("td", {}, String(y)),
      el("td", { class: "num" }, String(t.total)),
      el("td", { class: "num tight" }, String(t.hit)),
      el("td", { class: "num tight" }, String(t.meh)),
      el("td", { class: "num tight" }, String(t.miss)),
      el("td", { class: "num tight gap-left" }, formatPct(t.hit, t.graded)),
      el("td", { class: "num tight" }, formatPct(t.hit + t.meh, t.graded)),
      el("td", { class: "mobile-hide" }, renderBar(t)),
    );
    tbody.appendChild(tr);
  });
  yearTable.appendChild(tbody);
  yearCard.appendChild(yearTable);
  main.appendChild(yearCard);
}

function renderYearView() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const controls = el("div", { class: "controls" });
  if (state.selectedYear == null) state.selectedYear = state.years[state.years.length - 1];
  const yearOpts = state.years.slice().reverse().map(y => ({ value: y, label: y + " Draft" }));
  controls.appendChild(customSelect(yearOpts, state.selectedYear, v => {
    state.selectedYear = v;
    renderYearView();
  }));
  main.appendChild(controls);

  const yearPicks = state.picks.filter(p => p.year === state.selectedYear);
  const t = tally(yearPicks);

  const stats = el("div", { class: "stat-grid" },
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Picks"), el("div", { class: "stat-value" }, String(t.total))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit"), el("div", { class: "stat-value" }, String(t.hit))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Meh"), el("div", { class: "stat-value" }, String(t.meh))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Miss"), el("div", { class: "stat-value" }, String(t.miss))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit %"), el("div", { class: "stat-value" }, formatPct(t.hit, t.graded))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit + Meh %"), el("div", { class: "stat-value" }, formatPct(t.hit + t.meh, t.graded))),
  );
  main.appendChild(stats);

  // Group by round
  const rounds = uniqueSorted(yearPicks.map(p => p.round || 0));
  const card = el("div", { class: "card" });
  card.appendChild(el("h2", {}, state.selectedYear + " Draft"));
  rounds.forEach(r => {
    card.appendChild(el("div", { class: "round-header" }, r ? "Round " + r : "Unknown Round"));
    yearPicks.filter(p => (p.round || 0) === r).forEach(p => {
      card.appendChild(renderPickRow(p));
    });
  });
  if (!yearPicks.length) card.appendChild(el("div", { class: "empty" }, "No picks recorded for this year yet."));
  main.appendChild(card);
}

function renderPersonView() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const controls = el("div", { class: "controls" });
  if (!state.selectedPerson) state.selectedPerson = state.people[0];
  const personOpts = state.people.map(p => ({ value: p, label: p }));
  controls.appendChild(customSelect(personOpts, state.selectedPerson, v => {
    state.selectedPerson = v;
    renderPersonView();
  }));
  main.appendChild(controls);

  const personPicks = state.picks.filter(p => p.person === state.selectedPerson);
  const t = tally(personPicks);

  const stats = el("div", { class: "stat-grid" },
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Total Picks"), el("div", { class: "stat-value" }, String(t.total))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit"), el("div", { class: "stat-value" }, String(t.hit))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Meh"), el("div", { class: "stat-value" }, String(t.meh))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Miss"), el("div", { class: "stat-value" }, String(t.miss))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit %"), el("div", { class: "stat-value" }, formatPct(t.hit, t.graded))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit + Meh %"), el("div", { class: "stat-value" }, formatPct(t.hit + t.meh, t.graded))),
  );
  main.appendChild(stats);

  const yearsForPerson = uniqueSorted(personPicks.map(p => p.year)).reverse();
  const card = el("div", { class: "card" });
  card.appendChild(el("h2", {}, state.selectedPerson + "'s Picks"));
  yearsForPerson.forEach(y => {
    const yp = personPicks.filter(p => p.year === y);
    const ty = tally(yp);
    card.appendChild(el("div", { class: "round-header" },
      y + "  ·  " + ty.hit + "H / " + ty.meh + "M / " + ty.miss + "X" +
      (ty.graded ? "  ·  " + formatPct(ty.hit, ty.graded) : "")
    ));
    yp.forEach(p => {
      const row = el("div", { class: "pick-row" },
        el("div", { class: "pick-person" }, p.slot || "—"),
        el("div", { class: "pick-player" }, p.player || el("span", { class: "pct" }, "—")),
        el("div", { class: "pick-result " + resultClass(p.result) }, p.result || "Pending"),
      );
      card.appendChild(row);
    });
  });
  main.appendChild(card);
}

function renderLeaderboard() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  const controls = el("div", { class: "controls" });
  const roundOpts = [
    { value: null, label: "All Rounds" },
    { value: 1, label: "Round 1 only" },
    { value: 2, label: "Round 2 only" },
    { value: 3, label: "Round 3 only" },
  ];
  controls.appendChild(customSelect(roundOpts, state.leaderboardRound, v => {
    state.leaderboardRound = v;
    render();
  }));
  main.appendChild(controls);

  const title = state.leaderboardRound
    ? `Round ${state.leaderboardRound} Hit Rates`
    : "All-Time Hit Rates";
  const card = el("div", { class: "card" }, el("h2", {}, title));
  const table = el("table", {},
    el("thead", {}, el("tr", {},
      sortHeader("Drafter", "person", state.leaderboardSort, () => { toggleSort(state.leaderboardSort, "person"); render(); }, null, ""),
      sortHeader("Picks", "total", state.leaderboardSort, () => { toggleSort(state.leaderboardSort, "total"); render(); }, null, "num"),
      sortHeader("Hit", "hit", state.leaderboardSort, () => { toggleSort(state.leaderboardSort, "hit"); render(); }),
      sortHeader("Meh", "meh", state.leaderboardSort, () => { toggleSort(state.leaderboardSort, "meh"); render(); }),
      sortHeader("Miss", "miss", state.leaderboardSort, () => { toggleSort(state.leaderboardSort, "miss"); render(); }),
      sortHeader("Hit %", "hitPct", state.leaderboardSort, () => { toggleSort(state.leaderboardSort, "hitPct"); render(); }, "gap-left"),
      sortHeader("Hit + Meh", "hmPct", state.leaderboardSort, () => { toggleSort(state.leaderboardSort, "hmPct"); render(); }),
      el("th", { class: "mobile-hide" }, "Mix"),
    )),
  );
  const tbody = el("tbody", {});
  const ranked = state.people
    .map(p => {
      const all = state.picks.filter(x => x.person === p);
      const scoped = state.leaderboardRound == null
        ? all
        : all.filter(x => x.round === state.leaderboardRound);
      const t = tally(scoped);
      return {
        person: p, t,
        total: t.total, hit: t.hit, meh: t.meh, miss: t.miss,
        hitPct: t.graded ? t.hit / t.graded : -1,
        hmPct: t.graded ? (t.hit + t.meh) / t.graded : -1,
      };
    })
    .filter(r => r.t.graded > 0);
  const lsd = state.leaderboardSort.dir === "asc" ? 1 : -1;
  const sortKey = state.leaderboardSort.col;
  ranked.sort((a, b) => {
    if (sortKey === "person") return lsd * a.person.localeCompare(b.person);
    return lsd * ((a[sortKey] || 0) - (b[sortKey] || 0));
  });

  ranked.forEach(r => {

// Picks ordered chronologically per drafter (year, then by global pick number in the draft)
function picksSequenceByDrafter(picks) {
  const groups = {};
  picks.forEach(p => {
    if (!p.player || !p.round || !p.pickInRound) return;
    (groups[p.person] = groups[p.person] || []).push(p);
  });
  Object.values(groups).forEach(arr => arr.sort((a, b) => {
    if (a.year !== b.year) return a.year - b.year;
    return ((a.round - 1) * 12 + a.pickInRound) - ((b.round - 1) * 12 + b.pickInRound);
  }));
  return groups;
}

// All picks across the league in global draft order
function picksInDraftOrder(picks) {
  return picks.slice()
    .filter(p => p.player && p.round && p.pickInRound)
    .sort((a, b) => {
      if (a.year !== b.year) return a.year - b.year;
      return ((a.round - 1) * 12 + a.pickInRound) - ((b.round - 1) * 12 + b.pickInRound);
    });
}

function tierOfPickInRound(pir) {
  if (!pir) return null;
  if (pir <= 4) return "Early";
  if (pir <= 8) return "Mid";
  return "Late";
}

// Compute KTC superflex value totals for every roster in the current league.
function computeManagerRankings() {
  if (!state.sleeper || !state.sleeper.seasons.length) return null;
  if (!state.ktcDynasty || !state.ktcDynasty.players) return null;
  const latestSeason = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  // Current KTC dynasty values (re-key { normName: { value } } to { normName: value }).
  const ktcRaw = state.ktcDynasty.players || {};
  const ktcPlayers = {};
  Object.entries(ktcRaw).forEach(([n, v]) => { ktcPlayers[n] = v && v.value ? v.value : 0; });
  const ktcPicks = state.ktcDynasty.picks || {};
  const tradedPicks = state.sleeper.traded_picks || [];

  const currentRookieDraft = (latestSeason.drafts || []).find(
    d => d.rounds === 3 && (d.status === "pre_draft" || d.status === "drafting" || d.status === "complete")
  );
  const slotMap = currentRookieDraft ? currentRookieDraft.slot_to_roster_id || {} : {};
  const currentYear = parseInt(latestSeason.season, 10);

  function tierForRoster(season, rosterId) {
    if (season !== currentYear) return "mid";
    const entry = Object.entries(slotMap).find(([, r]) => r === rosterId);
    if (!entry) return "mid";
    const slot = parseInt(entry[0], 10);
    if (slot <= 4) return "early";
    if (slot <= 8) return "mid";
    return "late";
  }
  function pickVal(season, round, tier) {
    return ktcPicks[`${season}|${tier}|${round}`] || 0;
  }

  const FUTURE_YEARS = [currentYear, currentYear + 1, currentYear + 2];
  const ROUNDS = [1, 2, 3];
  function rosterPickValue(rosterId) {
    let total = 0;
    FUTURE_YEARS.forEach(season => {
      ROUNDS.forEach(round => {
        const trades = tradedPicks.filter(t => parseInt(t.season, 10) === season && t.round === round);
        const tradedMap = new Map();
        trades.forEach(t => tradedMap.set(t.roster_id, t.owner_id));
        latestSeason.rosters.forEach(r => {
          const originalRoster = r.roster_id;
          const currentOwner = tradedMap.has(originalRoster) ? tradedMap.get(originalRoster) : originalRoster;
          if (currentOwner !== rosterId) return;
          const tier = tierForRoster(season, originalRoster);
          total += pickVal(season, round, tier);
        });
      });
    });
    return total;
  }

  const STARTING_SLOTS = [
    { pos: ["QB"], n: 1 },
    { pos: ["RB"], n: 2 },
    { pos: ["WR"], n: 3 },
    { pos: ["TE"], n: 1 },
    { pos: ["RB", "WR", "TE"], n: 1 },
    { pos: ["QB", "RB", "WR", "TE"], n: 1 },
  ];

  const rows = latestSeason.rosters.map(r => {
    const user = latestSeason.users.find(u => u.user_id === r.owner_id);
    const name = user ? canonicalOwnerName(userDisplay(user)) : "—";
    const byPos = { QB: [], RB: [], WR: [], TE: [] };
    let playerValue = 0;
    (r.players || []).forEach(pid => {
      const p = state.sleeper.players[pid];
      if (!p) return;
      const v = ktcPlayers[ktcNormalizeName(p.name)] || 0;
      playerValue += v;
      if (byPos[p.position]) byPos[p.position].push({ pid, value: v });
    });
    Object.values(byPos).forEach(arr => arr.sort((a, b) => b.value - a.value));
    let optimalValue = 0;
    const used = new Set();
    STARTING_SLOTS.forEach(slot => {
      const pool = slot.pos.flatMap(pos => byPos[pos].filter(x => !used.has(x.pid)));
      pool.sort((a, b) => b.value - a.value);
      for (let i = 0; i < slot.n && i < pool.length; i++) {
        optimalValue += pool[i].value;
        used.add(pool[i].pid);
      }
    });
    const pickValue = rosterPickValue(r.roster_id);
    return {
      roster_id: r.roster_id,
      name,
      playerValue,
      pickValue,
      totalValue: playerValue + pickValue,
      optimalValue,
    };
  });

  const N = rows.length;
  const valRanked = rows.slice().sort((a, b) => b.totalValue - a.totalValue);
  const conRanked = rows.slice().sort((a, b) => b.optimalValue - a.optimalValue);
  const valueRank = {}, contenderRank = {};
  valRanked.forEach((r, i) => { valueRank[r.roster_id] = i + 1; });
  conRanked.forEach((r, i) => { contenderRank[r.roster_id] = i + 1; });

  return rows.map(r => {
    const v = valueRank[r.roster_id];
    const c = contenderRank[r.roster_id];
    const vP = N > 1 ? (v - 1) / (N - 1) : 0.5;
    const cP = N > 1 ? (c - 1) / (N - 1) : 0.5;
    const composite = 0.6 * vP + 0.4 * cP;
    return { ...r, vRank: v, cRank: c, composite };
  });
}

function classifyManager(composite) {
  if (composite < 0.4) return { label: "Contender", pill: "pill-strong" };
  if (composite < 0.7) return { label: "Middler", pill: "pill-avg" };
  return { label: "Reloader", pill: "pill-weak" };
}

// Age-aware classification. Value still sets Cornerstone vs Droppable, but
// the "Tradeable" / "Wait & See" split inside the middle bands flips based on
// where the player sits on the position-specific aging curve: rising players
// (under prime) are Wait & See, declining ones (past prime) are Tradeable.
//
// Cliff = age at which the position's dynasty value starts to decline meaningfully.
const POSITION_AGE_CURVE = {
  QB: { rising: 26, cliff: 33 },   // QBs hold value the longest
  WR: { rising: 24, cliff: 28 },
  TE: { rising: 25, cliff: 30 },
  RB: { rising: 23, cliff: 26 },   // RBs age fastest
};

function classifyAsset(blended, position, age) {
  if (blended == null) blended = 0;
  // Picks have no age — classify by value only.
  if (position === "PICK") {
    if (blended >= 5000) return { label: "Cornerstone", chip: "auto-big-hit" };
    if (blended >= 2500) return { label: "Tradeable", chip: "auto-meh" };
    if (blended >= 1000) return { label: "Wait & See", chip: "auto-hit" };
    return { label: "Droppable", chip: "auto-miss" };
  }
  if (blended >= 7500) return { label: "Cornerstone", chip: "auto-big-hit" };
  if (blended < 1500) return { label: "Droppable", chip: "auto-miss" };
  // Middle bands split by age vs position curve.
  const curve = POSITION_AGE_CURVE[position] || POSITION_AGE_CURVE.WR;
  const cliffAge = age != null && age >= curve.cliff;
  const risingAge = age != null && age <= curve.rising;
  if (cliffAge) return { label: "Tradeable", chip: "auto-meh" };
  if (risingAge) return { label: "Wait & See", chip: "auto-hit" };
  // In-prime middle: default to Tradeable since they're at peak value to sell.
  return { label: "Tradeable", chip: "auto-meh" };
}

  );
  const slotMap = currentRookieDraft ? currentRookieDraft.slot_to_roster_id || {} : {};
  const currentYear = parseInt(latestSeason.season, 10);
  function tierFor(season, originalRosterId) {
    if (season !== currentYear) return "mid";
    const entry = Object.entries(slotMap).find(([, r]) => r === originalRosterId);
    if (!entry) return "mid";
    const slot = parseInt(entry[0], 10);
    if (slot <= 4) return "early";
    if (slot <= 8) return "mid";
    return "late";
  }
  const FUTURE_YEARS = [currentYear, currentYear + 1, currentYear + 2];
  const ROUNDS = [1, 2, 3];
  function picksOwnedBy(rosterId) {
    const out = [];
    FUTURE_YEARS.forEach(season => {
      ROUNDS.forEach(round => {
        const trades = tradedPicks.filter(t => parseInt(t.season, 10) === season && t.round === round);
        const tradedMap = new Map();
        trades.forEach(t => tradedMap.set(t.roster_id, t.owner_id));
        latestSeason.rosters.forEach(orig => {
          const currentOwner = tradedMap.has(orig.roster_id) ? tradedMap.get(orig.roster_id) : orig.roster_id;
          if (currentOwner !== rosterId) return;
          const tier = tierFor(season, orig.roster_id);
          const ktc = ktcPicks[`${season}|${tier}|${round}`] || 0;
          const tierCap = tier.charAt(0).toUpperCase() + tier.slice(1);
          const ord = round === 1 ? "st" : round === 2 ? "nd" : "rd";

            ktc, flock: 0,
            value: ktc,
            tier: classifyAsset(ktc, "PICK", null),

        });

    return out.sort((a, b) => b.value - a.value);

  function enrichPlayer(pid) {

    if (!p) return null;
    const norm = ktcNormalizeName(p.name);
    const ktc = ktcPlayers[norm] || 0;
    const flock = flockByName[norm] || 0;
    const blended = ktc && flock ? (ktc + flock) / 2 : (ktc || flock);
    return {
      kind: "player",
      id: pid,
      name: p.name,
      position: p.position,
      age: p.age,
      ktc, flock,
      value: blended,
      tier: classifyAsset(blended, p.position, p.age),
    };
  }
  function assetsForRoster(rosterId) {
    const roster = latestSeason.rosters.find(r => r.roster_id === rosterId);
    if (!roster) return [];
    const players = (roster.players || []).map(enrichPlayer).filter(Boolean);
    return players.concat(picksOwnedBy(rosterId));
  }

  // ---------- Positional need ----------
  const POS = ["QB", "RB", "WR", "TE"];
  const valueByPosByRoster = {};
  latestSeason.rosters.forEach(r => {
    const byPos = { QB: 0, RB: 0, WR: 0, TE: 0 };
    (r.players || []).forEach(pid => {
      const p = state.sleeper.players[pid];
      if (!p || !POS.includes(p.position)) return;
      byPos[p.position] += ktcPlayers[ktcNormalizeName(p.name)] || 0;
    });
    valueByPosByRoster[r.roster_id] = byPos;
  });
  const leagueAvgByPos = { QB: 0, RB: 0, WR: 0, TE: 0 };
  Object.values(valueByPosByRoster).forEach(b => POS.forEach(p => leagueAvgByPos[p] += b[p]));
  POS.forEach(p => leagueAvgByPos[p] /= latestSeason.rosters.length || 1);
  function isWeakAt(rosterId, position) {
    return valueByPosByRoster[rosterId][position] < leagueAvgByPos[position] * 0.85;
  }

  const myAssets = assetsForRoster(selectedRoster.roster_id);

  // ===== Roster card =====

  const TIER_ORDER = ["Cornerstone", "Tradeable", "Wait & See", "Droppable"];

  rosterCard.appendChild(lede);
  TIER_ORDER.forEach(tier => {

    if (!tierAssets.length) return;
    rosterCard.appendChild(el("div", { class: "round-header" }, tier + " (" + tierAssets.length + ")"));
    tierAssets.forEach(a => {
      const valueBits = [];
      if (a.ktc) valueBits.push("KTC " + a.ktc.toLocaleString());
      if (a.flock) valueBits.push("Flock " + a.flock.toLocaleString());
      const nameLine = el("div", {}, a.name);

      if (a.age != null) nameLine.appendChild(el("span", { class: "pct", style: "margin-left:8px" }, "age " + a.age));
      nameLine.appendChild(el("span", { class: "auto-grade-chip " + a.tier.chip, style: "margin-left:8px" }, a.tier.label));
      rosterCard.appendChild(el("div", { class: "pick-history-row" },
        el("div", { class: "pick-history-slot" }, ""),
        nameLine,
        el("div", { class: "pick-history-by" }, valueBits.length ? valueBits.join("  ·  ") : "—"),
      ));
    });
  });
  main.appendChild(rosterCard);

  // ===== Multi-asset Trade Explorer =====
  const tradeCard = el("div", { class: "card" }, el("h2", {}, "Suggested Trades"));

  function movablePool(assets) {
    return assets.filter(a =>
      (a.tier.label === "Tradeable" || a.tier.label === "Wait & See") && a.value >= 1000
    );
  }
  function rosterImpact(rosterId, gives, gets) {
    const before = { ...valueByPosByRoster[rosterId] };
    POS.forEach(pos => { before[pos] = before[pos] || 0; });
    const after = { ...before };
    gives.forEach(a => {
      if (a.kind === "player" && POS.includes(a.position)) after[a.position] -= a.ktc || 0;
    });
    gets.forEach(a => {
      if (a.kind === "player" && POS.includes(a.position)) after[a.position] += a.ktc || 0;
    });
    const fits = [];
    POS.forEach(pos => {
      const wasWeak = before[pos] < leagueAvgByPos[pos] * 0.85;
      if (wasWeak && after[pos] > before[pos]) fits.push(pos);
    });
    return { before, after, fits };
  }
  function sumValues(assets) {
    let ktc = 0, flock = 0;
    assets.forEach(a => { ktc += a.ktc || 0; flock += a.flock || 0; });
    return { ktc, flock };
  }
  function bothCalcsAgree(givesSum, getsSum, tol = 0.12) {
    if (!givesSum.ktc || !getsSum.ktc) return false;
    const ktcDiff = Math.abs(givesSum.ktc - getsSum.ktc) / Math.max(givesSum.ktc, getsSum.ktc);
    if (ktcDiff > tol) return false;
    if (givesSum.flock && getsSum.flock) {
      const flockDiff = Math.abs(givesSum.flock - getsSum.flock) / Math.max(givesSum.flock, getsSum.flock);
      if (flockDiff > tol) return false;
    }
    return true;
  }
  function combos(arr, k) {
    if (k === 1) return arr.map(a => [a]);
    const out = [];
    for (let i = 0; i < arr.length; i++) {
      const tail = combos(arr.slice(i + 1), k - 1);
      tail.forEach(t => out.push([arr[i], ...t]));
    }
    return out;
  }

  const myMovable = movablePool(myAssets);
  const allTrades = [];
  latestSeason.rosters.forEach(other => {
    if (other.roster_id === selectedRoster.roster_id) return;
    const otherUser = latestSeason.users.find(u => u.user_id === other.owner_id);
    const otherName = otherUser ? canonicalOwnerName(userDisplay(otherUser)) : "—";
    const otherAssets = assetsForRoster(other.roster_id);
    const theirMovable = movablePool(otherAssets);
    const myTrimmed = myMovable.slice().sort((a, b) => b.value - a.value).slice(0, 15);
    const theirTrimmed = theirMovable.slice().sort((a, b) => b.value - a.value).slice(0, 15);
    const mySides = combos(myTrimmed, 1).concat(combos(myTrimmed, 2));
    const theirSides = combos(theirTrimmed, 1).concat(combos(theirTrimmed, 2));

    mySides.forEach(gives => {
      const gaveWeakPos = gives.some(g => g.kind === "player" && isWeakAt(selectedRoster.roster_id, g.position));
      if (gaveWeakPos) return;
      const myGivesSum = sumValues(gives);
      theirSides.forEach(gets => {
        if (gives.some(g => gets.some(t => g.id === t.id))) return;
        const gaveTheirWeak = gets.some(g => g.kind === "player" && isWeakAt(other.roster_id, g.position));
        if (gaveTheirWeak) return;
        const getsSum = sumValues(gets);
        if (!bothCalcsAgree(myGivesSum, getsSum)) return;
        const myFinal = rosterImpact(selectedRoster.roster_id, gives, gets);
        const theirFinal = rosterImpact(other.roster_id, gets, gives);
        if (!myFinal.fits.length || !theirFinal.fits.length) return;
        const ktcDiff = Math.abs(myGivesSum.ktc - getsSum.ktc) / Math.max(myGivesSum.ktc, getsSum.ktc);
        const flockDiff = (myGivesSum.flock && getsSum.flock)
          ? Math.abs(myGivesSum.flock - getsSum.flock) / Math.max(myGivesSum.flock, getsSum.flock)
          : null;
        const worstDiff = Math.max(ktcDiff, flockDiff != null ? flockDiff : 0);
        const fairness = 1 - worstDiff;
        const fitScore = (myFinal.fits.length + theirFinal.fits.length);
        const sizeScore = Math.min(1, (myGivesSum.ktc + getsSum.ktc) / 20000);
        const score = fairness * 0.6 + (fitScore / 4) * 0.25 + sizeScore * 0.15;
        allTrades.push({
          partnerName: otherName,
          partnerRosterId: other.roster_id,
          gives, gets,
          myGivesSum, getsSum,
          myFits: myFinal.fits,
          theirFits: theirFinal.fits,
          fairness, score,
        });
      });
    });
  });

  allTrades.sort((a, b) => b.score - a.score);
  const seenPartner = {};
  const seenKeys = new Set();
  const topTrades = [];
  for (const t of allTrades) {
    if (topTrades.length >= 10) break;
    const key = t.partnerRosterId + "|" + t.gives.map(g => g.id).sort().join(",") + "|" + t.gets.map(g => g.id).sort().join(",");
    if (seenKeys.has(key)) continue;
    seenKeys.add(key);
    const c = seenPartner[t.partnerName] || 0;
    if (c >= 2) continue;
    seenPartner[t.partnerName] = c + 1;
    topTrades.push(t);
  }

  if (!topTrades.length) {
    tradeCard.appendChild(el("div", { class: "empty" },
      "No mutually-beneficial trades found within 12% value across 1-for-1, 2-for-1, 1-for-2, and 2-for-2 combinations."));
  } else {
    topTrades.forEach(t => {
      const block = el("div", { class: "trade-block" });
      block.appendChild(el("div", { class: "trade-header" },
        el("span", { class: "trade-date" }, "with " + t.partnerName),
        el("span", { class: "trade-meta" }, `${Math.round(t.fairness * 100)}% fair  ·  ${t.gives.length}-for-${t.gets.length}`),
      ));
      const cols = el("div", { class: "trade-cols" });
      function side(title, items) {
        const col = el("div", { class: "trade-col" },
          el("div", { class: "trade-col-label" }, title));
        items.forEach(a => {
          const valueBits = [];
          if (a.ktc) valueBits.push("KTC " + a.ktc.toLocaleString());
          if (a.flock) valueBits.push("Flock " + a.flock.toLocaleString());
          col.appendChild(el("div", { class: "trade-line" },
            el("span", { class: "trade-player" }, a.name),
            el("span", { class: "pos-chip " + positionClass(a.position) }, a.position),
            el("span", { class: "trade-where" }, valueBits.join("  ·  ")),
          ));
        });
        const sum = sumValues(items);
        col.appendChild(el("div", { class: "pct", style: "margin-top:6px" },
          `Total: KTC ${Math.round(sum.ktc).toLocaleString()}` +
          (sum.flock ? `  ·  Flock ${Math.round(sum.flock).toLocaleString()}` : "")));
        return col;
      }
      cols.appendChild(side("You send", t.gives));
      cols.appendChild(side("You get", t.gets));
      block.appendChild(cols);
      const fitBits = [];
      if (t.myFits.length) fitBits.push("You fill: " + t.myFits.join(", "));
      if (t.theirFits.length) fitBits.push(t.partnerName + " fills: " + t.theirFits.join(", "));
      block.appendChild(el("div", { class: "pct", style: "margin-top:6px" }, fitBits.join("  ·  ")));
      tradeCard.appendChild(block);
    });
  }
  tradeCard.appendChild(el("div", { class: "pct", style: "margin-top:10px" },
    "Algorithm: exhaustive search across all 1-for-1, 2-for-1, 1-for-2, and 2-for-2 swaps between you and every other manager, " +
    "with future draft picks included in the movable pool. Each side's movable pool is its Tradeable + Wait & See assets (KTC value ≥ 1000). " +
    "Asset tiers use a position-aware age curve (QB cliff 33, WR 28, TE 30, RB 26 — picks classified by value alone). " +
    "A swap qualifies only when (a) every calculator with data on both sides agrees the value gap is < 12%, " +
    "(b) the giver is not parting with a position they're already weak at, and (c) at least one weak position improves on each side. " +
    "Top 10 by composite score (60% fairness, 25% mutual position-fit count, 15% trade size); max 2 ideas per partner."
  ));
  main.appendChild(tradeCard);
}

          const row = {
            year: parseInt(season.season, 10),
            slot: `${p.round}.${String(p.draft_slot).padStart(2, "0")}`,
            overall: p.pick_no,
            drafter: canonicalOwnerName(owner ? userDisplay(owner) : "—"),

            ktcValue: ktc ? ktc.value : null,
          };
          if (ktc && ktc.rookieRank != null) {
            row.adpOverall = ktc.rookieRank;
            row.diff = p.pick_no - ktc.rookieRank;  // negative = reach
            // Weight by the earlier of the two slots so early-pick moves
            // count more: weight = (MAX+1 - earlier) / MAX. Slot 1 → ~1.0,
            // slot 36 → ~0.03. Multiply raw diff to get weighted "impact".
            const MAX_SLOT = 36;
            const earlier = Math.max(1, Math.min(p.pick_no, ktc.rookieRank));
            const weight = (MAX_SLOT + 1 - earlier) / MAX_SLOT;
            row.weight = weight;
            row.weightedDiff = row.diff * weight;

      const stealReachPool = rows.filter(r => r.year !== 2020);
      const steals = stealReachPool.slice().sort((a, b) => b.weightedDiff - a.weightedDiff).slice(0, 8);
      const reaches = stealReachPool.slice().sort((a, b) => a.weightedDiff - b.weightedDiff).slice(0, 8);

    const meta = el("div", { class: "pct", style: "margin-top:14px; line-height: 1.7" });

function renderAdpList(rows) {
  const wrap = el("div", { class: "surplus-list" });
  rows.forEach(r => {
    const diffLabel = (r.diff >= 0 ? "+" : "") + r.diff;
    wrap.appendChild(el("div", { class: "surplus-row" },
      el("span", { class: "surplus-slot" }, r.year + " · " + r.slot),
      el("span", { class: "surplus-player" },
        r.playerName,
        r.position
          ? el("span", { class: "pos-chip " + positionClass(r.position), style: "margin-left:8px" }, r.position)
          : null,
        el("span", { class: "pct", style: "margin-left:8px" }, "ADP " + r.adpOverall),
      ),
      el("span", { class: "surplus-by" }, "by " + r.drafter),
      el("span", { class: "surplus-delta " + (r.diff >= 0 ? "delta-pos" : "delta-neg") },
        diffLabel + " vs ADP"
      ),
    ));
  });
  return wrap;
}

// Pick the snapshot whose timestamp is closest to (but not after) the trade time.
// Falls back to the earliest if the trade predates every snapshot we have.
function snapshotForTradeTime(history, tradeMs) {
  if (!history || !history.snapshots) return null;
  let chosen = null;
  for (const s of history.snapshots) {
    if (s.timestamp_ms <= tradeMs) chosen = s;
    else break;
  }
  return chosen || history.snapshots[0];
}

// KTC pick value for a {season, round}. Average available Early/Mid/Late tiers.
function lookupPickValue(snap, season, round) {
  if (!snap || !snap.picks) return null;
  const tiers = ["early", "mid", "late"];
  let total = 0, count = 0;
  tiers.forEach(t => {
    const v = snap.picks[`${season}|${t}|${round}`];
    if (v && v > 0) { total += v; count++; }
  });
  return count > 0 ? total / count : null;
}

// Compute the value swing of a trade from the perspective of myRosterId.
// Returns { mySent, myReceived, swing, snapshot }.
function evaluateTrade(trade, myRosterId, history, sleeperPlayers) {
  if (!history || !sleeperPlayers) return null;
  const snap = snapshotForTradeTime(history, trade.created);
  if (!snap) return null;
  let mySent = 0, myReceived = 0;
  Object.entries(trade.adds || {}).forEach(([pid, rid]) => {
    if (rid !== myRosterId) return;
    const sp = sleeperPlayers[pid];
    if (!sp) return;
    const v = snap.players[ktcNormalizeName(sp.name)];
    if (v) myReceived += v;
  });
  Object.entries(trade.drops || {}).forEach(([pid, rid]) => {
    if (rid !== myRosterId) return;
    const sp = sleeperPlayers[pid];
    if (!sp) return;
    const v = snap.players[ktcNormalizeName(sp.name)];
    if (v) mySent += v;
  });
  (trade.draft_picks || []).forEach(dp => {
    const v = lookupPickValue(snap, dp.season, dp.round);
    if (!v) return;
    if (dp.owner_id === myRosterId) myReceived += v;
    if (dp.previous_owner_id === myRosterId) mySent += v;
  });
  return { mySent: Math.round(mySent), myReceived: Math.round(myReceived), swing: Math.round(myReceived - mySent), snapshot: snap.label };
}

// Same normalization as /api/ktc.js — keep in sync for joins to work.
function ktcNormalizeName(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[’‘ʼ]/g, "'")
    .replace(/[.,'`]/g, "")
    .replace(/\s+jr\b|\s+sr\b|\s+ii\b|\s+iii\b|\s+iv\b/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// Pick the canonical rookie draft for a season: the first chronologically-created
// complete draft. Supplementals created later in the same year are excluded.
// 2019 is the league's startup season (25-round draft), not a rookie draft we
// want to analyze, so it returns null.
function rookieDraftFor(season) {
  if (!season) return null;
  if (season.season === "2019") return null;
  const completed = season.drafts.filter(d =>
    d.status === "complete" && d.picks && d.picks.length
  );
  if (!completed.length) return null;
  return completed.slice().sort((a, b) => (a.created || 0) - (b.created || 0))[0];
}
