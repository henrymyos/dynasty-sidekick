    lede.innerHTML = `<strong>${best.y}</strong> was the strongest class ` +
      `(${(best.hp * 100).toFixed(1)}% hit, ${(best.hmp * 100).toFixed(1)}% hit+meh). ` +
      `<strong>${worst.y}</strong> was the weakest ` +
      `(${(worst.hp * 100).toFixed(1)}% / ${(worst.hmp * 100).toFixed(1)}%). ` +
      `League average: ${(overallHit * 100).toFixed(1)}% / ${(overallHM * 100).toFixed(1)}%.`;
    ysCard.appendChild(lede);
  }
  const ysTable = el("table", {},
    el("thead", {}, el("tr", {},
      el("th", {}, "Year"),
      el("th", { class: "num" }, "Picks"),
      el("th", { class: "num tight" }, "Hit %"),
      el("th", { class: "num tight" }, "Hit + Meh"),
      el("th", { class: "num tight gap-left" }, "Δ Score"),
      el("th", {}, ""),
    )),
  );
  const ysBody = el("tbody", {});
  state.years.slice().sort((a, b) => a - b).forEach(y => {
    const yp = state.picks.filter(p => p.year === y && p.round);
    const t = tally(yp);
    if (!t.graded) return;
    const hp = t.hit / t.graded;
    const hmp = (t.hit + t.meh) / t.graded;
    const score = strengthScore(hp, hmp);
    const delta = score - overallScore;
    const label = delta >= 0.033 ? "Strong" : delta <= -0.033 ? "Weak" : "Average";
    const pillClass = delta >= 0.033 ? "pill pill-strong" : delta <= -0.033 ? "pill pill-weak" : "pill pill-avg";
    ysBody.appendChild(el("tr", { class: "row-clickable", onclick: () => showPicksModal(y + " — all picks", yp) },
      el("td", {}, String(y)),
      el("td", { class: "num" }, String(t.total)),
      el("td", { class: "num tight" }, formatPct(t.hit, t.graded)),
      el("td", { class: "num tight" }, formatPct(t.hit + t.meh, t.graded)),
      el("td", { class: "num tight gap-left" },
        el("span", { class: delta >= 0 ? "delta-pos" : "delta-neg" },
          (delta >= 0 ? "+" : "") + (delta * 100).toFixed(1) + "%"
        )),
      el("td", {}, el("span", { class: pillClass }, label)),
    ));
  });
  ysBody.appendChild(el("tr", { class: "pos-total" },
    el("td", {}, "League Avg"),
    el("td", { class: "num" }, String(overall.total)),
    el("td", { class: "num tight" }, formatPct(overall.hit, overall.graded)),
    el("td", { class: "num tight" }, formatPct(overall.hit + overall.meh, overall.graded)),
    el("td", { class: "num tight gap-left" }, "—"),
    el("td", {}, ""),
  ));
  ysTable.appendChild(ysBody);
  ysCard.appendChild(ysTable);
  ysCard.appendChild(el("div", { class: "pct", style: "margin-top:8px" },
    "Δ Score = (0.7 × Hit % + 0.3 × Hit + Meh %) − league average. Years above +3.3% earn the Strong pill; below −3.3% earn Weak. Hit % dominates the score but a year with extra Mehs still gets some credit."
  ));
  main.appendChild(ysCard);


  // ===== Stretch-win cards (need Sleeper / KTC data) =====
  ensureSleeperLoaded();
  ensureKtcLoaded();
  ensureTradeHistoryLoaded();


  main.appendChild(el("div", { class: "section-header" }, "Strategy Signals",
    el("span", { class: "section-sub" }, "Does beating consensus work?")));


  // ----- Card: ADP vs Pick (KeepTradeCut) -----
  const adpCard = el("div", { class: "card" }, el("h2", {}, "ADP vs Pick (KeepTradeCut)"));
  if (!state.sleeper) {
    adpCard.appendChild(el("div", { class: "empty" },
      state.sleeperError ? "Sleeper error: " + state.sleeperError : "Loading Sleeper data…"
    ));
  } else if (!state.ktc) {
    adpCard.appendChild(el("div", { class: "empty" },
      state.ktcError ? "KTC error: " + state.ktcError : "Loading KeepTradeCut snapshots (slow on first load)…"
    ));
  } else {
    const pickRows = [];
    state.sleeper.seasons.forEach(season => {
      const draft = rookieDraftFor(season);
      if (!draft) return;
      const snap = state.ktc.seasons && state.ktc.seasons[season.season];
      if (!snap || !snap.players) return;

      draft.picks
        .filter(p => p.round <= 3)
        .forEach(p => {
          const sp = state.sleeper.players[p.player_id];
          const playerName = sp ? sp.name : null;
          const ktc = playerName ? snap.players[ktcNormalizeName(playerName)] : null;
          const owner = rosterToOwner(season, p.roster_id);
          const row = {
            year: parseInt(season.season, 10),
            slot: `${p.round}.${String(p.draft_slot).padStart(2, "0")}`,
            overall: p.pick_no,
            drafter: canonicalOwnerName(owner ? userDisplay(owner) : "—"),
            ownerUserId: owner ? owner.user_id : null,
            playerName: playerName || ("Player " + p.player_id),
            position: sp ? sp.position : (ktc ? ktc.position : null),
            ktcValue: ktc ? ktc.value : null,
          };
          if (ktc && ktc.rookieRank != null) {
            row.adpOverall = ktc.rookieRank;
            row.diff = p.pick_no - ktc.rookieRank;  // negative = reach
            // Weight by the earlier of the two slots so early-pick moves
            // count more: weight = (MAX+1 - earlier) / MAX. Slot 1 → ~1.0,
            // slot 36 → ~0.03. Multiply raw diff to get weighted "impact".
            const MAX_SLOT = 36;
            const earlier = Math.max(1, Math.min(p.pick_no, ktc.rookieRank));
            const weight = (MAX_SLOT + 1 - earlier) / MAX_SLOT;
            row.weight = weight;
            row.weightedDiff = row.diff * weight;
          }
          pickRows.push(row);
        });
    });

    const rows = pickRows.filter(p => p.diff != null);
    if (!rows.length) {
      adpCard.appendChild(el("div", { class: "empty" },
        "No matched KTC data yet. Check the snapshot table below for fetch errors."
      ));
    } else {
      const byDrafter = {};
      rows.forEach(r => {
        const key = r.drafter;
        (byDrafter[key] = byDrafter[key] || { drafter: key, picks: 0, sumWeighted: 0, reaches: 0, steals: 0 });
        byDrafter[key].picks += 1;
        byDrafter[key].sumWeighted += (r.weightedDiff || 0);
        if (r.diff < 0) byDrafter[key].reaches += 1;
        else if (r.diff > 0) byDrafter[key].steals += 1;
      });
      const adpTable = el("table", {},
        el("thead", {}, el("tr", {},
          el("th", {}, "Drafter"),
          el("th", { class: "num" }, "Matched"),
          el("th", { class: "num tight" }, "Reaches"),
          el("th", { class: "num tight" }, "Steals"),
          el("th", { class: "num tight gap-left" }, "Avg vs ADP"),
        )),
      );
      const adpBody = el("tbody", {});
      Object.values(byDrafter)
        .map(s => ({ ...s, avgDiff: s.sumWeighted / s.picks }))
        .sort((a, b) => b.avgDiff - a.avgDiff)
        .forEach(r => {
          adpBody.appendChild(el("tr", {},
            el("td", {}, r.drafter),
            el("td", { class: "num" }, String(r.picks)),
            el("td", { class: "num tight" }, String(r.reaches)),
            el("td", { class: "num tight" }, String(r.steals)),
            el("td", { class: "num tight gap-left" },
              el("span", { class: r.avgDiff >= 0 ? "delta-pos" : "delta-neg" },
                (r.avgDiff >= 0 ? "+" : "") + r.avgDiff.toFixed(1)
              )),
          ));
        });
      adpTable.appendChild(adpBody);
      adpCard.appendChild(adpTable);

      // 2020 KTC snapshot is months after the draft (KTC wasn't archived
      // earlier), so its ADP doesn't reflect what was actually consensus on
      // draft night. Skip 2020 here, but keep it in the per-drafter aggregate.
      const stealReachPool = rows.filter(r => r.year !== 2020);
      const steals = stealReachPool.slice().sort((a, b) => b.weightedDiff - a.weightedDiff).slice(0, 8);
      const reaches = stealReachPool.slice().sort((a, b) => a.weightedDiff - b.weightedDiff).slice(0, 8);
      adpCard.appendChild(el("h3", { style: "margin-top:20px" }, "Biggest steals (taken much later than ADP)"));
      adpCard.appendChild(renderAdpList(steals));
      adpCard.appendChild(el("h3", { style: "margin-top:20px" }, "Biggest reaches (taken much earlier than ADP)"));
      adpCard.appendChild(renderAdpList(reaches));
    }

    const meta = el("div", { class: "pct", style: "margin-top:14px; line-height: 1.7" });
    meta.appendChild(el("span", {}, "Snapshots used "));
    meta.appendChild(el("span", { style: "color:var(--muted)" }, "(click to verify on Wayback):"));
    meta.appendChild(el("br", {}));
    Object.entries(state.ktc.seasons || {}).forEach(([year, info], idx) => {
      const ts = info.snapshot || "—";
      const date = ts.length >= 8 ? `${ts.slice(0,4)}-${ts.slice(4,6)}-${ts.slice(6,8)}` : ts;
      const ct = info.players ? Object.keys(info.players).length : 0;
      const url = info.pageUrl;
      if (idx > 0) meta.appendChild(el("span", {}, "  ·  "));
      if (url) {
        meta.appendChild(el("a", { href: url, target: "_blank", rel: "noopener", style: "color:var(--accent)" },
          `${year}: ${date}`));
      } else {
        meta.appendChild(el("span", {}, `${year}: ${date}`));
      }
      meta.appendChild(el("span", { style: "color:var(--muted)" }, ` (${ct})`));
      if (year === "2023") {
        meta.appendChild(el("span", { style: "color: var(--meh)" }, " *"));
      }
      if (info.error) meta.appendChild(el("span", { class: "delta-neg" }, ` — ${info.error}`));
    });
    adpCard.appendChild(meta);

    adpCard.appendChild(el("div", { class: "pct", style: "margin-top:10px" },
      el("span", { style: "color: var(--meh)" }, "* "),
      "2023 has no rookie-rankings page snapshot in May/June. Numbers come from " +
      "the dynasty root on Jun 11. If you click the link and switch to the " +
      "Rookies tab, Wayback redirects to the closest rookie page (Mar 16, " +
      "pre-NFL) — those ranks won't match what the site uses."
    ));

    adpCard.appendChild(el("div", { class: "pct", style: "margin-top:8px" },
      "ADP = KTC superflex rookie rank. Diff = actual pick − ADP " +
      "(negative = reach, positive = steal). " +
      "Per-drafter Avg and the steals/reaches lists are weighted so earlier " +
      "picks count more — a 4-spot miss at 1.02 outweighs a 10-spot miss at 3.04."
    ));
  }
  main.appendChild(adpCard);

  // ----- Draft records graphic (near the bottom of the page) -----
  {
    // Winner(s) of a record by a numeric extractor — returns every drafter tied
    // for the top value, not just one.
    const topRecord = (rows, valFn) => {
      let best = 0, winners = [];
      rows.forEach(r => {
        const v = valFn(r);
        if (v > best) { best = v; winners = [r]; }
        else if (v === best && v > 0) winners.push(r);
      });
      return { best, winners };
    };
    // Per (drafter, draft) tallies of how many picks they held in a given round.
    const roundSingleDraft = round => {
      const groups = {};
      state.picks.filter(p => p.round === round).forEach(p => {
        const k = p.year + "|" + p.person;
        (groups[k] || (groups[k] = { person: p.person, year: p.year, count: 0, slots: [] })).count++;
        groups[k].slots.push(p);
      });
      return Object.values(groups);
    };
    // Every longest run of consecutive selections (same drafter, back-to-back
    // slots) within one round of one draft. Returns ALL drafters tied at the max.
    const longestRuns = round => {
      const runs = [];  // { person, year, len, slots }
      state.years.forEach(year => {
        const picks = state.picks
          .filter(p => p.year === year && p.round === round)
          .sort((a, b) => a.pickInRound - b.pickInRound);
        let cur = [];
        const flush = () => {
          if (cur.length >= 2) runs.push({ person: cur[0].person, year, len: cur.length, slots: cur.slice() });
        };
        picks.forEach(p => {
          const prev = cur[cur.length - 1];
          if (prev && prev.person === p.person && p.pickInRound === prev.pickInRound + 1) cur.push(p);
          else { flush(); cur = [p]; }
        });
        flush();
      });
      if (!runs.length) return { len: 0, winners: [] };
      const max = Math.max(...runs.map(r => r.len));
      // One entry per drafter (their first achievement of the record length).
      const seen = new Set(), winners = [];
      runs.filter(r => r.len === max)
        .sort((a, b) => a.year - b.year)
        .forEach(r => { if (!seen.has(r.person)) { seen.add(r.person); winners.push(r); } });
      return { len: max, winners };
    };
    // Most picks of any round held by one drafter in a single draft.
    const allCounts = {};
    state.picks.forEach(p => {
      const k = p.year + "|" + p.person;
      (allCounts[k] || (allCounts[k] = { person: p.person, year: p.year, count: 0 })).count++;
    });

    const slotsText = picks => picks.map(p => p.slot).filter(Boolean).join(", ");
    const namesText = rows => rows.map(r => r.person).join(", ");
    // Per-winner detail lines (name shown only when there's more than one).
    const detailLines = (rows, multi) => rows.map(r =>
      el("div", { class: "rec-line" }, (multi ? r.person + " — " : "") + r.year + " · " + slotsText(r.slots)));

    // "Most in a single draft" tile from a list of {person, year, count, slots?}.
    const countTile = (medal, label, rows) => {
      const { best, winners } = topRecord(rows, r => r.count);
      const has = winners.length > 0;
      const multi = winners.length > 1;
      return el("div", { class: "stat rec-tile" },
        el("div", { class: "stat-label" }, el("span", { class: "rec-medal" }, medal), label),
        el("div", { class: "stat-value" },
          has ? namesText(winners) : el("span", { class: "rec-empty" }, "—"),
          has ? el("span", { class: "rec-count" }, "×" + best) : null),
        has && winners[0].slots ? el("div", { class: "rec-sub" }, detailLines(winners, multi)) : null);
    };

    // "Longest back-to-back run" tile — lists every drafter tied at the record.
    const runTile = (label, round) => {
      const { len, winners } = longestRuns(round);
      const has = len >= 2;  // a run is two or more in a row
      const multi = winners.length > 1;
      return el("div", { class: "stat rec-tile" },
        el("div", { class: "stat-label" }, el("span", { class: "rec-medal" }, "🔥"), label),
        el("div", { class: "stat-value" },
          has ? namesText(winners) : el("span", { class: "rec-empty" }, "none"),
          has ? el("span", { class: "rec-count" }, len + " straight") : null),
        has ? el("div", { class: "rec-sub" }, detailLines(winners, multi)) : null);
    };

    const recordsCard = el("div", { class: "card" },
      el("h2", {}, "Draft Records"),
      el("div", { class: "stat-grid" },
        countTile("①", "Most 1st-Round Picks", roundSingleDraft(1)),
        countTile("②", "Most 2nd-Round Picks", roundSingleDraft(2)),
        countTile("③", "Most 3rd-Round Picks", roundSingleDraft(3)),
        runTile("Most 1st-Rounders in a Row", 1),
        runTile("Most 2nd-Rounders in a Row", 2),
        runTile("Most 3rd-Rounders in a Row", 3),
        countTile("📋", "Most Picks in a Draft", Object.values(allCounts))),
      el("div", { class: "pct", style: "margin-top:8px" },
        "Records within a single draft. “In a row” = consecutive back-to-back slots held by one drafter; every drafter tied for a record is listed."));
    main.appendChild(recordsCard);
  }

  // ----- Most lopsided trades (by KTC) -----
  ensureSleeperLoaded();
  ensureKtcDynastyLoaded();
  ensureTradeHistoryLoaded();
  main.appendChild(el("div", { class: "section-header" }, "Lopsided Trades",
    el("span", { class: "section-sub" }, "The biggest KTC mismatches in league trade history")));
  const lopCard = el("div", { class: "card" }, el("h2", {}, "Most Lopsided Trades"));
  if (!state.sleeper || !state.ktcDynasty) {
    lopCard.appendChild(el("div", { class: "empty" }, "Loading trades…"));
  } else {
    const players = state.sleeper.players;
    const seasons = state.sleeper.seasons;
    const scored = [];
    const seenTx = new Set();
    seasons.forEach(season => {
      (season.trades || []).forEach(trade => {
        if (trade.tx_id != null) { if (seenTx.has(trade.tx_id)) return; seenTx.add(trade.tx_id); }
        if (!trade.roster_ids || trade.roster_ids.length !== 2) return;  // 2-team trades only
        const ev = evaluateTrade(trade, trade.roster_ids[0], state.tradeHistory, players);
        if (!ev) return;
        if (ev.mySent <= 0 || ev.myReceived <= 0) return;  // both sides must be priceable
        const favor = Math.abs(ev.swing);
        if (favor <= 0) return;
        const [r0, r1] = trade.roster_ids;
        const winnerRid = ev.swing >= 0 ? r0 : r1;
        const loserRid = ev.swing >= 0 ? r1 : r0;
        // Per-asset KTC values (both perspectives combined cover every asset).
        const valByPlayer = {}, valByPick = {};
        [...ev.gotDetail, ...ev.sentDetail].forEach(d => {
          if (d.kind === "player") valByPlayer[d.pid] = d.value;
          else valByPick[d.dp.season + "|" + d.dp.round + "|" + d.dp.roster_id] = d.value;
        });
        scored.push({
          season, trade, winnerRid, loserRid, favor, valByPlayer, valByPick,
          winnerGot: ev.swing >= 0 ? ev.myReceived : ev.mySent,
          loserGot: ev.swing >= 0 ? ev.mySent : ev.myReceived,
        });
      });
    });
    scored.sort((a, b) => b.favor - a.favor);
    const top = scored.slice(0, 6);
    if (!top.length) {
      lopCard.appendChild(el("div", { class: "empty" }, "No priceable trades found."));
    } else {
      const nameOf = (season, rid) => canonicalOwnerName(userDisplay(rosterToOwner(season, rid)));
      // Append the asset's KTC value to a trade line.
      const withValue = (node, value) => {
        node.appendChild(el("span", { class: "trade-where" },
          value ? "KTC " + Math.round(value).toLocaleString() : "—"));
        return node;
      };
      const receivedLines = (t, rid) => {
        const { trade } = t;
        const lines = [];
        Object.entries(trade.adds || {}).forEach(([pid, r]) => {
          if (r === rid) lines.push(withValue(renderTradePlayerLine(pid, players), t.valByPlayer[pid]));
        });
        (trade.draft_picks || []).forEach(dp => {
          if (dp.owner_id === rid) lines.push(withValue(
            renderTradePickLine(dp, seasons, players, trade.created),
            t.valByPick[dp.season + "|" + dp.round + "|" + dp.roster_id]));
        });
        if (!lines.length) lines.push(el("div", { class: "trade-empty" }, "—"));
        return lines;
      };
      const signed = n => (n >= 0 ? "+" : "−") + Math.abs(Math.round(n)).toLocaleString();
      top.forEach(t => {
        const wName = nameOf(t.season, t.winnerRid);
        const lName = nameOf(t.season, t.loserRid);
        const rawGap = t.winnerGot - t.loserGot;        // naive KTC-sum gap
        const adjustment = t.favor - rawGap;            // what the calc adds for consolidation
        lopCard.appendChild(el("div", { class: "trade-block" },
          el("div", { class: "trade-header" },
            el("span", { class: "trade-date" }, wName + " won this trade"),
            el("span", { class: "trade-meta" }, t.season.season + "  ·  ",
              el("span", { class: "trade-value-tag delta-pos" }, "KTC +" + t.favor.toLocaleString())),
          ),
          el("div", { class: "trade-cols" },
            el("div", { class: "trade-col" },
              el("div", { class: "trade-col-label" }, wName + " got"),
              receivedLines(t, t.winnerRid),
              el("div", { class: "pct", style: "margin-top:6px" }, "Total KTC " + t.winnerGot.toLocaleString())),
            el("div", { class: "trade-col" },
              el("div", { class: "trade-col-label" }, lName + " got"),
              receivedLines(t, t.loserRid),
              el("div", { class: "pct", style: "margin-top:6px" }, "Total KTC " + t.loserGot.toLocaleString())),
          ),
          el("div", { class: "pct", style: "margin-top:8px" },
            "Raw sum gap " + signed(rawGap) +
            "  ·  consolidation adjustment " + signed(adjustment) +
            "  ·  KTC favor +" + t.favor.toLocaleString() + " to " + wName),
        ));
      });
      lopCard.appendChild(el("div", { class: "pct", style: "margin-top:8px" },
        "Each asset shows its KTC value at the time of the trade. Ranked by KTC's own fairness model: " +
        "the consolidation adjustment is how much its verdict (“KTC favor”) differs from the naive sum gap, " +
        "since one stud outweighs several mid pieces. Only two-team trades with both sides priceable are shown."));
    }
  }
  main.appendChild(lopCard);
}

function renderAdpList(rows) {
  const wrap = el("div", { class: "surplus-list" });
  rows.forEach(r => {
    const diffLabel = (r.diff >= 0 ? "+" : "") + r.diff;
    wrap.appendChild(el("div", { class: "surplus-row" },
      el("span", { class: "surplus-slot" }, r.year + " · " + r.slot),
      el("span", { class: "surplus-player" },
        r.playerName,
        r.position
          ? el("span", { class: "pos-chip " + positionClass(r.position), style: "margin-left:8px" }, r.position)
          : null,
        el("span", { class: "pct", style: "margin-left:8px" }, "ADP " + r.adpOverall),
      ),
      el("span", { class: "surplus-by" }, "by " + r.drafter),
      el("span", { class: "surplus-delta " + (r.diff >= 0 ? "delta-pos" : "delta-neg") },
        diffLabel + " vs ADP"
      ),
    ));
  });
  return wrap;
}

// ---------- Sleeper integration ----------
async function loadSleeper(force = false) {
  if (state.sleeperLoading) return;
  if (state.sleeper && !force) return;
  state.sleeperLoading = true;
  state.sleeperError = null;
  render();
  try {
    const res = await fetch("/api/sleeper?league_id=" + LEAGUE_ID + (force ? "&_=" + Date.now() : ""), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.sleeper = data;
    // Surface the league's own name in the header when browsing another league.
    if (!IS_DEFAULT_LEAGUE && data.seasons.length) {
      const name = data.seasons[data.seasons.length - 1].league_name;
      if (name) {
        const h1 = document.querySelector("header h1");
        if (h1) h1.textContent = "🏈 " + name;
        document.title = name + " — Dynasty Sidekick";
      }
    }
    // Default every "selected user" dropdown to "my team" on first load —
    // Henry in the default league, the claimed team elsewhere.
    const mine = myTeamName();
    const myId = mine ? findUserIdByCanonicalName(mine) : null;
    if (myId) {
      if (state.rosterTeam == null) state.rosterTeam = myId;
      if (state.draft.myUserId == null) state.draft.myUserId = myId;
      if (state.tradesUserId == null) state.tradesUserId = myId;
    }
  } catch (e) {
    state.sleeperError = e.message;
  } finally {
    state.sleeperLoading = false;
    render();
  }
}

function ensureSleeperLoaded() {
  if (!state.sleeper && !state.sleeperLoading && !state.sleeperError) loadSleeper();
}

// All-time record sheet (head-to-head + playoff history, predates Sleeper).
async function loadAlltime() {

// Copy text to clipboard with graceful fallback; briefly flash the source button.
function copyToClipboard(text, srcBtn) {
  function flash() {
    if (!srcBtn) return;
    const originalText = srcBtn.dataset.label || srcBtn.textContent;
    srcBtn.dataset.label = originalText;
    srcBtn.textContent = "Copied!";
    srcBtn.classList.add("copied");
    setTimeout(() => {
      srcBtn.textContent = originalText;
      srcBtn.classList.remove("copied");
    }, 1500);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(flash).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); flash(); } catch {}
      document.body.removeChild(ta);
    });
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); flash(); } catch {}
    document.body.removeChild(ta);
  }
}

// Apply your league's scoring_settings to a Sleeper raw stat object.
// Returns projected fantasy points for that player/week.
function scoreProjection(stats, scoring) {
  if (!stats || !scoring) return 0;
  let pts = 0;
  for (const k in scoring) {
    const v = stats[k];
    if (v) pts += v * scoring[k];
  }
  return pts;
}


// Pick the snapshot whose timestamp is closest to (but not after) the trade
// time, skipping snapshots that failed to parse (empty players map) — an
// empty snapshot would price every piece at 0 and silently skip the trade.
// Falls back to the earliest usable one if the trade predates everything.
function snapshotForTradeTime(history, tradeMs) {
  if (!history || !history.snapshots) return null;
  const usable = history.snapshots.filter(s => s.players && Object.keys(s.players).length);
  if (!usable.length) return null;
  let chosen = null;
  for (const s of usable) {
    if (s.timestamp_ms <= tradeMs) chosen = s;
    else break;
  }
  return chosen || usable[0];
}

// Average of the available Early/Mid/Late tiers for a {season, round} pick.
function avgPickValueFromMap(picksMap, season, round) {
  if (!picksMap) return null;
  const tiers = ["early", "mid", "late"];
  let total = 0, count = 0;
  tiers.forEach(t => {
    const v = picksMap[`${season}|${t}|${round}`];
    if (v && v > 0) { total += v; count++; }
  });
  return count > 0 ? total / count : null;
}

// KTC carries no 2020 pick values, so price 2020 picks by copying the 2021
// snapshot's same-round value. Finds the first 2021 snapshot that actually
// lists 2021 picks.
function snapshot2021Picks(history) {
  const snaps = (history && history.snapshots) || [];
  const s = snaps.find(x => x.label && x.label.startsWith("2021") && x.picks
    && Object.keys(x.picks).some(k => k.startsWith("2021|")));
  return s ? s.picks : null;
}

// A pick whose season is beyond the snapshot's horizon (too far out to be
// listed yet) is valued like the nearest earlier season the snapshot does
// cover — i.e. use the year before to predict it.
function pickValueWithFallback(picksMap, season, round) {
  const base = parseInt(season, 10);
  for (let s = base; s >= base - 6; s--) {
    const v = avgPickValueFromMap(picksMap, s, round);
    if (v) return v;
  }
  return null;
}
function lookupPickValue(snap, season, round) {
  return snap ? avgPickValueFromMap(snap.picks, season, round) : null;
}

// KTC-style trade fairness. KTC doesn't compare raw value sums: each piece
// carries a hidden "raw adjustment" (10-42.4% of its value, exponential in
// the value), and the trade is even when raw-adjustment sums match — which
// is why one stud beats several mid pieces ("four quarters don't equal a
// dollar"). Formula structure from public documentation of their method;
// constants calibrated against a real KTC calculator example (predicts 3072
// where KTC showed 3074). The favor amount returned is the KTC value of the
// player the lighter side would need to add to even the trade.
const RAW_ADJ = { BASE: 0.10, A: 0.22, B: 0.06, C: 0.0556 };
function rawAdjValue(p, t, v) {
  return p * (
    RAW_ADJ.BASE +
    RAW_ADJ.A * Math.pow(p / v, 8) +
    RAW_ADJ.B * Math.pow(p / t, 1.3) +
    RAW_ADJ.C * Math.pow(p / (v + 2000), 1.28)
  );
}
// Signed favor: positive = the "got" side wins by a player worth this much.
function tradeFavorAmount(gotVals, sentVals, vTop) {
  if (!gotVals.length && !sentVals.length) return 0;
  const t0 = Math.max(...gotVals, ...sentVals, 1);
  const raw = vals => vals.reduce((s, p) => s + rawAdjValue(p, t0, vTop), 0);
  const diff = raw(gotVals) - raw(sentVals);
  if (Math.abs(diff) < 1) return 0;
  // Binary-search the evening player's value (his own raw adjustment, with t
  // re-derived in case he'd become the trade's best piece).
  let lo = 0, hi = vTop;
  for (let i = 0; i < 50; i++) {
    const mid = (lo + hi) / 2;
    const tNew = Math.max(t0, mid);
    const raw2 = vals => vals.reduce((s, p) => s + rawAdjValue(p, tNew, vTop), 0);
    const gap = Math.abs(raw2(gotVals) - raw2(sentVals));
    if (rawAdjValue(mid, tNew, vTop) < gap) lo = mid; else hi = mid;
  }
  return Math.sign(diff) * lo;
}

// Max player value in a price set (memoized per object identity).
const _maxPriceCache = new WeakMap();
function maxPriceIn(priceSet) {
  if (_maxPriceCache.has(priceSet)) return _maxPriceCache.get(priceSet);
  let v = 0;
  Object.values(priceSet).forEach(e => {
    const val = typeof e === "number" ? e : (e && e.value) || 0;
    if (val > v) v = val;
  });
  v = v || 9999;
  _maxPriceCache.set(priceSet, v);
  return v;
}

// Projected Early/Mid/Late tier of a future pick from the ORIGINAL owner's
// current contender rank (strong lineup → picks late). Memoized per KTC load.
function projectedPickTier(originalRosterId) {
  if (projectedPickTier._for !== state.ktcDynasty) {
    const ranked = computeManagerRankings();
    projectedPickTier._for = state.ktcDynasty;
    projectedPickTier._ranks = null;
    if (ranked) {
      const map = {};
      ranked.forEach(r => { map[r.roster_id] = r.cRank; });
      projectedPickTier._ranks = { map, n: ranked.length };
    }
  }
  const info = projectedPickTier._ranks;
  if (!info) return "mid";
  const r = info.map[originalRosterId];
  if (r == null) return "mid";
  if (r <= info.n / 3) return "late";
  if (r <= (2 * info.n) / 3) return "mid";
  return "early";
}

// Value swing of a trade from myRosterId's perspective, as KTC's calculator
// would judge it. Trades newer than the last historical snapshot are priced
// with LIVE KTC values (snapshots end before recent trades and go stale),
// with future picks priced at their projected tier instead of the tier
// average. The swing is the consolidation-adjusted favor amount.
function evaluateTrade(trade, myRosterId, history, sleeperPlayers) {
  if (!sleeperPlayers) return null;
  const snaps = (history && history.snapshots) || [];
  const lastSnapMs = snaps.length ? snaps[snaps.length - 1].timestamp_ms : 0;
  const live = trade.created > lastSnapMs && state.ktcDynasty && state.ktcDynasty.players;
  let priceName, pricePick, label, priceSet;
  if (live) {
    const dyn = state.ktcDynasty.players;
    const picksMap = state.ktcDynasty.picks || {};
    priceName = n => { const e = dyn[ktcNormalizeName(n)]; return e ? (e.value || 0) : 0; };
    pricePick = dp => {
      const tier = projectedPickTier(dp.roster_id);
      return picksMap[`${dp.season}|${tier}|${dp.round}`]
        || pickValueWithFallback(picksMap, dp.season, dp.round) || 0;
    };
    label = "current";
    priceSet = dyn;
  } else {
    const snap = snapshotForTradeTime(history, trade.created);
    if (!snap) return null;
    const picks2021 = snapshot2021Picks(history);
    priceName = n => snap.players[ktcNormalizeName(n)] || 0;
    pricePick = dp => {
      // 2020 picks have no KTC value; copy the 2021 snapshot's same-round value.
      if (parseInt(dp.season, 10) === 2020 && picks2021) {
        return avgPickValueFromMap(picks2021, 2021, dp.round) || 0;
      }
      // Picks beyond the snapshot's horizon fall back to the nearest earlier year.
      return pickValueWithFallback(snap.picks, dp.season, dp.round) || 0;
    };
    label = snap.label;
    priceSet = snap.players;
  }
  const got = [], sent = [], gotDetail = [], sentDetail = [];
  Object.entries(trade.adds || {}).forEach(([pid, rid]) => {
    if (rid !== myRosterId) return;
    const sp = sleeperPlayers[pid];
    if (!sp) return;
    const v = priceName(sp.name);
    if (v) { got.push(v); gotDetail.push({ kind: "player", pid, value: v }); }
  });
  Object.entries(trade.drops || {}).forEach(([pid, rid]) => {
    if (rid !== myRosterId) return;
    const sp = sleeperPlayers[pid];
    if (!sp) return;
    const v = priceName(sp.name);
    if (v) { sent.push(v); sentDetail.push({ kind: "player", pid, value: v }); }
  });
  (trade.draft_picks || []).forEach(dp => {
    const v = pricePick(dp);
    if (!v) return;
    if (dp.owner_id === myRosterId) { got.push(v); gotDetail.push({ kind: "pick", dp, value: v }); }
    if (dp.previous_owner_id === myRosterId) { sent.push(v); sentDetail.push({ kind: "pick", dp, value: v }); }
  });
  if (!got.length && !sent.length) return null;
  const swing = Math.round(tradeFavorAmount(got, sent, maxPriceIn(priceSet)));
  return {
    mySent: Math.round(sent.reduce((a, b) => a + b, 0)),
    myReceived: Math.round(got.reduce((a, b) => a + b, 0)),
    swing,
    snapshot: label,
    gotDetail,
    sentDetail,
  };
}

// Same normalization as /api/ktc.js — keep in sync for joins to work.
function ktcNormalizeName(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[’‘ʼ]/g, "'")
    .replace(/[.,'`]/g, "")
    .replace(/\s+jr\b|\s+sr\b|\s+ii\b|\s+iii\b|\s+iv\b/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// Pick the canonical rookie draft for a season: the first chronologically-created
// complete draft. Supplementals created later in the same year are excluded.
// 2019 is the league's startup season (25-round draft), not a rookie draft we
// want to analyze, so it returns null.
function rookieDraftFor(season) {
  if (!season) return null;
  if (season.season === "2019") return null;
  const completed = season.drafts.filter(d =>
    d.status === "complete" && d.picks && d.picks.length
  );
  if (!completed.length) return null;
  return completed.slice().sort((a, b) => (a.created || 0) - (b.created || 0))[0];
}

// Resolve a loosely-typed player name (e.g. the sheet's "Ken Walker" or
// "TET McMillan") to its canonical KTC key. Exact normalized match first, then
// last name + first initial (+ position) so nicknames/short forms still join
// to KTC's formal names ("Kenneth Walker III", "Tetairoa McMillan"). The key it
// returns is shared by current values and the history snapshots. Null = no match.
function makeKtcNameResolver(dynPlayers) {
  const exact = new Set();
  const lip = {}, li = {}, lp = {};
  const add = (map, k, rec) => { (map[k] || (map[k] = [])).push(rec); };
  Object.entries(dynPlayers || {}).forEach(([key, e]) => {
    if (!key) return;
    const parts = key.split(" ");
    const last = parts[parts.length - 1];
    const initial = parts[0] ? parts[0][0] : "";
    const pos = (e && e.position) || "";
    const rec = { key, value: (e && e.value) || 0 };
    exact.add(key);
    add(lip, last + "|" + initial + "|" + pos, rec);
    add(li, last + "|" + initial, rec);
    add(lp, last + "|" + pos, rec);
  });
  const best = arr => (arr && arr.length) ? arr.reduce((a, b) => (b.value > a.value ? b : a)).key : null;
  return (name, pos) => {
    const norm = ktcNormalizeName(name);
    if (exact.has(norm)) return norm;
    const parts = norm.split(" ");
    if (parts.length < 2) return null;
    const last = parts[parts.length - 1];
    const initial = parts[0][0];
    const p = pos || "";
    return best(lip[last + "|" + initial + "|" + p]) || best(lp[last + "|" + p]) || best(li[last + "|" + initial]) || null;
  };
}

// ---------- Insights: league-wide analytics ----------
function renderInsights() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();
  ensureKtcDynastyLoaded();
  ensureTradeHistoryLoaded();
  if (!IS_DEFAULT_LEAGUE && !state.picks.length) buildAutoPicks();

  if (state.sleeperLoading || !state.sleeper) {
    main.appendChild(el("div", { class: "empty" }, "Loading league data…"));
    return;
  }
  const seasons = state.sleeper.seasons;
  const latest = seasons[seasons.length - 1];
  const players = state.sleeper.players;
  const history = state.tradeHistory;
  const haveValues = !!state.ktcDynasty;

  // ===== Trade ledger + partner counts (single pass over all trades) =====
  const ledger = {};      // name -> aggregate
  const pairCount = {};    // "a||b" -> trade count
  const mgr = name => ledger[name] || (ledger[name] = { name, trades: 0, net: 0, won: 0, lost: 0 });
  seasons.forEach(season => {
    (season.trades || []).forEach(trade => {
      const names = (trade.roster_ids || []).map(rid =>
        canonicalOwnerName(userDisplay(rosterToOwner(season, rid))));
      for (let i = 0; i < names.length; i++)
        for (let j = i + 1; j < names.length; j++)
          { const k = [names[i], names[j]].sort().join("||"); pairCount[k] = (pairCount[k] || 0) + 1; }
      if (!haveValues) return;
      (trade.roster_ids || []).forEach((rid, idx) => {
        const ev = evaluateTrade(trade, rid, history, players);
        if (!ev) return;
        const m = mgr(names[idx]);
        m.trades++;
        m.net += ev.swing;
        if (ev.swing > 0) m.won++; else if (ev.swing < 0) m.lost++;
      });
    });
  });

  main.appendChild(el("div", { class: "section-header" }, "Trade Ledger",
    el("span", { class: "section-sub" }, "Net KTC value won or lost via trades, by KTC's fairness model")));
  const ledgerCard = el("div", { class: "card" }, el("h2", {}, "Who Wins Trades"));
  if (!haveValues) {
    ledgerCard.appendChild(el("div", { class: "empty" }, "Loading KTC values…"));
  } else {
    const rows = Object.values(ledger);
    if (!rows.length) {
      ledgerCard.appendChild(el("div", { class: "empty" }, "No completed trades found."));
    } else {
      if (!state.insightsLedgerSort) state.insightsLedgerSort = { col: "net", dir: "desc" };
      const ss = state.insightsLedgerSort;
      rows.sort((a, b) => {
        const av = a[ss.col], bv = b[ss.col];
        const cmp = av < bv ? -1 : av > bv ? 1 : (a.name < b.name ? -1 : 1);
        return ss.dir === "asc" ? cmp : -cmp;
      });
      const table = el("table", {},
        el("thead", {}, el("tr", {},
          sortHeader("Manager", "name", ss, () => { toggleSort(ss, "name"); render(); }, "", ""),
          sortHeader("Trades", "trades", ss, () => { toggleSort(ss, "trades"); render(); }),
          sortHeader("Won", "won", ss, () => { toggleSort(ss, "won"); render(); }),
          sortHeader("Lost", "lost", ss, () => { toggleSort(ss, "lost"); render(); }),
          sortHeader("Net KTC", "net", ss, () => { toggleSort(ss, "net"); render(); }),
        )));
      const tb = el("tbody", {});
      rows.forEach(r => tb.appendChild(el("tr", {},
        el("td", {}, r.name),
        el("td", { class: "num" }, String(r.trades)),
        el("td", { class: "num" }, String(r.won)),
        el("td", { class: "num" }, String(r.lost)),
        el("td", { class: "num " + (r.net > 0 ? "delta-pos" : r.net < 0 ? "delta-neg" : "") },
          (r.net > 0 ? "+" : "") + Math.round(r.net).toLocaleString()),
      )));
      table.appendChild(tb);
      ledgerCard.appendChild(table);
      ledgerCard.appendChild(el("div", { class: "pct", style: "margin-top:8px" },
        "Net KTC sums each trade's consolidation-adjusted swing from that manager's side; positive = came out ahead. " +
        "Trades are valued as of the date they were made."));
    }
  }
  main.appendChild(ledgerCard);

  // ===== Trade partner matrix =====
  const axisNames = latest.rosters
    .map(r => canonicalOwnerName(userDisplay(rosterToOwner(latest, r.roster_id))))
    .sort((a, b) => a.localeCompare(b));
  if (axisNames.length) {
    main.appendChild(el("div", { class: "section-header" }, "Trade Partners",
      el("span", { class: "section-sub" }, "Number of trades between each pair of managers")));
    let maxPair = 1;
    Object.values(pairCount).forEach(c => { if (c > maxPair) maxPair = c; });
    const table = el("table", { class: "hist-table" });
    const head = el("tr", {}, el("th", {}, ""));
    axisNames.forEach(n => head.appendChild(el("th", {}, n)));
    table.appendChild(el("thead", {}, head));
    const tb = el("tbody", {});
    axisNames.forEach(rowName => {
      const tr = el("tr", {}, el("th", {}, rowName));
      axisNames.forEach(colName => {
        if (rowName === colName) { tr.appendChild(el("td", { style: "background:var(--bg)" }, "")); return; }
        const c = pairCount[[rowName, colName].sort().join("||")] || 0;
        const alpha = c ? (0.12 + 0.5 * (c / maxPair)).toFixed(2) : 0;
        tr.appendChild(el("td", { class: "num", style: c ? `background:rgba(88,166,255,${alpha})` : "" },
          c ? String(c) : ""));
      });
      tb.appendChild(tr);
    });
    table.appendChild(tb);
    main.appendChild(el("div", { class: "card" }, table));
  }

  // ===== Player value movement (current KTC vs history snapshots) =====
  const snaps = ((history && history.snapshots) || []).filter(s => s.players && Object.keys(s.players).length);
  main.appendChild(el("div", { class: "section-header" }, "Player Value Movement",
    el("span", { class: "section-sub" }, "KTC value swings for rostered players")));
  if (!haveValues || !snaps.length) {
    main.appendChild(el("div", { class: "card" }, el("div", { class: "empty" },
      haveValues ? "Loading value history…" : "Loading KTC values…")));
  } else {
    const dyn = state.ktcDynasty.players;
    const lastSnap = snaps[snaps.length - 1];
    const owned = [];
    latest.rosters.forEach(r => {
      const owner = canonicalOwnerName(userDisplay(rosterToOwner(latest, r.roster_id)));
      (r.players || []).forEach(pid => {
        const p = players[pid];
        if (!p || !p.position) return;
        const norm = ktcNormalizeName(p.name);
        const current = (dyn[norm] || {}).value || 0;
        const prev = lastSnap.players[norm] || 0;
        owned.push({ name: p.name, pos: p.position, owner, current, prev, delta: (current && prev) ? current - prev : 0 });
      });
    });
    const moverRow = (o, text, cls) => el("div", { class: "trade-line" },
      el("span", { class: "trade-player" }, o.name),
      el("span", { class: "pos-chip " + positionClass(o.pos) }, o.pos),
      el("span", { class: "trade-resolved" }, "· " + o.owner),
      el("span", { class: "trade-where " + (cls || "") }, text));
    const listCol = (label, items, fmt) => {
      const col = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, label));
      if (!items.length) col.appendChild(el("div", { class: "trade-empty" }, "—"));
      items.forEach(o => col.appendChild(fmt(o)));
      return col;
    };

    const movable = owned.filter(o => o.current && o.prev);
    const risers = movable.filter(o => o.delta > 0).sort((a, b) => b.delta - a.delta).slice(0, 8);
    const fallers = movable.filter(o => o.delta < 0).sort((a, b) => a.delta - b.delta).slice(0, 8);
    main.appendChild(el("div", { class: "card" },
      el("h2", {}, "Risers & Fallers"),
      el("div", { class: "trade-cols" },
        listCol("Risers", risers, o => moverRow(o, "+" + Math.round(o.delta).toLocaleString(), "delta-pos")),
        listCol("Fallers", fallers, o => moverRow(o, "−" + Math.round(-o.delta).toLocaleString(), "delta-neg")),
      ),
      el("div", { class: "pct", style: "margin-top:8px" }, "KTC change since " + lastSnap.label + ".")));
  }

  // ===== Draft value: capital ROI + steals & busts (picks + current KTC) =====
  main.appendChild(el("div", { class: "section-header" }, "Draft Value",
    el("span", { class: "section-sub" }, "What each manager's picks became 3 years on, vs the slot they spent")));
  if (!haveValues) {
    main.appendChild(el("div", { class: "card" }, el("div", { class: "empty" }, "Loading KTC values…")));
  } else if (!state.picks.length) {
    main.appendChild(el("div", { class: "card" }, el("div", { class: "empty" }, "No draft data available.")));
  } else {
    const dyn = state.ktcDynasty.players;
    const nTeams = latest.rosters.length || 12;
    const nowYear = new Date().getUTCFullYear();
    // Judge each pick by what the player became 3 years after the draft (a
    // fair, era-consistent window for a prospect to develop) — using the KTC
    // snapshot nearest that date. Picks less than 3 years old use current value.
    const resolveKtc = makeKtcNameResolver(dyn);
    const valueAtHorizon = (playerName, draftYear, pos) => {
      const key = resolveKtc(playerName, pos);
      if (!key) return 0;
      if (!draftYear || draftYear + 3 >= nowYear || !snaps.length) return (dyn[key] || {}).value || 0;
      const targetMs = Date.UTC(draftYear + 3, 5, 1);  // ≈ June of draftYear+3
      let best = null, bestDiff = Infinity;
      snaps.forEach(s => { const d = Math.abs(s.timestamp_ms - targetMs); if (d < bestDiff) { bestDiff = d; best = s; } });
      return best ? (best.players[key] || 0) : ((dyn[key] || {}).value || 0);
    };
    const byMgr = {};
    const pickRows = [];
    state.picks.forEach(pk => {
      if (!pk.player || !pk.person) return;
      const settled = pk.year && (pk.year + 3 < nowYear);
      const value = valueAtHorizon(pk.player, pk.year, pk.pos);
      const cost = autoSlotExpectation(pk.round, pk.pickInRound || 1, nTeams);
      const m = byMgr[pk.person] || (byMgr[pk.person] = { name: pk.person, picks: 0, value: 0, cost: 0 });
      m.picks++; m.value += value; m.cost += cost;
      pickRows.push({ player: pk.player, person: pk.person, year: pk.year, slot: pk.slot, pos: pk.pos, value, cost, roi: value - cost, settled });
    });

    const rows = Object.values(byMgr).map(m => ({ ...m, roi: m.value - m.cost }));
    if (!state.insightsRoiSort) state.insightsRoiSort = { col: "roi", dir: "desc" };
    const rs = state.insightsRoiSort;
    rows.sort((a, b) => {
      const av = a[rs.col], bv = b[rs.col];
      const cmp = av < bv ? -1 : av > bv ? 1 : (a.name < b.name ? -1 : 1);
      return rs.dir === "asc" ? cmp : -cmp;
    });
    const roiTable = el("table", {},
      el("thead", {}, el("tr", {},
        sortHeader("Manager", "name", rs, () => { toggleSort(rs, "name"); render(); }, "", ""),
        sortHeader("Picks", "picks", rs, () => { toggleSort(rs, "picks"); render(); }),
        sortHeader("Value", "value", rs, () => { toggleSort(rs, "value"); render(); }),
        sortHeader("Slot cost", "cost", rs, () => { toggleSort(rs, "cost"); render(); }),
        sortHeader("ROI", "roi", rs, () => { toggleSort(rs, "roi"); render(); }),
      )));
    const rtb = el("tbody", {});
    rows.forEach(m => rtb.appendChild(el("tr", {},
      el("td", {}, m.name),
      el("td", { class: "num" }, String(m.picks)),
      el("td", { class: "num" }, Math.round(m.value).toLocaleString()),
      el("td", { class: "num" }, Math.round(m.cost).toLocaleString()),
      el("td", { class: "num " + (m.roi > 0 ? "delta-pos" : m.roi < 0 ? "delta-neg" : "") },
        (m.roi > 0 ? "+" : "") + Math.round(m.roi).toLocaleString()),
    )));
    roiTable.appendChild(rtb);
    main.appendChild(el("div", { class: "card" },
      el("h2", {}, "Draft Capital ROI"),
      roiTable,
      el("div", { class: "pct", style: "margin-top:8px" },
        "Value = each drafted player's KTC 3 years after that draft (the snapshot nearest that date), or current value for picks under 3 years old. " +
        "Slot cost = the KTC a pick in that slot is typically worth. ROI = value − cost; positive means their picks returned more than the slots they spent.")));

    // Only judge picks old enough to have proved out (3+ years); recent picks
    // are still developing and shouldn't be branded steals or busts.
    const graded = pickRows.filter(p => p.cost > 0 && p.settled);
    const steals = graded.slice().sort((a, b) => b.roi - a.roi).slice(0, 8);
    const busts = graded.slice().sort((a, b) => a.roi - b.roi).slice(0, 8);
    const pickRow = (p, cls) => el("div", { class: "trade-line" },
      el("span", { class: "trade-player" }, p.player),
      p.pos ? el("span", { class: "pos-chip " + positionClass(p.pos) }, p.pos) : null,
      el("span", { class: "trade-resolved" }, "· " + p.person + " · " + (p.slot || p.year) + (p.settled ? "" : " · current")),
      el("span", { class: "trade-where " + cls }, (p.roi >= 0 ? "+" : "−") + Math.round(Math.abs(p.roi)).toLocaleString()));
    const stealCol = (label, items, cls) => {
      const col = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, label));
      if (!items.length) col.appendChild(el("div", { class: "trade-empty" }, "—"));
      items.forEach(p => col.appendChild(pickRow(p, cls)));
      return col;
    };
    main.appendChild(el("div", { class: "card" },
      el("h2", {}, "All-Time Steals & Busts"),
      el("div", { class: "trade-cols" },
        stealCol("Steals (value ≫ slot)", steals, "delta-pos"),
        stealCol("Busts (slot ≫ value)", busts, "delta-neg"),
      ),
      el("div", { class: "pct", style: "margin-top:8px" },
        "Each pick's ROI = the player's KTC 3 years after the draft minus the slot's typical cost. " +
        "Only picks at least 3 years old are shown, so recent classes aren't judged before they've developed.")));
  }
}

function renderTrades() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();
  ensureTradeHistoryLoaded();

  if (state.sleeperLoading) {
    main.appendChild(el("div", { class: "empty" }, "Loading from Sleeper…"));
    return;
  }
  if (state.sleeperError) {
    main.appendChild(el("div", { class: "empty" }, "Sleeper error: " + state.sleeperError));
    return;
  }
  if (!state.sleeper) {
    main.appendChild(el("div", { class: "empty" }, "No Sleeper data."));
    return;
  }

  const { seasons, players } = state.sleeper;
  // Use the current (latest) season's users as the canonical roster of managers
  const currentSeason = seasons[seasons.length - 1];
  const allUsers = sortUsersHenryFirst(currentSeason.users);

  if (state.tradesUserId == null && allUsers.length) state.tradesUserId = allUsers[0].user_id;

  const userOpts = allUsers.map(u => ({ value: u.user_id, label: canonicalOwnerName(userDisplay(u)) }));
  const controls = el("div", { class: "controls" });
  controls.appendChild(customSelect(userOpts, state.tradesUserId, v => {
    state.tradesUserId = v;
    render();
  }));
  main.appendChild(controls);

  const selectedUser = allUsers.find(u => u.user_id === state.tradesUserId);

  // Build a flat list of trades this user was involved in across all seasons.
  // For each season, map user_id -> roster_id in that season.
  const userTrades = [];
  seasons.forEach(season => {
    const myRoster = season.rosters.find(r => r.owner_id === state.tradesUserId);
    if (!myRoster) return;
    const myRosterId = myRoster.roster_id;
    season.trades.forEach(t => {
      if (!t.roster_ids.includes(myRosterId)) return;
      userTrades.push({ season, trade: t, myRosterId });
    });
  });
  userTrades.sort((a, b) => b.trade.created - a.trade.created);

  // Summary stats
  let playersReceived = 0, playersSent = 0, picksReceived = 0, picksSent = 0;
  userTrades.forEach(({ trade, myRosterId }) => {
    Object.entries(trade.adds).forEach(([, rid]) => { if (rid === myRosterId) playersReceived++; });
    Object.entries(trade.drops).forEach(([, rid]) => { if (rid === myRosterId) playersSent++; });
    trade.draft_picks.forEach(dp => {
      if (dp.owner_id === myRosterId) picksReceived++;
      if (dp.previous_owner_id === myRosterId) picksSent++;
    });
  });
  const stats = el("div", { class: "stat-grid" },
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Trades"), el("div", { class: "stat-value" }, String(userTrades.length))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Players In"), el("div", { class: "stat-value" }, String(playersReceived))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Players Out"), el("div", { class: "stat-value" }, String(playersSent))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Picks In"), el("div", { class: "stat-value" }, String(picksReceived))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Picks Out"), el("div", { class: "stat-value" }, String(picksSent))),
  );
  main.appendChild(stats);

  const card = el("div", { class: "card" }, el("h2", {}, canonicalOwnerName(userDisplay(selectedUser)) + " — Trade History"));

  if (!userTrades.length) {
    card.appendChild(el("div", { class: "empty" }, "No trades found for this manager."));
    main.appendChild(card);
    return;
  }

  userTrades.forEach(({ season, trade, myRosterId }) => {
    const otherRosterIds = trade.roster_ids.filter(r => r !== myRosterId);
    const otherNames = otherRosterIds.map(rid => canonicalOwnerName(userDisplay(rosterToOwner(season, rid)))).join(", ");

    const block = el("div", { class: "trade-block" });
    const header = el("div", { class: "trade-header" },
      el("span", { class: "trade-date" }, fmtDate(trade.created)),
      el("span", { class: "trade-meta" }, season.season + " season  ·  with " + (otherNames || "—")),
    );
    const evalResult = evaluateTrade(trade, myRosterId, state.tradeHistory, state.sleeper && state.sleeper.players);
    if (evalResult && (evalResult.mySent > 0 || evalResult.myReceived > 0)) {
      const swing = evalResult.swing;
      const sign = swing >= 0 ? "+" : "";
      const tag = el("span", {
        class: "trade-value-tag " + (swing >= 0 ? "delta-pos" : "delta-neg"),
        title: `Got ${evalResult.myReceived} · Gave ${evalResult.mySent} (KTC ${evalResult.snapshot}, consolidation-adjusted)`,
      }, `${sign}${swing} KTC`);
      header.appendChild(tag);
    }
    block.appendChild(header);

    // Per-asset KTC values, from the same valuation used for the swing tag.
    const valByPlayer = {}, valByPick = {};
    if (evalResult) {
      [...evalResult.gotDetail, ...evalResult.sentDetail].forEach(d => {
        if (d.kind === "player") valByPlayer[d.pid] = d.value;
        else valByPick[d.dp.season + "|" + d.dp.round + "|" + d.dp.roster_id] = d.value;
      });
    }
    const withValue = (node, value) => {
      node.appendChild(el("span", { class: "trade-where" },
        value ? "KTC " + Math.round(value).toLocaleString() : "—"));
      return node;
    };

    const cols = el("div", { class: "trade-cols" });
    const received = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, "Received"));
    const sent = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, "Sent"));

    // Players
    Object.entries(trade.adds).forEach(([pid, rid]) => {
      if (rid !== myRosterId) return;
      received.appendChild(withValue(renderTradePlayerLine(pid, players), valByPlayer[pid]));
    });
    Object.entries(trade.drops).forEach(([pid, rid]) => {
      if (rid !== myRosterId) return;
      sent.appendChild(withValue(renderTradePlayerLine(pid, players), valByPlayer[pid]));
    });

    // Picks
    trade.draft_picks.forEach(dp => {
      const pv = valByPick[dp.season + "|" + dp.round + "|" + dp.roster_id];
      if (dp.owner_id === myRosterId) {
        received.appendChild(withValue(renderTradePickLine(dp, seasons, players, trade.created), pv));
      }
      if (dp.previous_owner_id === myRosterId) {
        sent.appendChild(withValue(renderTradePickLine(dp, seasons, players, trade.created), pv));
      }
    });

    if (!received.children.length || received.children.length === 1) {
      received.appendChild(el("div", { class: "trade-empty" }, "—"));
    }
    if (!sent.children.length || sent.children.length === 1) {
      sent.appendChild(el("div", { class: "trade-empty" }, "—"));
    }
    cols.appendChild(received);
    cols.appendChild(sent);
    block.appendChild(cols);
    card.appendChild(block);
  });

  main.appendChild(card);
}

// ---------- Trade Feedback: AI breakdown of every trade ----------
function renderTradeFeedback() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();
  ensureKtcDynastyLoaded();
  ensureTradeHistoryLoaded();
  if (!state.sleeper) {
    main.appendChild(el("div", { class: "empty" },
      state.sleeperError ? "Sleeper error: " + state.sleeperError : "Loading league data…"));
    return;
  }
  const seasons = state.sleeper.seasons;
  const latest = seasons[seasons.length - 1];
  const players = state.sleeper.players;

  // Contention window per manager (from the latest season's rankings).
  const typeForName = {};
  const ranked = state.ktcDynasty ? computeManagerRankings() : null;
  if (ranked) {
    const typeByRid = {};
    ranked.forEach(r => { typeByRid[r.roster_id] = classifyManager(r.cRank, ranked.length).label; });
    latest.rosters.forEach(r => {
      typeForName[canonicalOwnerName(userDisplay(rosterToOwner(latest, r.roster_id)))] = typeByRid[r.roster_id] || null;
    });
  }

  // Every completed trade, newest first.
  const all = [];
  const seen = new Set();
  seasons.forEach(season => {
    (season.trades || []).forEach(trade => {
      if (trade.tx_id != null) { if (seen.has(trade.tx_id)) return; seen.add(trade.tx_id); }
      const names = (trade.roster_ids || []).map(rid => canonicalOwnerName(userDisplay(rosterToOwner(season, rid))));
      all.push({ season, trade, names });
    });
  });
  all.sort((a, b) => (b.trade.created || 0) - (a.trade.created || 0));

  // Team filter.
  const teamNames = latest.rosters
    .map(r => canonicalOwnerName(userDisplay(rosterToOwner(latest, r.roster_id))))
    .sort((a, b) => a.localeCompare(b));
  if (!state.feedbackTeam) state.feedbackTeam = "__all__";
  const controls = el("div", { class: "controls" });
  controls.appendChild(customSelect(
    [{ value: "__all__", label: "All teams" }, ...teamNames.map(n => ({ value: n, label: n }))],
    state.feedbackTeam,
    v => { state.feedbackTeam = v; render(); }));
  main.appendChild(controls);

  main.appendChild(el("div", { class: "section-header" }, "Trade Feedback",
    el("span", { class: "section-sub" }, "Instant breakdown of each trade — why each side did it and whether it helped")));

  const filtered = state.feedbackTeam === "__all__" ? all : all.filter(t => t.names.includes(state.feedbackTeam));
  if (!filtered.length) {
    main.appendChild(el("div", { class: "card" }, el("div", { class: "empty" }, "No trades found.")));
    return;
  }
  const card = el("div", { class: "card" });
  filtered.forEach(item => card.appendChild(buildFeedbackBlock(item, players, seasons, typeForName)));
  main.appendChild(card);
}
