<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d1117" />
<title>Draft Picks Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%88%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c232c;
    --border: #2a313a;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --hit: #2ea043;
    --hit-bg: rgba(46,160,67,0.15);
    --meh: #d29922;
    --meh-bg: rgba(210,153,34,0.15);
    --miss: #f85149;
    --miss-bg: rgba(248,81,73,0.12);
    --pending: #6e7681;
    --pending-bg: rgba(110,118,129,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
  }
  .status {
    color: var(--muted);
    font-size: 13px;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--hit);
  }
  .status-dot.loading { background: var(--meh); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--miss); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  button.refresh {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  button.refresh:hover { background: var(--border); }
  nav.tabs {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: -17px;
  }
  nav.tabs button {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  nav.tabs button.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  nav.tabs button:hover:not(.active) { color: var(--text); }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .custom-select { position: relative; min-width: 200px; }
  .custom-select-trigger {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .custom-select-trigger:hover {
    border-color: var(--accent);
    background: var(--panel-2);
  }
  .custom-select.open .custom-select-trigger {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  }
  .custom-select-chevron {
    color: var(--muted);
    font-size: 10px;
    transition: transform 0.15s;
  }
  .custom-select.open .custom-select-chevron { transform: rotate(180deg); }
  .custom-select-menu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    max-height: 320px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    padding: 4px;
  }
  .custom-select.open .custom-select-menu { display: block; }
  .custom-select-option {
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
  }
  .custom-select-option:hover { background: var(--panel-2); }
  .custom-select-option.selected {
    background: rgba(88, 166, 255, 0.12);
    color: var(--accent);
  }
  .grid {
    display: grid;
    gap: 16px;
  }
  .grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card h2, .card h3 {
    margin: 0 0 12px;
    font-size: 16px;
    font-weight: 600;
  }
  .card h2 { font-size: 18px; }
  .round-header {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .round-header:first-child { margin-top: 0; }
  .pick-row {
    display: grid;
    grid-template-columns: 110px 1fr 70px;
    gap: 12px;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .pick-row.with-slot {
    grid-template-columns: 110px 56px 1fr 70px;
  }
  .pick-slot {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }
  .pick-row:hover { background: var(--panel-2); }
  .pick-person {
    font-weight: 600;
    color: var(--text);
  }
  .pick-player { color: var(--text); }
  .pick-result {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .result-hit { background: var(--hit-bg); color: var(--hit); }
  .result-meh { background: var(--meh-bg); color: var(--meh); }
  .result-miss { background: var(--miss-bg); color: var(--miss); }
  .result-pending { background: var(--pending-bg); color: var(--pending); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--muted);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.tight, th.tight { padding-left: 6px; padding-right: 6px; white-space: nowrap; width: 1%; }
  td.gap-left, th.gap-left { padding-left: 24px; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th.sortable .arrow { margin-left: 4px; opacity: 0.6; }
  th.sortable.active { color: var(--accent); }
  th.sortable.active .arrow { opacity: 1; }
  tr:hover td { background: var(--panel-2); }
  .bar-row {
    display: flex;
    height: 6px;
    min-width: 60px;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
    background: var(--panel-2);
  }
  .bar-hit { background: var(--hit); }
  .bar-meh { background: var(--meh); }
  .bar-miss { background: var(--miss); }
  .pct { color: var(--muted); font-size: 12px; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 600;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .empty {
    color: var(--muted);
    text-align: center;
    padding: 40px 20px;
    font-style: italic;
  }
  .swatch {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
    vertical-align: middle;
    margin-right: 8px;
  }
  .color-row {
    display: grid;
    grid-template-columns: 28px 110px 1fr;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 6px;
  }
  .color-row:hover { background: var(--panel-2); }
  .color-row input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    width: 90px;
  }
  .color-row input:focus { outline: none; border-color: var(--accent); }
  tr.pos-total td { font-weight: 600; border-top: 1px solid var(--border); }
  tr.pos-sub td:first-child {
    padding-left: 28px;
    color: var(--muted);
    font-size: 13px;
  }
  tr.pos-sub td { color: var(--muted); }
  tr.pos-tier td:first-child {
    padding-left: 52px;
    color: var(--muted);
    font-size: 12px;
  }
  tr.pos-tier td { color: var(--muted); font-size: 12px; }

  .section-header {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    margin: 28px 4px 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-header:first-child { margin-top: 0; }
  .section-header .section-sub {
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    color: var(--muted);
    margin-left: 12px;
    font-size: 12px;
    opacity: 0.7;
  }

  .card-lede {
    background: var(--panel-2);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    margin: -4px 0 14px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .card-lede strong { color: var(--accent); }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .pill-strong { background: rgba(46,160,67,0.18); color: var(--hit); }
  .pill-weak { background: rgba(248,81,73,0.15); color: var(--miss); }
  .pill-avg { background: var(--panel-2); color: var(--muted); }

  .surplus-list { display: flex; flex-direction: column; gap: 4px; }
  .surplus-row {
    display: grid;
    grid-template-columns: 80px minmax(0, 1fr) 140px 80px;
    gap: 12px;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .surplus-row:hover { background: var(--panel-2); }
  .surplus-slot { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; }
  .surplus-player { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .surplus-by { color: var(--muted); font-size: 13px; text-align: right; }
  .surplus-delta {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 13px;
  }
  .delta-pos { color: var(--hit); }
  .delta-neg { color: var(--miss); }

  @media (max-width: 640px) {
    .surplus-row {
      grid-template-columns: 70px minmax(0,1fr) 70px;
      font-size: 13px;
    }
    .surplus-by { display: none; }
  }

  .pos-chip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .pos-qb { background: rgba(224,102,102,0.18); color: #f08585; }
  .pos-rb { background: rgba(106,168,79,0.18); color: #8bc46c; }
  .pos-wr { background: rgba(60,120,216,0.18); color: #6da3ed; }
  .pos-te { background: rgba(246,178,107,0.18); color: #f6c084; }
  .pos-other { background: var(--panel-2); color: var(--muted); }

  .trade-block {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.015);
  }
  .trade-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .trade-date { font-weight: 600; }
  .trade-meta { color: var(--muted); font-size: 13px; }
  .trade-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .trade-col {
    background: var(--panel-2);
    border-radius: 6px;
    padding: 10px;
  }
  .trade-col-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .trade-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 14px;
    flex-wrap: wrap;
  }
  .trade-player { font-weight: 500; }
  .trade-where { color: var(--muted); font-size: 12px; margin-left: auto; }
  .trade-resolved { color: var(--muted); font-size: 13px; }
  .trade-empty { color: var(--muted); font-style: italic; font-size: 13px; }

  @media (max-width: 640px) {
    .trade-cols { grid-template-columns: 1fr; }
    .trade-where { margin-left: 0; }
    .trade-header { flex-direction: column; gap: 4px; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 640px) {
    header { padding: 10px 14px; }
    h1 { font-size: 17px; }
    .header-row { gap: 10px; }
    .status { font-size: 12px; gap: 6px; }
    button.refresh { padding: 5px 10px; font-size: 12px; }

    nav.tabs {
      margin: 12px -14px -11px;
      padding: 0 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav.tabs::-webkit-scrollbar { display: none; }
    nav.tabs button {
      flex-shrink: 0;
      padding: 8px 12px;
      font-size: 13px;
    }

    main { padding: 14px 12px 24px; }
    .controls { gap: 8px; }
    .custom-select { min-width: 100%; }
    .custom-select-menu { max-height: 60vh; }

    .stat-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat { padding: 10px 12px; }
    .stat-label { font-size: 11px; }
    .stat-value { font-size: 20px; }

    .card { padding: 12px; overflow-x: auto; }
    .card h2 { font-size: 15px; margin-bottom: 10px; }
    .card h3 { font-size: 14px; }

    table { font-size: 12px; }
    th, td { padding: 8px 6px; }
    td.tight, th.tight { padding-left: 4px; padding-right: 4px; }
    td.gap-left, th.gap-left { padding-left: 14px; }

    .pick-row {
      grid-template-columns: 64px minmax(0, 1fr) 72px;
      gap: 6px;
      padding: 7px 4px;
      font-size: 13px;
    }
    .pick-row.with-slot {
      grid-template-columns: 60px 42px minmax(0, 1fr) 72px;
    }
    .pick-player { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pick-result { font-size: 10px; padding: 2px 4px; }
    .round-header { font-size: 11px; }

    /* Keep the Result/Mix bar visible on mobile — tables can scroll horizontally */

    .section-header {
      margin: 22px 0 10px;
      font-size: 11px;
    }
    .section-header .section-sub {
      display: block;
      margin: 3px 0 0;
      font-size: 11px;
    }
    .card-lede {
      font-size: 12.5px;
      padding: 8px 10px;
      line-height: 1.45;
    }
    .pick-row .pick-result { text-align: center; }

    footer { padding: 18px 12px; font-size: 11px; }
  }
  a.subtle { color: var(--muted); text-decoration: none; }
  a.subtle:hover { color: var(--accent); }
  footer {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>🏈 Draft Picks Tracker</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Loading…</span>
      <button class="refresh" id="refreshBtn">Refresh</button>
    </div>
  </div>
  <nav class="tabs">
    <button data-view="overview" class="active">Overview</button>
    <button data-view="year">By Year</button>
    <button data-view="person">By Person</button>
    <button data-view="leaderboard">Leaderboard</button>
    <button data-view="stats">Stats</button>
    <button data-view="trades">Trades</button>
  </nav>
</header>
<main id="main">
  <div class="empty">Loading draft data…</div>
</main>
<footer>
  Live from <a class="subtle" href="https://docs.google.com/spreadsheets/d/116MXUbHLTCDdSgVx5dZZYW0lydVyAN0rkeItdq-U7Bo/edit" target="_blank" rel="noopener">Google Sheets</a>.
  Auto-refreshes every 60 seconds.
</footer>
<script>
const REFRESH_MS = 60_000;

// Fixed color → position mapping. Cells in the sheet are colored:
//   red → QB, green → RB, blue → WR, orange → TE
const POSITION_COLORS = {
  QB: "#e06666",
  RB: "#6aa84f",
  WR: "#3c78d8",
  TE: "#f6b26b",
};
function classifyColor(hex) {
  if (!hex) return null;
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  if (max === min) return null;
  const d = max - min;
  let h;
  if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) * 60;
  else if (max === g) h = ((b - r) / d + 2) * 60;
  else h = ((r - g) / d + 4) * 60;
  if (h < 0) h += 360;
  if (h >= 330 || h < 20) return "QB";       // red
  if (h >= 20 && h < 60) return "TE";        // orange/yellow
  if (h >= 60 && h < 170) return "RB";       // green
  if (h >= 170 && h < 270) return "WR";      // blue
  return null;
}

let state = {
  picks: [],          // {year, round, person, player, result, color, pos}
  years: [],
  people: [],
  view: "overview",
  selectedYear: null,
  selectedPerson: null,
  lastUpdated: null,
  overviewSort: { col: "year", dir: "asc" },
  leaderboardSort: { col: "hitPct", dir: "desc" },
  leaderboardRound: null,
  statsRound: null,
  statsInsightDrafter: null,
  sleeper: null,            // {seasons, players}
  sleeperLoading: false,
  sleeperError: null,
  draftsSeason: null,
  tradesUserId: null,
  ktc: null,                // {seasons: {year: {snapshot, players: {normName: {rank,value,position}}}}}
  ktcLoading: false,
  ktcError: null,
};

function rgbToHex(bg) {
  if (!bg) return null;
  const r = Math.round((bg.red || 0) * 255);
  const g = Math.round((bg.green || 0) * 255);
  const b = Math.round((bg.blue || 0) * 255);
  if (r >= 248 && g >= 248 && b >= 248) return null;  // treat white-ish as no color
  return "#" + [r, g, b].map(x => x.toString(16).padStart(2, "0")).join("");
}

function toggleSort(sortState, col) {
  if (sortState.col === col) {
    sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
  } else {
    sortState.col = col;
    sortState.dir = "desc";
  }
}

function sortHeader(label, col, sortState, onClick, extraClass, baseClass) {
  const active = sortState.col === col;
  const arrow = active ? (sortState.dir === "asc" ? "▲" : "▼") : "";
  const base = baseClass != null ? baseClass : "num tight";
  return el("th", {
    class: base + " sortable" + (active ? " active" : "") + (extraClass ? " " + extraClass : ""),
    onclick: onClick,
  }, label, arrow ? el("span", { class: "arrow" }, arrow) : "");
}

function cellVal(rows, r, c) {
  const row = rows[r];
  if (!row) return "";
  const cell = row[c];
  return cell ? (cell.v || "") : "";
}
function cellColor(rows, r, c) {
  const row = rows[r];
  if (!row) return null;
  const cell = row[c];
  return cell ? rgbToHex(cell.bg) : null;
}

function extractPicks(rows) {
  // Find year headers: cellVal matches /^(\d{4}) Draft$/
  const yearHeaders = [];
  rows.forEach((row, ri) => {
    row.forEach((cell, ci) => {
      const m = ((cell && cell.v) || "").trim().match(/^(\d{4}) Draft$/);
      if (m) yearHeaders.push({ year: parseInt(m[1], 10), row: ri, col: ci });
    });
  });
  yearHeaders.sort((a, b) => a.row - b.row);

  const picks = [];
  yearHeaders.forEach((yh, idx) => {
    const endRow = idx + 1 < yearHeaders.length ? yearHeaders[idx + 1].row : rows.length;
    const yearCol = yh.col;
    const personCol = yearCol - 1;
    const playerCol = yearCol;
    const resultCol = yearCol + 1;
    let currentRound = null;
    let pickInRound = 0;
    for (let r = yh.row + 1; r < endRow; r++) {
      const yearColVal = cellVal(rows, r, yearCol).trim();
      const roundMatch = yearColVal.match(/^Round\s*(\d+)$/i);
      if (roundMatch) {
        currentRound = parseInt(roundMatch[1], 10);
        pickInRound = 0;
        continue;
      }
      const person = cellVal(rows, r, personCol).trim();
      const player = cellVal(rows, r, playerCol).trim();
      const result = cellVal(rows, r, resultCol).trim();
      if (!person) continue;
      if (/^Round\s*\d+$/i.test(person)) continue;
      if (/^Round\s*\d+$/i.test(player)) continue;
      if (/^[\d,\s]+$/.test(person)) continue;
      pickInRound += 1;
      const slot = currentRound ? `${currentRound}.${String(pickInRound).padStart(2, "0")}` : null;
      const color = cellColor(rows, r, playerCol);
      picks.push({
        year: yh.year,
        round: currentRound,
        pickInRound,
        slot,
        person: person === "Me" ? "Henry" : person,
        player: player || null,
        result: normalizeResult(result),
        color,
        pos: classifyColor(color),
      });
    }
  });
  return picks;
}

function normalizeResult(r) {
  if (!r) return null;
  const s = r.trim().toLowerCase();
  if (s === "hit") return "Hit";
  if (s === "meh") return "Meh";
  if (s === "miss") return "Miss";
  return null;
}

function resultClass(r) {
  if (r === "Hit") return "result-hit";
  if (r === "Meh") return "result-meh";
  if (r === "Miss") return "result-miss";
  return "result-pending";
}

function tally(picks) {
  let hit = 0, meh = 0, miss = 0, pending = 0;
  picks.forEach(p => {
    if (p.result === "Hit") hit++;
    else if (p.result === "Meh") meh++;
    else if (p.result === "Miss") miss++;
    else if (p.player) pending++;
    // Picks with no player assigned (future slots) are excluded from totals.
  });
  return { hit, meh, miss, pending, total: hit + meh + miss + pending, graded: hit + meh + miss };
}

function uniqueSorted(arr) { return [...new Set(arr)].sort(); }

function formatPct(n, d) {
  if (!d) return "—";
  return ((n / d) * 100).toFixed(1) + "%";
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === "class") e.className = attrs[k];
    else if (k === "html") e.innerHTML = attrs[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function customSelect(options, currentValue, onChange) {
  const wrap = el("div", { class: "custom-select" });
  const currentOpt = options.find(o => o.value === currentValue);
  const triggerLabel = el("span", {}, currentOpt ? currentOpt.label : "");
  const trigger = el("button", {
    class: "custom-select-trigger",
    type: "button",
    "aria-haspopup": "listbox",
    "aria-expanded": "false",
  }, triggerLabel, el("span", { class: "custom-select-chevron" }, "▼"));
  const menu = el("div", { class: "custom-select-menu", role: "listbox" });

  function close() {
    wrap.classList.remove("open");
    trigger.setAttribute("aria-expanded", "false");
    document.removeEventListener("click", outside);
    document.removeEventListener("keydown", onKey);
  }
  function openMenu() {
    document.querySelectorAll(".custom-select.open").forEach(s => {
      if (s !== wrap) s.classList.remove("open");
    });
    wrap.classList.add("open");
    trigger.setAttribute("aria-expanded", "true");
    setTimeout(() => {
      document.addEventListener("click", outside);
      document.addEventListener("keydown", onKey);
    }, 0);
  }
  function outside(e) { if (!wrap.contains(e.target)) close(); }
  function onKey(e) { if (e.key === "Escape") close(); }

  options.forEach(opt => {
    const item = el("div", {
      class: "custom-select-option" + (opt.value === currentValue ? " selected" : ""),
      role: "option",
      onclick: e => {
        e.stopPropagation();
        close();
        onChange(opt.value);
      },
    }, opt.label);
    menu.appendChild(item);
  });

  trigger.addEventListener("click", e => {
    e.stopPropagation();
    wrap.classList.contains("open") ? close() : openMenu();
  });

  wrap.appendChild(trigger);
  wrap.appendChild(menu);
  return wrap;
}

function renderBar(t) {
  const total = t.graded || 1;
  const hitW = (t.hit / total) * 100;
  const mehW = (t.meh / total) * 100;

  return el("div", { class: "bar-row" },
    el("div", { class: "bar-hit", style: `width:${hitW}%` }),
    el("div", { class: "bar-meh", style: `width:${mehW}%` }),
    el("div", { class: "bar-miss", style: `width:${missW}%` }),
  );
}

// Picks ordered chronologically per drafter (year, then by global pick number in the draft)
function picksSequenceByDrafter(picks) {
  const groups = {};
  picks.forEach(p => {
    if (!p.player || !p.round || !p.pickInRound) return;
    (groups[p.person] = groups[p.person] || []).push(p);
  });
  Object.values(groups).forEach(arr => arr.sort((a, b) => {
    if (a.year !== b.year) return a.year - b.year;
    return ((a.round - 1) * 12 + a.pickInRound) - ((b.round - 1) * 12 + b.pickInRound);
  }));
  return groups;
}

// All picks across the league in global draft order
function picksInDraftOrder(picks) {
  return picks.slice()
    .filter(p => p.player && p.round && p.pickInRound)
    .sort((a, b) => {
      if (a.year !== b.year) return a.year - b.year;
      return ((a.round - 1) * 12 + a.pickInRound) - ((b.round - 1) * 12 + b.pickInRound);
    });
}

function tierOfPickInRound(pir) {
  if (!pir) return null;
  if (pir <= 4) return "Early";
  if (pir <= 8) return "Mid";
  return "Late";
}

        });
      // ADP overall = rank within matched picks of this draft when sorted by KTC value desc.
      const matched = picksThisYear.filter(p => p.ktcRank != null);
      matched.sort((a, b) => a.ktcRank - b.ktcRank);
      const adpByKey = {};
      matched.forEach((p, idx) => { adpByKey[p.playerName + "|" + p.year] = idx + 1; });
      picksThisYear.forEach(p => {
        const key = p.playerName + "|" + p.year;
        if (adpByKey[key] != null) {
          p.adpOverall = adpByKey[key];
          p.diff = p.overall - p.adpOverall;  // negative = reach (taken earlier than ADP)
        }
      });
      pickRows.push(...picksThisYear);
    });

    const rows = pickRows.filter(p => p.diff != null);
    if (!rows.length) {
      adpCard.appendChild(el("div", { class: "empty" },
        "No matched KTC data yet. Check the snapshot table below for fetch errors."
      ));
    } else {
      const byDrafter = {};
      rows.forEach(r => {
        const key = r.drafter;
        (byDrafter[key] = byDrafter[key] || { drafter: key, picks: 0, sumDiff: 0, reaches: 0, steals: 0 });
        byDrafter[key].picks += 1;
        byDrafter[key].sumDiff += r.diff;
        if (r.diff < 0) byDrafter[key].reaches += 1;
        else if (r.diff > 0) byDrafter[key].steals += 1;
      });
      const adpTable = el("table", {},
        el("thead", {}, el("tr", {},
          el("th", {}, "Drafter"),
          el("th", { class: "num" }, "Matched"),
          el("th", { class: "num tight" }, "Reaches"),
          el("th", { class: "num tight" }, "Steals"),
          el("th", { class: "num tight gap-left" }, "Avg vs ADP"),
        )),
      );
      const adpBody = el("tbody", {});
      Object.values(byDrafter)
        .map(s => ({ ...s, avgDiff: s.sumDiff / s.picks }))
        .sort((a, b) => b.avgDiff - a.avgDiff)
        .forEach(r => {
          adpBody.appendChild(el("tr", {},
            el("td", {}, r.drafter),
            el("td", { class: "num" }, String(r.picks)),
            el("td", { class: "num tight" }, String(r.reaches)),
            el("td", { class: "num tight" }, String(r.steals)),
            el("td", { class: "num tight gap-left" },
              el("span", { class: r.avgDiff >= 0 ? "delta-pos" : "delta-neg" },
                (r.avgDiff >= 0 ? "+" : "") + r.avgDiff.toFixed(1)
              )),
          ));
        });
      adpTable.appendChild(adpBody);
      adpCard.appendChild(adpTable);

      const steals = rows.slice().sort((a, b) => b.diff - a.diff).slice(0, 8);
      const reaches = rows.slice().sort((a, b) => a.diff - b.diff).slice(0, 8);
      adpCard.appendChild(el("h3", { style: "margin-top:20px" }, "Biggest steals (taken much later than ADP)"));
      adpCard.appendChild(renderAdpList(steals));
      adpCard.appendChild(el("h3", { style: "margin-top:20px" }, "Biggest reaches (taken much earlier than ADP)"));
      adpCard.appendChild(renderAdpList(reaches));
    }

    const meta = el("div", { class: "pct", style: "margin-top:14px" });
    const lines = ["Snapshots used:"];
    Object.entries(state.ktc.seasons || {}).forEach(([year, info]) => {
      const ts = info.snapshot || "—";
      const date = ts.length >= 8 ? `${ts.slice(0,4)}-${ts.slice(4,6)}-${ts.slice(6,8)}` : ts;
      const err = info.error ? ` (${info.error})` : "";
      const ct = info.players ? Object.keys(info.players).length : 0;
      lines.push(`${year}: ${date}, ${ct} players${err}`);
    });
    meta.textContent = lines.join("  ·  ");
    adpCard.appendChild(meta);

    adpCard.appendChild(el("div", { class: "pct", style: "margin-top:6px" },
      "ADP overall = rank when the draft's matched picks are sorted by KTC dynasty value (1QB / 12-team). " +
      "Diff = actual pick − ADP. Negative = reached (taken earlier than KTC said); positive = steal."
    ));
  }
  main.appendChild(adpCard);
}

function renderAdpList(rows) {
  const wrap = el("div", { class: "surplus-list" });
  rows.forEach(r => {
    const diffLabel = (r.diff >= 0 ? "+" : "") + r.diff;
    wrap.appendChild(el("div", { class: "surplus-row" },
      el("span", { class: "surplus-slot" }, r.year + " · " + r.slot),
      el("span", { class: "surplus-player" },
        r.playerName,
        r.position
          ? el("span", { class: "pos-chip " + positionClass(r.position), style: "margin-left:8px" }, r.position)
          : null,
        el("span", { class: "pct", style: "margin-left:8px" }, "ADP " + r.adpOverall),
      ),
      el("span", { class: "surplus-by" }, "by " + r.drafter),
      el("span", { class: "surplus-delta " + (r.diff >= 0 ? "delta-pos" : "delta-neg") },
        diffLabel + " vs ADP"
      ),
    ));
  });
  return wrap;
}

// ---------- Sleeper integration ----------
async function loadSleeper(force = false) {
  if (state.sleeperLoading) return;
  if (state.sleeper && !force) return;
  state.sleeperLoading = true;
  state.sleeperError = null;
  render();
  try {
    const res = await fetch("/api/sleeper" + (force ? "?_=" + Date.now() : ""), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.sleeper = data;
  } catch (e) {
    state.sleeperError = e.message;
  } finally {
    state.sleeperLoading = false;
    render();
  }
}

function ensureSleeperLoaded() {
  if (!state.sleeper && !state.sleeperLoading && !state.sleeperError) loadSleeper();
}

// Same normalization as /api/ktc.js — keep in sync for joins to work.
function ktcNormalizeName(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[’‘ʼ]/g, "'")
    .replace(/[.,'`]/g, "")
    .replace(/\s+jr\b|\s+sr\b|\s+ii\b|\s+iii\b|\s+iv\b/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// Pick the canonical rookie draft for a season: the first chronologically-created
// complete draft. Supplementals created later in the same year are excluded.
// 2019 is the league's startup season (25-round draft), not a rookie draft we
// want to analyze, so it returns null.
function rookieDraftFor(season) {
  if (!season) return null;
  if (season.season === "2019") return null;
  const completed = season.drafts.filter(d =>
    d.status === "complete" && d.picks && d.picks.length
  );
  if (!completed.length) return null;
  return completed.slice().sort((a, b) => (a.created || 0) - (b.created || 0))[0];
}

function rosterToOwner(season, rosterId) {
  if (!season || rosterId == null) return null;
  const r = season.rosters.find(x => x.roster_id === rosterId);

  return season.users.find(u => u.user_id === r.owner_id) || null;

function renderTrades() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();

  if (state.sleeperLoading) {
    main.appendChild(el("div", { class: "empty" }, "Loading from Sleeper…"));
    return;
  }
  if (state.sleeperError) {
    main.appendChild(el("div", { class: "empty" }, "Sleeper error: " + state.sleeperError));
    return;
  }
  if (!state.sleeper) {
    main.appendChild(el("div", { class: "empty" }, "No Sleeper data."));
    return;
  }

  const { seasons, players } = state.sleeper;
  // Use the current (latest) season's users as the canonical roster of managers
  const currentSeason = seasons[seasons.length - 1];
  const allUsers = currentSeason.users.slice().sort((a, b) => userDisplay(a).localeCompare(userDisplay(b)));

  if (state.tradesUserId == null && allUsers.length) state.tradesUserId = allUsers[0].user_id;

  const userOpts = allUsers.map(u => ({ value: u.user_id, label: userDisplay(u) }));
  const controls = el("div", { class: "controls" });
  controls.appendChild(customSelect(userOpts, state.tradesUserId, v => {
    state.tradesUserId = v;
    render();
  }));
  main.appendChild(controls);

  const selectedUser = allUsers.find(u => u.user_id === state.tradesUserId);

  // Build a flat list of trades this user was involved in across all seasons.
  // For each season, map user_id -> roster_id in that season.
  const userTrades = [];
  seasons.forEach(season => {
    const myRoster = season.rosters.find(r => r.owner_id === state.tradesUserId);
    if (!myRoster) return;
    const myRosterId = myRoster.roster_id;
    season.trades.forEach(t => {
      if (!t.roster_ids.includes(myRosterId)) return;
      userTrades.push({ season, trade: t, myRosterId });
    });
  });
  userTrades.sort((a, b) => b.trade.created - a.trade.created);

  // Summary stats
  let playersReceived = 0, playersSent = 0, picksReceived = 0, picksSent = 0;
  userTrades.forEach(({ trade, myRosterId }) => {
    Object.entries(trade.adds).forEach(([, rid]) => { if (rid === myRosterId) playersReceived++; });
    Object.entries(trade.drops).forEach(([, rid]) => { if (rid === myRosterId) playersSent++; });
    trade.draft_picks.forEach(dp => {
      if (dp.owner_id === myRosterId) picksReceived++;
      if (dp.previous_owner_id === myRosterId) picksSent++;
    });
  });
  const stats = el("div", { class: "stat-grid" },
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Trades"), el("div", { class: "stat-value" }, String(userTrades.length))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Players In"), el("div", { class: "stat-value" }, String(playersReceived))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Players Out"), el("div", { class: "stat-value" }, String(playersSent))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Picks In"), el("div", { class: "stat-value" }, String(picksReceived))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Picks Out"), el("div", { class: "stat-value" }, String(picksSent))),
  );
  main.appendChild(stats);

  const card = el("div", { class: "card" }, el("h2", {}, userDisplay(selectedUser) + " — Trade History"));

  if (!userTrades.length) {
    card.appendChild(el("div", { class: "empty" }, "No trades found for this manager."));
    main.appendChild(card);
    return;
  }

  userTrades.forEach(({ season, trade, myRosterId }) => {
    const otherRosterIds = trade.roster_ids.filter(r => r !== myRosterId);
    const otherNames = otherRosterIds.map(rid => userDisplay(rosterToOwner(season, rid))).join(", ");

    const block = el("div", { class: "trade-block" });
    block.appendChild(el("div", { class: "trade-header" },
      el("span", { class: "trade-date" }, fmtDate(trade.created)),
      el("span", { class: "trade-meta" }, season.season + " season  ·  with " + (otherNames || "—")),
    ));

    const cols = el("div", { class: "trade-cols" });
    const received = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, "Received"));
    const sent = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, "Sent"));

    // Players
    Object.entries(trade.adds).forEach(([pid, rid]) => {
      if (rid !== myRosterId) return;
      received.appendChild(renderTradePlayerLine(pid, players));
    });
    Object.entries(trade.drops).forEach(([pid, rid]) => {
      if (rid !== myRosterId) return;
      sent.appendChild(renderTradePlayerLine(pid, players));
    });

    // Picks
    trade.draft_picks.forEach(dp => {
      if (dp.owner_id === myRosterId) {
        received.appendChild(renderTradePickLine(dp, seasons, players));
      }
      if (dp.previous_owner_id === myRosterId) {
        sent.appendChild(renderTradePickLine(dp, seasons, players));
      }
    });

    if (!received.children.length || received.children.length === 1) {
      received.appendChild(el("div", { class: "trade-empty" }, "—"));
    }
    if (!sent.children.length || sent.children.length === 1) {
      sent.appendChild(el("div", { class: "trade-empty" }, "—"));
    }
    cols.appendChild(received);
    cols.appendChild(sent);
    block.appendChild(cols);
    card.appendChild(block);
  });

  main.appendChild(card);
}

function renderTradePlayerLine(pid, players) {
  const p = players[pid];
  const line = el("div", { class: "trade-line" });
  if (p) {
    line.appendChild(el("span", { class: "trade-player" }, p.name));
    if (p.position) {
      line.appendChild(el("span", { class: "pos-chip " + positionClass(p.position) }, p.position));
    }
  } else {
    line.appendChild(el("span", { class: "trade-player" }, "Player " + pid));
  }
  return line;
}

// Look up which player was actually drafted with a traded pick.
// dp: { season, round, roster_id } where roster_id is the original slot owner.
function resolvePickToPlayer(dp, allSeasons, players) {
  const season = allSeasons.find(s => s.season === dp.season);
  if (!season) return null;
  // Use the first chronologically-created complete draft that has enough rounds and any picks.
  const draft = season.drafts
    .filter(d => d.status === "complete" && (d.rounds || 0) >= dp.round && d.picks && d.picks.length)
    .slice()
    .sort((a, b) => (a.created || 0) - (b.created || 0))[0];
  if (!draft) return null;
  // Find the draft slot belonging to the original roster
  const slotEntry = Object.entries(draft.slot_to_roster_id || {})
    .find(([, rid]) => rid === dp.roster_id);
  if (!slotEntry) return null;
  const slot = parseInt(slotEntry[0], 10);
  const pick = draft.picks.find(p => p.round === dp.round && p.draft_slot === slot);
  if (!pick) return null;
  const player = players[pick.player_id];
  return { pick, player };
}

function renderTradePickLine(dp, allSeasons, players) {
  const line = el("div", { class: "trade-line" });
  const label = `${dp.season} Round ${dp.round} pick`;
  const resolved = resolvePickToPlayer(dp, allSeasons, players);
  if (resolved && resolved.player) {
    line.appendChild(el("span", { class: "trade-player" }, label));
    line.appendChild(el("span", { class: "trade-resolved" }, "→ " + resolved.player.name));
    if (resolved.player.position) {
      line.appendChild(el("span", { class: "pos-chip " + positionClass(resolved.player.position) }, resolved.player.position));
    }
  } else {
    line.appendChild(el("span", { class: "trade-player" }, label));
  }
  return line;
}

function setActiveTab(view) {
  document.querySelectorAll("nav.tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.view === view);
  });
}

function render() {
  if (!state.picks.length) {
    document.getElementById("main").innerHTML = '<div class="empty">No draft data available.</div>';
    return;
  }
  switch (state.view) {
    case "year": renderYearView(); break;
    case "person": renderPersonView(); break;
    case "leaderboard": renderLeaderboard(); break;
    case "stats": renderStats(); break;
    case "trades": renderTrades(); break;
    default: renderOverview();
  }
}

function setStatus(kind, text) {
  const dot = document.getElementById("statusDot");
  const txt = document.getElementById("statusText");
  dot.className = "status-dot" + (kind === "loading" ? " loading" : kind === "error" ? " error" : "");
  txt.textContent = text;
}

async function loadData() {
  setStatus("loading", "Refreshing…");
  try {
    const res = await fetch("/api/sheet?_=" + Date.now(), { cache: "no-store" });
    if (!res.ok) {
      const detail = await res.text();
      throw new Error("API " + res.status + ": " + detail.slice(0, 120));
    }
    const data = await res.json();
    if (!data.rows) throw new Error("malformed response");
    const picks = extractPicks(data.rows);
    state.picks = picks;
    state.years = uniqueSorted(picks.map(p => p.year));
    state.people = uniqueSorted(picks.map(p => p.person));
    state.lastUpdated = new Date();
    setStatus("ok", "Updated " + state.lastUpdated.toLocaleTimeString());
    render();
  } catch (e) {
    console.error(e);
    setStatus("error", "Failed: " + e.message);
  }
}

document.querySelectorAll("nav.tabs button").forEach(b => {
  b.addEventListener("click", () => {
    state.view = b.dataset.view;
    setActiveTab(state.view);
    render();
  });
});
document.getElementById("refreshBtn").addEventListener("click", loadData);

loadData();
setInterval(loadData, REFRESH_MS);
