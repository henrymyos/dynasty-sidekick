<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d1117" />
<title>Dynasty Sidekick</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="apple-mobile-web-app-title" content="Dynasty Sidekick">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c232c;
    --border: #2a313a;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --hit: #2ea043;
    --hit-bg: rgba(46,160,67,0.15);
    --meh: #d29922;
    --meh-bg: rgba(210,153,34,0.15);
    --miss: #f85149;
    --miss-bg: rgba(248,81,73,0.12);
    --pending: #6e7681;
    --pending-bg: rgba(110,118,129,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    /* When launched from the home screen (standalone), the page draws under
       the status bar / notch, so pad by the safe-area insets to keep the title
       clear. These are 0 in a normal browser, where the chrome already covers
       that space. */
    padding-top: calc(16px + env(safe-area-inset-top, 0px));
    padding-left: calc(24px + env(safe-area-inset-left, 0px));
    padding-right: calc(24px + env(safe-area-inset-right, 0px));
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
  }
  .status {
    color: var(--muted);
    font-size: 13px;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--hit);
  }
  .status-dot.loading { background: var(--meh); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--miss); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  button.refresh {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  button.refresh:hover { background: var(--border); }
  nav.tabs {
    display: flex;
    gap: 4px;
    margin-top: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: -17px;
  }
  nav.tabs button {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  nav.tabs button.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  nav.tabs button:hover:not(.active) { color: var(--text); }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .custom-select { position: relative; min-width: 200px; }
  .custom-select-trigger {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .custom-select-trigger:hover {
    border-color: var(--accent);
    background: var(--panel-2);
  }
  .custom-select.open .custom-select-trigger {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  }
  .custom-select-chevron {
    color: var(--muted);
    font-size: 10px;
    transition: transform 0.15s;
  }
  .custom-select.open .custom-select-chevron { transform: rotate(180deg); }
  .custom-select-menu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    max-height: 320px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    padding: 4px;
  }
  .custom-select.open .custom-select-menu { display: block; }
  .custom-select-option {
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text);
  }
  .custom-select-option:hover { background: var(--panel-2); }
  .custom-select-option.selected {
    background: rgba(88, 166, 255, 0.12);
    color: var(--accent);
  }
  .grid {
    display: grid;
    gap: 16px;
  }
  .grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card h2, .card h3 {
    margin: 0 0 12px;
    font-size: 16px;
    font-weight: 600;
  }
  .card h2 { font-size: 18px; }
  .round-header {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .round-header:first-child { margin-top: 0; }
  .round-header.clickable { cursor: pointer; }
  .round-header.clickable:hover { color: var(--text); border-bottom-color: var(--accent); }
  .round-header .rh-total { color: var(--muted); font-weight: 500; text-transform: none; letter-spacing: 0; }
  .round-header.empty-cat { opacity: 0.55; }
  .round-header.empty-cat .rh-none { font-style: italic; }
  .pick-row {
    display: grid;
    grid-template-columns: 110px 1fr 70px;
    gap: 12px;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .pick-row.with-slot {
    grid-template-columns: 110px 56px 1fr 70px;
  }
  .pick-slot {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }
  .pick-row:hover { background: var(--panel-2); }
  .pick-person {
    font-weight: 600;
    color: var(--text);
  }
  .pick-player { color: var(--text); }
  .pick-result {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .result-hit { background: var(--hit-bg); color: var(--hit); }
  .result-meh { background: var(--meh-bg); color: var(--meh); }
  .result-miss { background: var(--miss-bg); color: var(--miss); }
  .result-pending { background: var(--pending-bg); color: var(--pending); }

  /* Clickable hit-rate rows/cells → drill into the underlying picks */
  tr.row-clickable { cursor: pointer; }
  td.cell-clickable { cursor: pointer; }
  td.cell-clickable:hover { outline: 1px solid var(--accent); outline-offset: -1px; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--muted);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.tight, th.tight { padding-left: 6px; padding-right: 6px; white-space: nowrap; width: 1%; }
  td.gap-left, th.gap-left { padding-left: 24px; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th.sortable .arrow { margin-left: 4px; opacity: 0.6; }
  th.sortable.active { color: var(--accent); }
  th.sortable.active .arrow { opacity: 1; }
  tr:hover td { background: var(--panel-2); }
  /* League History grids (years x managers). Cell tints need the hover
     variants too so the row-hover rule doesn't wash them out. */
  .hist-table th, .hist-table td { padding: 8px 10px; text-align: center; white-space: nowrap; }
  .hist-table th:first-child, .hist-table td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    background: var(--panel);
    z-index: 1;
  }
  .hist-table td { font-variant-numeric: tabular-nums; }
  .hist-table td.fin-1,   .hist-table tr:hover td.fin-1   { background: rgba(227, 179, 65, 0.24); color: #e3b341; font-weight: 700; }
  .hist-table td.fin-2,   .hist-table tr:hover td.fin-2   { background: rgba(176, 186, 197, 0.20); color: #c9d1d9; font-weight: 600; }
  .hist-table td.fin-3,   .hist-table tr:hover td.fin-3   { background: rgba(219, 109, 40, 0.22); color: #db6d28; font-weight: 600; }
  .hist-table td.fin-po,  .hist-table tr:hover td.fin-po  { background: rgba(46, 160, 67, 0.16); color: #3fb950; }
  .hist-table td.fin-bot, .hist-table tr:hover td.fin-bot { background: rgba(248, 81, 73, 0.13); color: #f85149; }
  .hist-table td.rec-champ,  .hist-table tr:hover td.rec-champ  { background: rgba(227, 179, 65, 0.24); color: #e3b341; font-weight: 700; }
  .hist-table td.rec-runner, .hist-table tr:hover td.rec-runner { background: rgba(88, 166, 255, 0.16); color: var(--accent); font-weight: 600; }
  .hist-table tr.hist-proj td { color: var(--muted); font-style: italic; }
  .hist-table tr.hist-summary-top td, .hist-table tr.hist-summary-top th { border-top: 2px solid var(--border); }
  .hist-table th.metric-label { text-align: left; }
  .hist-note { color: var(--muted); font-size: 12px; margin-top: 10px; }
  .hist-table td.h2h-w, .hist-table tr:hover td.h2h-w { background: rgba(46, 160, 67, 0.13); color: #3fb950; }
  .hist-table td.h2h-l, .hist-table tr:hover td.h2h-l { background: rgba(248, 81, 73, 0.10); color: #f85149; }
  .hist-table td.diag, .hist-table tr:hover td.diag { color: var(--muted); }
  .hist-table tr.hist-total td { font-weight: 700; border-top: 2px solid var(--border); }
  .bar-row {
    display: flex;
    height: 6px;
    min-width: 60px;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
    background: var(--panel-2);
  }
  .bar-hit { background: var(--hit); }
  .bar-meh { background: var(--meh); }
  .bar-miss { background: var(--miss); }
  .pct { color: var(--muted); font-size: 12px; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 600;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  /* Record / superlative tiles (League Records graphic) */
  .rec-tile .stat-value { font-size: 18px; line-height: 1.25; }
  .rec-tile .stat-value .rec-count { color: var(--muted); font-weight: 600; font-size: 14px; margin-left: 6px; }
  .rec-sub { color: var(--muted); font-size: 11px; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .rec-line + .rec-line { margin-top: 2px; }
  .rec-tile .stat-label .rec-medal { margin-right: 5px; text-transform: none; }
  .rec-empty { color: var(--pending); font-style: italic; }
  .empty {
    color: var(--muted);
    text-align: center;
    padding: 40px 20px;
    font-style: italic;
  }
  .swatch {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
    vertical-align: middle;
    margin-right: 8px;
  }
  .color-row {
    display: grid;
    grid-template-columns: 28px 110px 1fr;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 6px;
  }
  .color-row:hover { background: var(--panel-2); }
  .color-row input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    width: 90px;
  }
  .color-row input:focus { outline: none; border-color: var(--accent); }
  tr.pos-total td { font-weight: 600; border-top: 1px solid var(--border); }
  tr.pos-sub td:first-child {
    padding-left: 28px;
    color: var(--muted);
    font-size: 13px;
  }
  tr.pos-sub td { color: var(--muted); }
  tr.pos-tier td:first-child {
    padding-left: 52px;
    color: var(--muted);
    font-size: 12px;
  }
  tr.pos-tier td { color: var(--muted); font-size: 12px; }
  td.cell-best {
    background: rgba(46, 160, 67, 0.14);
    color: var(--hit);
    font-weight: 600;
  }

  .ws-switch {
    display: inline-flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .ws-switch .ws-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  .ws-switch .ws-btn.active {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--border);
  }
  .ws-switch .ws-btn:hover:not(.active) { color: var(--text); }

  .draft-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  /* Sleeper-style draft board */
  .draft-board-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .draft-board-grid {
    display: grid;
    grid-template-columns: repeat(12, minmax(86px, 1fr));
    gap: 4px;
    min-width: 1060px;
  }
  .db-head {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    text-align: center;
    padding: 4px 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .db-cell {
    border-radius: 6px;
    padding: 5px 6px;
    min-height: 46px;
    background: var(--panel-2);
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
  }
  .db-cell.db-qb { background: rgba(224,102,102,0.28); }
  .db-cell.db-rb { background: rgba(106,168,79,0.28); }
  .db-cell.db-wr { background: rgba(60,120,216,0.28); }
  .db-cell.db-te { background: rgba(246,178,107,0.28); }
  .db-cell.db-future { background: transparent; border: 1px dashed var(--border); }
  .db-cell.db-mine { box-shadow: inset 0 0 0 1.5px var(--accent); }
  .db-cell.db-onclock { box-shadow: inset 0 0 0 2px var(--hit); animation: dbPulse 1.2s ease-in-out infinite; }
  @keyframes dbPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  .db-pickno {
    font-size: 9px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    display: flex;
    justify-content: space-between;
    gap: 4px;
  }
  .db-pickno .db-by {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .db-player {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .db-owner {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 800px) {
    .draft-grid { grid-template-columns: 1fr; }
  }
  .on-clock-banner {
    background: linear-gradient(90deg, rgba(46,160,67,0.18), rgba(46,160,67,0.05));
    border-left: 4px solid var(--hit);
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 15px;
    font-weight: 600;
  }
  .rec-card {
    background: rgba(46,160,67,0.10);
    border: 1px solid rgba(46,160,67,0.4);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .rec-card .rec-label {
    color: var(--hit);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .rec-card .rec-player {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .rec-card .rec-meta {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
  }
  .roster-section { margin-bottom: 12px; }
  .roster-section h4 {
    margin: 0 0 6px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .roster-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .roster-chip {
    background: var(--panel-2);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text);
  }
  .roster-chip.is-rookie { color: var(--accent); border: 1px solid rgba(88,166,255,0.4); }
  /* Live Draft roster: 4 position columns of Sleeper-style player tiles */
  .roster-pos-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .roster-pos-col { min-width: 0; }
  .roster-pos-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  .player-tile {
    border-radius: 7px;
    padding: 5px 7px;
    margin-bottom: 5px;
    background: var(--panel-2);
    min-width: 0;
  }
  .player-tile.pt-qb { background: rgba(224,102,102,0.22); }
  .player-tile.pt-rb { background: rgba(106,168,79,0.22); }
  .player-tile.pt-wr { background: rgba(60,120,216,0.22); }
  .player-tile.pt-te { background: rgba(246,178,107,0.22); }
  .player-tile.is-rookie { box-shadow: inset 0 0 0 1.5px rgba(88,166,255,0.55); }
  .pt-meta {
    display: flex;
    justify-content: space-between;
    gap: 4px;
    font-size: 9px;
    font-weight: 700;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    margin-bottom: 1px;
  }
  .pt-first {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pt-last {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 640px) {
    .roster-pos-grid { gap: 4px; }
    .player-tile { padding: 4px 5px; }
    .pt-last { font-size: 11px; }
  }
  .draft-pill {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--panel-2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
  }
  .draft-pill.live { background: rgba(248,81,73,0.15); color: var(--miss); }
  .draft-pill.pre { background: var(--panel-2); }
  .draft-pill.done { background: rgba(46,160,67,0.15); color: var(--hit); }
  .pick-history-row {
    display: grid;
    grid-template-columns: 56px 1fr 110px;
    gap: 8px;
    align-items: center;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  .pick-history-row.is-mine { background: rgba(88,166,255,0.10); }
  .pick-history-slot { color: var(--muted); font-variant-numeric: tabular-nums; }
  .pick-history-by { color: var(--muted); font-size: 12px; text-align: right; }
  /* Roster-detail variant — much tighter left indent than the pick history. */
  .roster-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  .roster-row .name-line {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    min-width: 0;
  }
  .roster-row .name-line .player-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .roster-row .meta {
    color: var(--muted);
    font-size: 12px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  @media (max-width: 640px) {
    .roster-row {
      padding: 5px 4px;
      gap: 6px;
      font-size: 12.5px;
    }
    .roster-row .meta { font-size: 11px; }
  }
  /* Tier legend */
  .star-row {
    color: #f2cd55;
    letter-spacing: 2px;
    font-size: 13px;
    white-space: nowrap;
  }
  @media (max-width: 640px) {
    .star-row { letter-spacing: 0; font-size: 11px; }
  }
  .tier-legend {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
    margin-top: 6px;
  }
  .tier-legend .tier-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .tier-legend .tier-card .tier-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .tier-legend .tier-card .tier-desc {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.4;
  }
  .toggle-row {
    display: flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 12px;
  }
  .toggle-row button {
    flex: 1;
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
  }
  .toggle-row button.active {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--border);
  }

  .section-header {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    margin: 28px 4px 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-header:first-child { margin-top: 0; }
  .section-header .section-sub {
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    color: var(--muted);
    margin-left: 12px;
    font-size: 12px;
    opacity: 0.7;
  }

  .card-lede {
    background: var(--panel-2);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    margin: -4px 0 14px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }
  .card-lede strong { color: var(--accent); }
  .lede-link {
    cursor: pointer;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.15s;
  }
  .lede-link:hover { border-bottom-color: var(--accent); }
  .lede-link:hover strong { text-decoration: underline; }

  /* Lightweight modal for the category breakdown */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px;
    /* Clear the status bar / home indicator in standalone (home-screen) mode. */
    padding-top: calc(48px + env(safe-area-inset-top, 0px));
    padding-bottom: calc(48px + env(safe-area-inset-bottom, 0px));
    z-index: 1000;
    overflow-y: auto;
  }
  .modal-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    width: 100%;
    max-width: 640px;
    max-height: calc(100vh - 96px);
    display: flex;
    flex-direction: column;
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--panel);
    border-radius: 10px 10px 0 0;
  }
  .modal-head h3 { margin: 0; font-size: 16px; }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 8px 20px 20px; overflow-y: auto; }
  .modal-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .modal-row:last-child { border-bottom: none; }
  .modal-row.is-mine { background: rgba(88, 166, 255, 0.08); margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
  .modal-row .mr-name { font-weight: 600; }
  .modal-row .mr-owner { margin-left: auto; color: var(--muted); font-size: 13px; white-space: nowrap; }
  .modal-row .mr-val { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }

  /* Change-league page */
  .league-page {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 2000;
    overflow-y: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 64px 16px;
    padding-top: calc(64px + env(safe-area-inset-top, 0px));
    padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
  }
  .league-page-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    width: 100%;
    max-width: 480px;
    padding: 28px;
  }
  .league-page-brand {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 18px;
  }
  .league-page-card h2 {
    margin: 0 0 8px;
    font-size: 22px;
    font-weight: 600;
  }
  .league-page-card p.lp-sub {
    margin: 0 0 20px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }
  .league-page-card label.lp-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .lp-input {
    width: 100%;
    box-sizing: border-box;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .lp-input::placeholder { color: var(--pending); }
  .lp-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  }
  .lp-hint { font-size: 12px; color: var(--muted); margin: 8px 0 0; }
  .lp-error { font-size: 13px; color: var(--miss); margin: 10px 0 0; min-height: 16px; }
  .lp-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  .lp-btn {
    border-radius: 6px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    font-family: inherit;
  }
  .lp-btn-primary {
    background: var(--accent);
    color: #0d1117;
    border-color: var(--accent);
  }
  .lp-btn-primary:hover { filter: brightness(1.08); }
  .lp-btn-ghost {
    background: var(--panel-2);
    color: var(--text);
  }
  .lp-btn-ghost:hover { background: var(--border); }
  .lp-btn-link {
    background: none;
    border: none;
    color: var(--muted);
    margin-left: auto;
  }
  .lp-btn-link:hover { color: var(--text); }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .pill-strong { background: rgba(46,160,67,0.18); color: var(--hit); }
  .action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .action-btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s;
  }
  .action-btn:hover { background: var(--border); border-color: var(--accent); }
  .action-btn.primary {
    background: rgba(88,166,255,0.15);
    border-color: rgba(88,166,255,0.5);
    color: var(--accent);
  }
  .action-btn.primary:hover { background: rgba(88,166,255,0.25); }
  .action-btn.copied { background: rgba(46,160,67,0.18); border-color: rgba(46,160,67,0.5); color: var(--hit); }
  .trade-block .action-row { margin-top: 8px; margin-bottom: 0; }

  /* ----- Lineup / Waivers polish ----- */
  .lineup-row {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--panel-2);
    margin-bottom: 6px;
    border-left: 3px solid transparent;
  }
  .lineup-row.is-empty { opacity: 0.55; font-style: italic; }
  .lineup-row.pos-qb { border-left-color: #e06666; }
  .lineup-row.pos-rb { border-left-color: #6aa84f; }
  .lineup-row.pos-wr { border-left-color: #3c78d8; }
  .lineup-row.pos-te { border-left-color: #f6b26b; }
  .lineup-row.is-bench { background: transparent; padding: 6px 10px; border-radius: 4px; }
  .lineup-row.is-bench:hover { background: var(--panel-2); }
  .slot-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    padding: 4px 6px;
    border-radius: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .player-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .player-name-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
  }
  .player-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .player-meta-line {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 12px;
    flex-wrap: wrap;
  }
  .matchup { color: var(--muted); font-size: 12px; }
  .opp { color: var(--text-sub, var(--muted)); }
  .injury-chip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(248,81,73,0.15);
    color: var(--miss);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .upgrade-chip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(46,160,67,0.18);
    color: var(--hit);
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .proj-points {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 50px;
  }
  .proj-points.dim { opacity: 0.55; }
  .proj-sub {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 1px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .sub-header {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sub-header .count {
    background: var(--panel-2);
    color: var(--muted);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
  }
  .offseason-banner {
    background: rgba(210,153,34,0.10);
    border: 1px solid rgba(210,153,34,0.3);
    color: var(--meh);
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .pos-filter {
    display: inline-flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    gap: 2px;
  }
  .pos-filter button {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  .pos-filter button.active {
    background: var(--panel);
    color: var(--text);
    box-shadow: 0 0 0 1px var(--border);
  }
  .pos-filter button:hover:not(.active) { color: var(--text); }
  .pill-weak { background: rgba(248,81,73,0.15); color: var(--miss); }
  .pill-avg { background: var(--panel-2); color: var(--muted); }

  .surplus-list { display: flex; flex-direction: column; gap: 4px; }
  .surplus-row {
    display: grid;
    grid-template-columns: 80px minmax(0, 1fr) 140px 80px;
    gap: 12px;
    align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .surplus-row:hover { background: var(--panel-2); }
  .surplus-slot { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 13px; }
  .surplus-player { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .surplus-by { color: var(--muted); font-size: 13px; text-align: right; }
  .surplus-delta {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 13px;
  }
  .delta-pos { color: var(--hit); }
  .delta-neg { color: var(--miss); }

  @media (max-width: 640px) {
    .surplus-row {
      grid-template-columns: 70px minmax(0,1fr) 70px;
      font-size: 13px;
    }
    .surplus-by { display: none; }
  }

  .pos-chip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .pos-qb { background: rgba(224,102,102,0.18); color: #f08585; }
  .pos-rb { background: rgba(106,168,79,0.18); color: #8bc46c; }
  .pos-wr { background: rgba(60,120,216,0.18); color: #6da3ed; }
  .pos-te { background: rgba(246,178,107,0.18); color: #f6c084; }
  .pos-other { background: var(--panel-2); color: var(--muted); }

  .trade-block {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.015);
  }
  .trade-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .trade-date { font-weight: 600; }
  .trade-meta { color: var(--muted); font-size: 13px; }
  .trade-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .trade-col {
    background: var(--panel-2);
    border-radius: 6px;
    padding: 10px;
  }
  .trade-col-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .trade-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 14px;
    flex-wrap: wrap;
  }
  .trade-player { font-weight: 500; }
  .trade-where { color: var(--muted); font-size: 12px; margin-left: auto; }
  .trade-resolved { color: var(--muted); font-size: 13px; }
  .auto-grade-chip {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .auto-big-hit { background: rgba(46,160,67,0.30); color: #74e08c; }
  /* Dynasty Domain 12-tier color ladder. Elite tiers cool greens, mid blues,
     low yellows, bottom reds/grays. Each chip carries its own background so
     they're visually distinct at a glance. */
  /* Colors follow the Dynasty Domain chart: purple → indigo → blue →
     light blue → dark green → green → gold → orange → red. Jag tiers and
     Replaceable (not on the chart) stay muted. */
  .dd-cornerstone        { background: rgba(186,68,247,0.25);  color: #d49bff; }
  .dd-foundational       { background: rgba(67,56,202,0.35);   color: #a5b4fc; }
  .dd-upside-premier     { background: rgba(37,99,235,0.30);   color: #7fb1ff; }
  .dd-mainstay           { background: rgba(56,189,248,0.22);  color: #7dd6fb; }
  .dd-productive-vet     { background: rgba(21,128,61,0.32);   color: #6fcf8f; }
  .dd-short-lw           { background: rgba(34,197,94,0.22);   color: #74e08c; }
  .dd-upside-shot        { background: rgba(234,179,8,0.22);   color: #f2cd55; }
  .dd-short-prod         { background: rgba(249,115,22,0.22);  color: #fda866; }
  .dd-serviceable        { background: rgba(220,38,38,0.20);   color: #f08585; }
  .dd-jag-insurance      { background: rgba(110,118,129,0.20); color: var(--muted); }
  .dd-jag-developmental  { background: rgba(110,118,129,0.16); color: var(--muted); }
  .dd-replaceable        { background: rgba(110,118,129,0.12); color: var(--muted); }
  .auto-hit { background: rgba(46,160,67,0.15); color: var(--hit); }
  .auto-meh { background: rgba(210,153,34,0.15); color: var(--meh); }
  .auto-miss { background: rgba(248,81,73,0.15); color: var(--miss); }
  .auto-big-miss { background: rgba(248,81,73,0.30); color: #ff7e74; }
  .auto-pending { background: var(--panel-2); color: var(--muted); }

  .trade-value-tag {
    margin-left: auto;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
  }
  .trade-empty { color: var(--muted); font-style: italic; font-size: 13px; }

  @media (max-width: 640px) {
    .trade-cols { grid-template-columns: 1fr; }
    .trade-where { margin-left: 0; }
    .trade-header { flex-direction: column; gap: 4px; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 640px) {
    header {
      padding: 10px 14px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      padding-left: calc(14px + env(safe-area-inset-left, 0px));
      padding-right: calc(14px + env(safe-area-inset-right, 0px));
    }
    h1 { font-size: 17px; }
    .header-row { gap: 10px; }
    .status { font-size: 12px; gap: 6px; }
    button.refresh { padding: 8px 13px; font-size: 12px; }

    nav.tabs {
      margin: 12px -14px -11px;
      padding: 0 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav.tabs::-webkit-scrollbar { display: none; }
    nav.tabs button {
      flex-shrink: 0;
      padding: 8px 12px;
      font-size: 13px;
    }

    main { padding: 14px 12px 24px; }
    .controls { gap: 8px; }
    .custom-select { min-width: 100%; }
    .custom-select-menu { max-height: 60vh; }

    .stat-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat { padding: 10px 12px; }
    .stat-label { font-size: 11px; }
    .stat-value { font-size: 20px; }

    .card { padding: 12px; overflow-x: auto; }
    .card h2 { font-size: 15px; margin-bottom: 10px; }
    .card h3 { font-size: 14px; }

    table { font-size: 12px; }
    th, td { padding: 8px 6px; }
    td.tight, th.tight { padding-left: 4px; padding-right: 4px; }
    td.gap-left, th.gap-left { padding-left: 14px; }

    .pick-row {
      grid-template-columns: 64px minmax(0, 1fr) 72px;
      gap: 6px;
      padding: 7px 4px;
      font-size: 13px;
    }
    .pick-row.with-slot {
      grid-template-columns: 60px 42px minmax(0, 1fr) 72px;
    }
    .pick-player { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pick-result { font-size: 10px; padding: 2px 4px; }
    .round-header { font-size: 11px; }

    /* Keep the Result/Mix bar visible on mobile — tables can scroll horizontally */

    .section-header {

<body>
<header>
  <div class="header-row">
    <h1>🏈 Dynasty Sidekick</h1>
    <div class="ws-switch" id="wsSwitch">
      <button class="ws-btn" data-ws="drafts">Rookie Drafts</button>
      <button class="ws-btn" data-ws="team">My Team</button>
    </div>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Loading…</span>
      <button class="refresh" id="refreshBtn">Refresh</button>
      <button class="refresh" id="leagueBtn" title="View a different Sleeper league">Change league</button>
    </div>
  </div>
  <nav class="tabs" id="tabsNav"></nav>
</header>
<main id="main">
  <div class="empty">Loading draft data…</div>
</main>
<footer>
  Live from <a class="subtle" href="https://docs.google.com/spreadsheets/d/116MXUbHLTCDdSgVx5dZZYW0lydVyAN0rkeItdq-U7Bo/edit" target="_blank" rel="noopener">Google Sheets</a>.
  Auto-refreshes every 60 seconds.
</footer>
<script>
const REFRESH_MS = 60_000;

// ---------- League context ----------
// The site defaults to Henry's league but can render any Sleeper league via
// ?league=<id>. Non-default leagues skip everything sourced from the Google
// Sheets (draft grades, all-time records) and the hand-curated name merges.
const DEFAULT_LEAGUE_ID = "1312076332460425216";
const LEAGUE_ID = (() => {
  try {
    const q = new URLSearchParams(location.search).get("league");
    return q && /^\d{10,20}$/.test(q.trim()) ? q.trim() : DEFAULT_LEAGUE_ID;
  } catch { return DEFAULT_LEAGUE_ID; }
})();
const IS_DEFAULT_LEAGUE = LEAGUE_ID === DEFAULT_LEAGUE_ID;

// Superflex if the league starts 2+ QBs or has a SUPER_FLEX slot. Defaults to
// superflex until Sleeper data arrives (correct for the default league).
function leagueIsSuperflex() {
  if (IS_DEFAULT_LEAGUE) return true;
  if (!state.sleeper || !state.sleeper.seasons.length) return true;
  const latest = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  const rp = latest.roster_positions || [];
  return rp.includes("SUPER_FLEX") || rp.filter(s => s === "QB").length >= 2;
}

// KTC value-scale query for this league: 1QB vs superflex, plus the TE-premium
// tier matching the league's TE reception bonus (KTC models +0.5 / +1.0 / +1.5).
function ktcDynastyQuery() {
  let q = "format=" + (leagueIsSuperflex() ? "sf" : "1qb");
  if (!IS_DEFAULT_LEAGUE && state.sleeper && state.sleeper.seasons.length) {
    const bonus = state.sleeper.seasons[state.sleeper.seasons.length - 1].bonus_rec_te || 0;
    if (bonus > 0) q += "&tep=" + (bonus <= 0.75 ? "tep" : bonus <= 1.25 ? "tepp" : "teppp");
  }
  return q;
}

// "My team" in a non-default league: claimed via the Live Draft "I am"
// dropdown (stored per league). The default league is always Henry.
const LS_MY_TEAM = "dp.myTeam." + LEAGUE_ID;
function myTeamName() {
  if (IS_DEFAULT_LEAGUE) return "Henry";
  try {
    const uid = localStorage.getItem(LS_MY_TEAM);
    if (!uid || !state.sleeper || !state.sleeper.seasons.length) return null;
    const latest = state.sleeper.seasons[state.sleeper.seasons.length - 1];
    const u = latest.users.find(x => x.user_id === uid);
    return u ? canonicalOwnerName(userDisplay(u)) : null;
  } catch { return null; }
}
function setMyTeam(userId) {
  try { localStorage.setItem(LS_MY_TEAM, userId); } catch {}
}

// Fixed color → position mapping. Cells in the sheet are colored:
//   red → QB, green → RB, blue → WR, orange → TE
const POSITION_COLORS = {
  QB: "#e06666",
  RB: "#6aa84f",
  WR: "#3c78d8",
  TE: "#f6b26b",
};
function classifyColor(hex) {
  if (!hex) return null;
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  if (max === min) return null;
  const d = max - min;
  let h;
  if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) * 60;
  else if (max === g) h = ((b - r) / d + 2) * 60;
  else h = ((r - g) / d + 4) * 60;
  if (h < 0) h += 360;
  if (h >= 330 || h < 20) return "QB";       // red
  if (h >= 20 && h < 60) return "TE";        // orange/yellow
  if (h >= 60 && h < 170) return "RB";       // green
  if (h >= 170 && h < 270) return "WR";      // blue
  return null;
}

const LS_WORKSPACE = "dp.workspace.v1";
const LS_DRAFT_USER = "dp.draftUserId.v1";
const LS_DRAFT_MODE = "dp.draftMode.v1";

let state = {
  workspace: (() => {
    try {
      const saved = localStorage.getItem(LS_WORKSPACE);
      // Migrate old workspace ids: "stats" → "drafts", "draft" → "team".
      if (saved === "stats") return "drafts";
      if (saved === "draft") return "team";
      return saved || "drafts";
    } catch { return "drafts"; }
  })(),
  draft: {
    data: null,
    ktcLive: null,
    ktcDynasty: null,
    flockLive: null,
    flockError: null,
    loading: false,
    error: null,
    myUserId: (() => { try { return localStorage.getItem(LS_DRAFT_USER); } catch { return null; } })(),
    posMode: (() => { try { return localStorage.getItem(LS_DRAFT_MODE) === "pos"; } catch { return false; } })(),
    lastPoll: null,
    pollTimer: null,
  },
  picks: [],          // {year, round, person, player, result, color, pos}
  years: [],
  people: [],
  view: "overview",
  selectedYear: null,
  selectedPerson: null,
  lastUpdated: null,
  overviewSort: { col: "year", dir: "asc" },
  leaderboardSort: { col: "hitPct", dir: "desc" },
  rankingsSort: "composite",  // "composite" | "value" | "contender"
  teamsSubview: (() => { try { return localStorage.getItem("dp.teamsSubview") || "rankings"; } catch { return "rankings"; } })(),
  rosterTeam: null,            // selected user_id on the Rosters tab
  flockLive: null,             // shared flock-live response for non-draft views
  flockLiveLoading: false,
  flockLiveError: null,
  ktcDynasty: null,            // current KTC superflex dynasty values (shared)
  ktcDynastyLoading: false,
  ktcDynastyError: null,
  lineupData: null,            // weekly projections + league settings
  lineupDataLoading: false,
  lineupDataError: null,
  waiversFilter: "ALL",        // "ALL" | "QB" | "RB" | "WR" | "TE"
  allPlayersFilter: "ALL",     // position filter on the All Players tab
  leaderboardRound: null,
  statsRound: null,
  statsInsightDrafter: null,
  bestPosMetric: "hit",  // "hit" or "hm"
  sleeper: null,            // {seasons, players}
  sleeperLoading: false,
  sleeperError: null,
  draftsSeason: null,
  tradesUserId: null,
  ktc: null,                // {seasons: {year: {snapshot, players: {normName: {rank,value,position}}}}}
  ktcLoading: false,
  ktcError: null,
  tradeHistory: null,
  tradeHistoryLoading: false,
  tradeHistoryError: null,
};

function rgbToHex(bg) {
  if (!bg) return null;
  const r = Math.round((bg.red || 0) * 255);
  const g = Math.round((bg.green || 0) * 255);
  const b = Math.round((bg.blue || 0) * 255);
  if (r >= 248 && g >= 248 && b >= 248) return null;  // treat white-ish as no color
  return "#" + [r, g, b].map(x => x.toString(16).padStart(2, "0")).join("");
}

function toggleSort(sortState, col) {
  if (sortState.col === col) {
    sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
  } else {
    sortState.col = col;
    sortState.dir = "desc";
  }
}

function sortHeader(label, col, sortState, onClick, extraClass, baseClass) {
  const active = sortState.col === col;
  const arrow = active ? (sortState.dir === "asc" ? "▲" : "▼") : "";
  const base = baseClass != null ? baseClass : "num tight";
  return el("th", {
    class: base + " sortable" + (active ? " active" : "") + (extraClass ? " " + extraClass : ""),
    onclick: onClick,
  }, label, arrow ? el("span", { class: "arrow" }, arrow) : "");
}

function cellVal(rows, r, c) {
  const row = rows[r];
  if (!row) return "";
  const cell = row[c];
  return cell ? (cell.v || "") : "";
}
function cellColor(rows, r, c) {
  const row = rows[r];
  if (!row) return null;
  const cell = row[c];
  return cell ? rgbToHex(cell.bg) : null;
}

function extractPicks(rows) {
  // Find year headers: cellVal matches /^(\d{4}) Draft$/
  const yearHeaders = [];
  rows.forEach((row, ri) => {
    row.forEach((cell, ci) => {
      const m = ((cell && cell.v) || "").trim().match(/^(\d{4}) Draft$/);
      if (m) yearHeaders.push({ year: parseInt(m[1], 10), row: ri, col: ci });
    });
  });
  yearHeaders.sort((a, b) => a.row - b.row);

  const picks = [];
  yearHeaders.forEach((yh, idx) => {
    const endRow = idx + 1 < yearHeaders.length ? yearHeaders[idx + 1].row : rows.length;
    const yearCol = yh.col;
    const personCol = yearCol - 1;
    const playerCol = yearCol;
    const resultCol = yearCol + 1;
    let currentRound = null;
    let pickInRound = 0;
    for (let r = yh.row + 1; r < endRow; r++) {
      const yearColVal = cellVal(rows, r, yearCol).trim();
      const roundMatch = yearColVal.match(/^Round\s*(\d+)$/i);
      if (roundMatch) {
        currentRound = parseInt(roundMatch[1], 10);
        pickInRound = 0;
        continue;
      }
      const person = cellVal(rows, r, personCol).trim();
      const player = cellVal(rows, r, playerCol).trim();
      const result = cellVal(rows, r, resultCol).trim();
      if (!person) continue;
      if (/^Round\s*\d+$/i.test(person)) continue;
      if (/^Round\s*\d+$/i.test(player)) continue;
      if (/^[\d,\s]+$/.test(person)) continue;
      pickInRound += 1;
      const slot = currentRound ? `${currentRound}.${String(pickInRound).padStart(2, "0")}` : null;
      const color = cellColor(rows, r, playerCol);
      picks.push({
        year: yh.year,
        round: currentRound,
        pickInRound,
        slot,
        person: person === "Me" ? "Henry" : person === "Dad" ? "Dave" : person,
        player: player || null,
        result: normalizeResult(result),
        color,
        pos: classifyColor(color),
      });
    }
  });
  return picks;
}

function normalizeResult(r) {
  if (!r) return null;
  const s = r.trim().toLowerCase();
  if (s === "hit") return "Hit";
  if (s === "meh") return "Meh";
  if (s === "miss") return "Miss";
  return null;
}

function resultClass(r) {
  if (r === "Hit") return "result-hit";
  if (r === "Meh") return "result-meh";
  if (r === "Miss") return "result-miss";
  return "result-pending";
}

function tally(picks) {
  let hit = 0, meh = 0, miss = 0, pending = 0;
  picks.forEach(p => {
    if (p.result === "Hit") hit++;
    else if (p.result === "Meh") meh++;
    else if (p.result === "Miss") miss++;
    else if (p.player) pending++;
    // Picks with no player assigned (future slots) are excluded from totals.
  });
  return { hit, meh, miss, pending, total: hit + meh + miss + pending, graded: hit + meh + miss };
}

function uniqueSorted(arr) { return [...new Set(arr)].sort(); }

function formatPct(n, d) {
  if (!d) return "—";
  return ((n / d) * 100).toFixed(1) + "%";
}

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === "class") e.className = attrs[k];
    else if (k === "html") e.innerHTML = attrs[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

// Lightweight modal. Pass a title string and a content node; closes on the X,
// the backdrop, or Escape.
function openModal(title, contentNode) {
  const close = () => {
    overlay.remove();
    document.removeEventListener("keydown", onKey);
  };
  const onKey = e => { if (e.key === "Escape") close(); };
  const box = el("div", { class: "modal-box" },
    el("div", { class: "modal-head" },
      el("h3", {}, title),
      el("button", { class: "modal-close", onclick: close, title: "Close" }, "×"),
    ),
    el("div", { class: "modal-body" }, contentNode),
  );
  const overlay = el("div", { class: "modal-overlay", onclick: e => { if (e.target === overlay) close(); } }, box);
  document.addEventListener("keydown", onKey);
  document.body.appendChild(overlay);
}

function customSelect(options, currentValue, onChange) {
  const wrap = el("div", { class: "custom-select" });
  const currentOpt = options.find(o => o.value === currentValue);
  const triggerLabel = el("span", {}, currentOpt ? currentOpt.label : "");
  const trigger = el("button", {
    class: "custom-select-trigger",
    type: "button",
    "aria-haspopup": "listbox",
    "aria-expanded": "false",
  }, triggerLabel, el("span", { class: "custom-select-chevron" }, "▼"));
  const menu = el("div", { class: "custom-select-menu", role: "listbox" });

  function close() {
    wrap.classList.remove("open");
    trigger.setAttribute("aria-expanded", "false");
    document.removeEventListener("click", outside);
    document.removeEventListener("keydown", onKey);
  }
  function openMenu() {
    document.querySelectorAll(".custom-select.open").forEach(s => {
      if (s !== wrap) s.classList.remove("open");
    });
    wrap.classList.add("open");
    trigger.setAttribute("aria-expanded", "true");
    setTimeout(() => {
      document.addEventListener("click", outside);
      document.addEventListener("keydown", onKey);
    }, 0);
  }
  function outside(e) { if (!wrap.contains(e.target)) close(); }
  function onKey(e) { if (e.key === "Escape") close(); }

  options.forEach(opt => {
    const item = el("div", {
      class: "custom-select-option" + (opt.value === currentValue ? " selected" : ""),
      role: "option",
      onclick: e => {
        e.stopPropagation();
        close();
        onChange(opt.value);
      },
    }, opt.label);
    menu.appendChild(item);
  });

  trigger.addEventListener("click", e => {
    e.stopPropagation();
    wrap.classList.contains("open") ? close() : openMenu();
  });

  wrap.appendChild(trigger);
  wrap.appendChild(menu);
  return wrap;
}

function renderBar(t) {
  const total = t.graded || 1;
  const hitW = (t.hit / total) * 100;
  const mehW = (t.meh / total) * 100;
  const missW = (t.miss / total) * 100;
  return el("div", { class: "bar-row" },
    el("div", { class: "bar-hit", style: `width:${hitW}%` }),
    el("div", { class: "bar-meh", style: `width:${mehW}%` }),
    el("div", { class: "bar-miss", style: `width:${missW}%` }),
  );
}

function renderPickRow(p) {
  return el("div", { class: "pick-row with-slot" },
    el("div", { class: "pick-person" }, p.person),
    el("div", { class: "pick-slot" }, p.slot || "—"),
    el("div", { class: "pick-player" }, p.player || el("span", { class: "pct" }, "—")),
    el("div", { class: "pick-result " + resultClass(p.result) }, p.result || "Pending"),
  );
}

function renderOverview() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  const t = tally(state.picks);
  const stats = el("div", { class: "stat-grid" },
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Total Picks"), el("div", { class: "stat-value" }, String(t.total))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Years"), el("div", { class: "stat-value" }, String(state.years.length))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Drafters"), el("div", { class: "stat-value" }, String(state.people.length))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit Rate"), el("div", { class: "stat-value" }, formatPct(t.hit, t.graded))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit + Meh %"), el("div", { class: "stat-value" }, formatPct(t.hit + t.meh, t.graded))),
  );
  main.appendChild(stats);

  // Per-year summary card
  const yearCard = el("div", { class: "card" }, el("h2", {}, "By Year"));
  const yearTable = el("table", {},
    el("thead", {}, el("tr", {},
      el("th", {}, "Year"),
      el("th", { class: "num" }, "Picks"),
      el("th", { class: "num tight" }, "Hit"),
      el("th", { class: "num tight" }, "Meh"),
      el("th", { class: "num tight" }, "Miss"),
      sortHeader("Hit %", "hitPct", state.overviewSort, () => { toggleSort(state.overviewSort, "hitPct"); render(); }, "gap-left"),
      sortHeader("Hit + Meh", "hmPct", state.overviewSort, () => { toggleSort(state.overviewSort, "hmPct"); render(); }),
      el("th", { class: "mobile-hide" }, "Result"),
    ))
  );
  const tbody = el("tbody", {});
  const yearRows = state.years.map(y => {
    const yp = state.picks.filter(p => p.year === y);
    const t = tally(yp);
    return { y, t, hitPct: t.graded ? t.hit / t.graded : -1, hmPct: t.graded ? (t.hit + t.meh) / t.graded : -1 };
  });
  const sd = state.overviewSort.dir === "asc" ? 1 : -1;
  if (state.overviewSort.col === "year") yearRows.sort((a, b) => sd * (a.y - b.y));
  else yearRows.sort((a, b) => sd * (a[state.overviewSort.col] - b[state.overviewSort.col]));
  yearRows.forEach(({ y, t }) => {
    const tr = el("tr", {
      style: "cursor:pointer",
      onclick: () => { state.view = "year"; state.selectedYear = y; setActiveTab("year"); render(); }
    },
      el("td", {}, String(y)),
      el("td", { class: "num" }, String(t.total)),
      el("td", { class: "num tight" }, String(t.hit)),
      el("td", { class: "num tight" }, String(t.meh)),
      el("td", { class: "num tight" }, String(t.miss)),
      el("td", { class: "num tight gap-left" }, formatPct(t.hit, t.graded)),
      el("td", { class: "num tight" }, formatPct(t.hit + t.meh, t.graded)),
      el("td", { class: "mobile-hide" }, renderBar(t)),
    );
    tbody.appendChild(tr);
  });
  yearTable.appendChild(tbody);
  yearCard.appendChild(yearTable);
  main.appendChild(yearCard);
}

function renderYearView() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const controls = el("div", { class: "controls" });
  if (state.selectedYear == null) state.selectedYear = state.years[state.years.length - 1];
  const yearOpts = state.years.slice().reverse().map(y => ({ value: y, label: y + " Draft" }));
  controls.appendChild(customSelect(yearOpts, state.selectedYear, v => {
    state.selectedYear = v;
    renderYearView();
  }));
  main.appendChild(controls);

  const yearPicks = state.picks.filter(p => p.year === state.selectedYear);
  const t = tally(yearPicks);

  const stats = el("div", { class: "stat-grid" },
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Picks"), el("div", { class: "stat-value" }, String(t.total))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit"), el("div", { class: "stat-value" }, String(t.hit))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Meh"), el("div", { class: "stat-value" }, String(t.meh))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Miss"), el("div", { class: "stat-value" }, String(t.miss))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit %"), el("div", { class: "stat-value" }, formatPct(t.hit, t.graded))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Hit + Meh %"), el("div", { class: "stat-value" }, formatPct(t.hit + t.meh, t.graded))),
  );
  main.appendChild(stats);

  // Group by round
  const rounds = uniqueSorted(yearPicks.map(p => p.round || 0));
  const card = el("div", { class: "card" });
  card.appendChild(el("h2", {}, state.selectedYear + " Draft"));
  rounds.forEach(r => {
    card.appendChild(el("div", { class: "round-header" }, r ? "Round " + r : "Unknown Round"));
    yearPicks.filter(p => (p.round || 0) === r).forEach(p => {
      card.appendChild(renderPickRow(p));
    });
  });
  if (!yearPicks.length) card.appendChild(el("div", { class: "empty" }, "No picks recorded for this year yet."));
  main.appendChild(card);
}

function renderPersonView() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const controls = el("div", { class: "controls" });
  if (!state.selectedPerson) state.selectedPerson = state.people[0];
  const personOpts = state.people.map(p => ({ value: p, label: p }));
  controls.appendChild(customSelect(personOpts, state.selectedPerson, v => {
    state.selectedPerson = v;

// Picks ordered chronologically per drafter (year, then by global pick number in the draft)
function picksSequenceByDrafter(picks) {
  const groups = {};
  picks.forEach(p => {
    if (!p.player || !p.round || !p.pickInRound) return;
    (groups[p.person] = groups[p.person] || []).push(p);
  });
  Object.values(groups).forEach(arr => arr.sort((a, b) => {
    if (a.year !== b.year) return a.year - b.year;
    return ((a.round - 1) * 12 + a.pickInRound) - ((b.round - 1) * 12 + b.pickInRound);
  }));
  return groups;
}

// All picks across the league in global draft order
function picksInDraftOrder(picks) {
  return picks.slice()
    .filter(p => p.player && p.round && p.pickInRound)
    .sort((a, b) => {
      if (a.year !== b.year) return a.year - b.year;
      return ((a.round - 1) * 12 + a.pickInRound) - ((b.round - 1) * 12 + b.pickInRound);
    });
}

function tierOfPickInRound(pir) {
  if (!pir) return null;
  if (pir <= 4) return "Early";
  if (pir <= 8) return "Mid";
  return "Late";
}

// Compute KTC superflex value totals for every roster in the current league.
function computeManagerRankings() {
  if (!state.sleeper || !state.sleeper.seasons.length) return null;
  if (!state.ktcDynasty || !state.ktcDynasty.players) return null;
  const latestSeason = state.sleeper.seasons[state.sleeper.seasons.length - 1];
  // Current KTC dynasty values (re-key { normName: { value } } to { normName: value }).
  const ktcRaw = state.ktcDynasty.players || {};
  const ktcPlayers = {};
  Object.entries(ktcRaw).forEach(([n, v]) => { ktcPlayers[n] = v && v.value ? v.value : 0; });
  const ktcPicks = state.ktcDynasty.picks || {};
  const tradedPicks = state.sleeper.traded_picks || [];

  const currentRookieDraft = (latestSeason.drafts || []).find(
    d => d.rounds === 3 && (d.status === "pre_draft" || d.status === "drafting" || d.status === "complete")
  ) || (latestSeason.drafts || [])[0];  // other leagues: any draft shape
  const slotMap = currentRookieDraft ? currentRookieDraft.slot_to_roster_id || {} : {};
  const currentYear = parseInt(latestSeason.season, 10);

  function pickVal(season, round, tier) {
    return ktcPicks[`${season}|${tier}|${round}`] || 0;
  }

  // Starting-lineup shape from the league's actual roster_positions, so the
  // contender math adapts to any league. Falls back to the default league's
  // shape (1QB/2RB/3WR/1TE/FLX/SF) if the field is missing.
  const STARTING_SLOTS = (() => {
    const rp = latestSeason.roster_positions || [];
    const counts = {};
    rp.forEach(s => { counts[s] = (counts[s] || 0) + 1; });
    const slots = [];
    ["QB", "RB", "WR", "TE"].forEach(p => { if (counts[p]) slots.push({ pos: [p], n: counts[p] }); });
    if (counts["WRRB_FLEX"]) slots.push({ pos: ["RB", "WR"], n: counts["WRRB_FLEX"] });
    if (counts["REC_FLEX"]) slots.push({ pos: ["WR", "TE"], n: counts["REC_FLEX"] });
    if (counts["FLEX"]) slots.push({ pos: ["RB", "WR", "TE"], n: counts["FLEX"] });
    if (counts["SUPER_FLEX"]) slots.push({ pos: ["QB", "RB", "WR", "TE"], n: counts["SUPER_FLEX"] });
    return slots.length ? slots : [
      { pos: ["QB"], n: 1 },
      { pos: ["RB"], n: 2 },
      { pos: ["WR"], n: 3 },
      { pos: ["TE"], n: 1 },
      { pos: ["RB", "WR", "TE"], n: 1 },
      { pos: ["QB", "RB", "WR", "TE"], n: 1 },
    ];
  })();

  // Pass 1: player value + optimal lineup value per roster (no picks yet —
  // the contender ranks derived from this pass decide the projected tier of
  // future-year picks).
  const rows = latestSeason.rosters.map(r => {
    const user = latestSeason.users.find(u => u.user_id === r.owner_id);
    const name = user ? canonicalOwnerName(userDisplay(user)) : "—";
    const byPos = { QB: [], RB: [], WR: [], TE: [] };
    let playerValue = 0;
    (r.players || []).forEach(pid => {
      const p = state.sleeper.players[pid];
      if (!p) return;
      const v = ktcPlayers[ktcNormalizeName(p.name)] || 0;
      playerValue += v;
      if (byPos[p.position]) byPos[p.position].push({ pid, value: v });
    });
    Object.values(byPos).forEach(arr => arr.sort((a, b) => b.value - a.value));
    let optimalValue = 0;
    const used = new Set();
    STARTING_SLOTS.forEach(slot => {
      const pool = slot.pos.flatMap(pos => byPos[pos].filter(x => !used.has(x.pid)));
      pool.sort((a, b) => b.value - a.value);
      for (let i = 0; i < slot.n && i < pool.length; i++) {
        optimalValue += pool[i].value;
        used.add(pool[i].pid);
      }
    });
    return { roster_id: r.roster_id, name, playerValue, optimalValue };
  });

  // Contender ranks (1 = strongest lineup) drive future-pick tier projection:
  // strong teams pick late, weak teams pick early.
  const preConRank = {};
  rows.slice().sort((a, b) => b.optimalValue - a.optimalValue)
    .forEach((r, i) => { preConRank[r.roster_id] = i + 1; });
  const nTeamsForTier = rows.length || 12;
  function tierForRoster(season, rosterId) {
    if (season === currentYear) {
      const entry = Object.entries(slotMap).find(([, r]) => r === rosterId);
      if (!entry) return "mid";
      const slot = parseInt(entry[0], 10);
      if (slot <= 4) return "early";
      if (slot <= 8) return "mid";
      return "late";
    }
    // Future seasons: project draft position from current contender rank.
    const rank = preConRank[rosterId];
    if (rank == null) return "mid";
    if (rank <= nTeamsForTier / 3) return "late";       // strong lineup → late pick
    if (rank <= (2 * nTeamsForTier) / 3) return "mid";
    return "early";                                      // weak lineup → early pick
  }

  const FUTURE_YEARS = [currentYear, currentYear + 1, currentYear + 2];
  const ROUNDS = [1, 2, 3];
  function rosterPickValue(rosterId) {
    let total = 0;
    FUTURE_YEARS.forEach(season => {
      ROUNDS.forEach(round => {
        const trades = tradedPicks.filter(t => parseInt(t.season, 10) === season && t.round === round);
        const tradedMap = new Map();
        trades.forEach(t => tradedMap.set(t.roster_id, t.owner_id));
        latestSeason.rosters.forEach(r => {
          const originalRoster = r.roster_id;
          const currentOwner = tradedMap.has(originalRoster) ? tradedMap.get(originalRoster) : originalRoster;
          if (currentOwner !== rosterId) return;
          const tier = tierForRoster(season, originalRoster);
          total += pickVal(season, round, tier);
        });
      });
    });
    return total;
  }

  // Pass 2: fold in pick values now that future tiers are projected.
  rows.forEach(r => {
    r.pickValue = rosterPickValue(r.roster_id);
    r.totalValue = r.playerValue + r.pickValue;
  });

  const N = rows.length;
  const valRanked = rows.slice().sort((a, b) => b.totalValue - a.totalValue);
  const conRanked = rows.slice().sort((a, b) => b.optimalValue - a.optimalValue);
  const valueRank = {}, contenderRank = {};
  valRanked.forEach((r, i) => { valueRank[r.roster_id] = i + 1; });
  conRanked.forEach((r, i) => { contenderRank[r.roster_id] = i + 1; });

  return rows.map(r => {
    const v = valueRank[r.roster_id];
    const c = contenderRank[r.roster_id];
    const vP = N > 1 ? (v - 1) / (N - 1) : 0.5;
    const cP = N > 1 ? (c - 1) / (N - 1) : 0.5;
    const composite = 0.6 * vP + 0.4 * cP;
    return { ...r, vRank: v, cRank: c, composite };
  });
}

// Status is driven by the contender rank (starting-lineup strength), not the
// value-weighted composite: a team with a top-half lineup can win now even if
// its total asset value is thin, so it's a Contender regardless.
//   cRank in the top half      → Contender
//   cRank in the third quarter → Middler
//   bottom quarter             → Reloader
function classifyManager(cRank, totalTeams) {
  if (cRank <= totalTeams / 2) return { label: "Contender", pill: "pill-strong" };
  if (cRank <= totalTeams * 0.75) return { label: "Middler", pill: "pill-avg" };
  return { label: "Reloader", pill: "pill-weak" };
}

      el("td", {}, el("span", { class: "pill " + cls.pill }, cls.label)),

  table.appendChild(tbody);

    "Total = sum of latest KTC superflex values for each roster's players + every future pick currently owned " +
    "(originally theirs minus traded away plus acquired). Pick tier (Early / Mid / Late) is set by the current draft's slot order " +
    "for 2026 picks; 2027/2028 pick tiers are projected from the original owner's current contender rank — strong lineups project late picks, weak lineups early. " +
    "Starters = KTC value of the optimal starting lineup (1 QB, 2 RB, 3 WR, 1 TE, 1 FLEX, 1 SF). " +
    "Age = value-weighted average age of the roster (older studs weigh more than bench depth). " +
    "Status is set by Contender rank (starting-lineup strength): top half of the league → Contender, " +
    "third quarter → Middler, bottom quarter → Reloader. In a 12-team league that's #1-6 / #7-9 / #10-12."
  ));

// Age-aware classification. Value still sets Cornerstone vs Droppable, but
// the "Tradeable" / "Wait & See" split inside the middle bands flips based on
// where the player sits on the position-specific aging curve: rising players
// (under prime) are Wait & See, declining ones (past prime) are Tradeable.
//
// Cliff = age at which the position's dynasty value starts to decline meaningfully.
const POSITION_AGE_CURVE = {
  QB: { rising: 26, cliff: 33 },   // QBs hold value the longest
  WR: { rising: 24, cliff: 28 },
  TE: { rising: 25, cliff: 30 },
  // RB rising 24 (Skattebo at 24 is still Upside Premier per the DD chart);
  // cliff 28 because DD rates 26-27yo RBs (Cook, Taylor) as Foundational.
  RB: { rising: 24, cliff: 28 },
};

// Dynasty Domain-style 12-tier categorization. Derived from KTC blended value
// crossed with the player's age band (young / prime / old) on the position
// curve. Computed live every render so values update as the KTC scrape
// refreshes (~hourly). Picks classified by value alone.
// prod / value = Production Upside and Value Increase Upside star ratings
// (0–5) from the Dynasty Domain category chart. Jag tiers and Replaceable
// aren't on the official chart; their stars are our own estimates.
const DD_TIER_INFO = {
  "Cornerstone":              { chip: "dd-cornerstone",     short: "Cstn",     prod: 5, value: 1 },
  "Foundational":             { chip: "dd-foundational",    short: "Fdn",      prod: 4, value: 3 },
  "Upside Premier":           { chip: "dd-upside-premier",  short: "Up+ Prem", prod: 3, value: 5 },
  "Mainstay":                 { chip: "dd-mainstay",        short: "Mnsty",    prod: 4, value: 1 },
  "Productive Vet":           { chip: "dd-productive-vet",  short: "Prod Vet", prod: 4, value: 1 },
  "Short Term League Winner": { chip: "dd-short-lw",        short: "ST LW",    prod: 5, value: 0 },
  "Upside Shot":              { chip: "dd-upside-shot",     short: "Up Shot",  prod: 2, value: 4 },
  "Short Term Production":    { chip: "dd-short-prod",      short: "ST Prod",  prod: 4, value: 0 },
  "Serviceable":              { chip: "dd-serviceable",     short: "Servic",   prod: 2, value: 2 },
  "Jag - Insurance":          { chip: "dd-jag-insurance",   short: "Jag-Ins",  prod: 1, value: 0 },
  "Jag - Developmental":      { chip: "dd-jag-developmental", short: "Jag-Dev", prod: 1, value: 2 },
  "Replaceable":              { chip: "dd-replaceable",     short: "Repl",     prod: 0, value: 0 },
};

function ageBand(position, age) {
  // No age on record almost always means an incoming rookie (Sleeper hasn't
  // populated the bio yet) — treat as young, not prime.
  if (age == null) return "young";
  const curve = POSITION_AGE_CURVE[position] || POSITION_AGE_CURVE.WR;
  if (age <= curve.rising) return "young";
  if (age >= curve.cliff) return "old";
  return "prime";
}

// Positional projection rank (1 = best) from this week's Sleeper projections,
// scored with the league's settings. Returns null when projections aren't
// loaded or are all zero (off-season), so callers can fall back to age-only.
let _projRankCache = null;
let _projRankCacheAt = 0;
function posProjectionRank(playerId) {
  if (!state.lineupData || !state.sleeper) return null;
  const now = Date.now();
  if (!_projRankCache || now - _projRankCacheAt > 10 * 60 * 1000) {
    const { projections, league } = state.lineupData;
    const scoring = league.scoring_settings || {};
    const byPos = { QB: [], RB: [], WR: [], TE: [] };
    let anyNonZero = false;
    Object.entries(projections || {}).forEach(([pid, proj]) => {
      const sp = state.sleeper.players[pid];
      if (!sp || !byPos[sp.position]) return;
      const pts = scoreProjection(proj.stats, scoring);
      if (pts > 0) anyNonZero = true;
      byPos[sp.position].push({ pid, pts });
    });
    if (!anyNonZero) {
      _projRankCache = {};            // off-season: no usable ranks
    } else {
      _projRankCache = {};
      Object.values(byPos).forEach(arr => {
        arr.sort((a, b) => b.pts - a.pts);
        arr.forEach((e, i) => { if (e.pts > 0) _projRankCache[e.pid] = i + 1; });
      });
    }
    _projRankCacheAt = now;
  }
  return _projRankCache[playerId] != null ? _projRankCache[playerId] : null;
}

function classifyAsset(ktcValue, position, age, playerId) {
  if (ktcValue == null) ktcValue = 0;
  // Picks: value only. Picks are inherently unrealized upside, so they only
  // map to upside-flavored tiers: Foundational when valued very high (early
  // 1sts), Upside Premier for the rest of the 1st-round range, Upside Shot
  // for 2nds/3rds, Jag - Developmental for the dregs. Never Mainstay/etc.
  if (position === "PICK") {
    let label;
    if (ktcValue >= 5500) label = "Foundational";
    else if (ktcValue >= 3500) label = "Upside Premier";
    else if (ktcValue >= 1800) label = "Upside Shot";
    else label = "Jag - Developmental";
    return Object.assign({ label }, DD_TIER_INFO[label]);
  }

  // KTC superflex value only — Flock is not used for the tier label.
  // Cornerstone cutoff (6600) tuned against the Dynasty Domain chart: all 23
  // of their cornerstones qualify (Bijan 9999 down to Mahomes 6648; J. Love
  // is Jeremiyah Love at 7599). Foundational floor (5400) catches 15 of their
  // 17 foundational players; the two misses are unavoidable with KTC alone —
  // Herbert (6898) values above several chart Cornerstones, and Rashee Rice
  // (4563) values below Goff (4664), whom we pin as Mainstay. Lower bands
  // verified against Henry-roster ground truth (Goff / Kyler = Mainstay,
  // LaPorta 4512 = Upside Premier, Strange/Coker/Helm/Bigsby/Marks/Tucker
  // 2210-3051 = Upside Shot, Miller 1824 = Jag - Developmental).
  let band = ageBand(position, age);  // "young" | "prime" | "old"
  // Projection override: only in the Foundational+ value range. A player past
  // the age cliff who's still projected top-12 at his position is treated as
  // in-prime there (high-projection old RB can be Foundational). Below 5400
  // the user's calls say old stars are Short Term League Winners regardless
  // of projection (CMC, Henry), so the override doesn't apply.
  if (band === "old" && ktcValue >= 5400 && playerId != null) {
    const rank = posProjectionRank(playerId);
    if (rank != null && rank <= 12) band = "prime";
  }
  // Sleeper bio (rostered players only): NFL experience + depth chart slot.
  const spInfo = (playerId != null && state.sleeper && state.sleeper.players)
    ? state.sleeper.players[playerId] : null;
  const yearsExp = spInfo && typeof spInfo.years_exp === "number" ? spInfo.years_exp : null;

  // Established young vet: 3+ NFL seasons at starter-level value means the
  // book is mostly written — Stroud / LaPorta / Addison / Kraft read Mainstay,
  // while 1-2 year players (Ward, Odunze, Harrison) keep Upside Premier.
  // Gated to >= 3800 so 3rd-year bench stashes (Kendre Miller) stay young.
  if (band === "young" && ktcValue >= 3800 && yearsExp != null && yearsExp >= 3) {
    band = "prime";
  }
  // "Aging" = late-prime — past the position's growth years but before the
  // cliff. Aging QBs (Baker/Goff/Darnold/Kyler, 28+) are Productive Vets;
  // aging WR/RB/TEs at starter value (Higgins, Waddle, Etienne, 27+) are
  // Mainstays; lower-value aging players are Short Term Production.
  const AGING_AGE = { QB: 28, RB: 27, WR: 27, TE: 29 };
  const aging = band === "prime" && age != null && age >= (AGING_AGE[position] || 27);
  let label;
  if (band === "old") {
    // Old players split on a second, deeper age line. "Ancient" stars
    // (CMC 30, Henry 32, Adams 33, Evans 32) are Short Term League Winners —
    // they can carry a contender right now but have no future. Old-but-not-
    // ancient producers (Saquon, Jacobs, DJ Moore, Pittman, Metcalf, Kittle)
    // are Productive Vets — except high-value old WRs (AJ Brown → Mainstay)
    // and low-value old RBs (Rico Dowdle → Serviceable).
    const ANCIENT_AGE = { QB: 36, RB: 30, WR: 32, TE: 33 };
    const ancient = age != null && age >= (ANCIENT_AGE[position] || 33);
    if (!ancient && position === "WR" && ktcValue >= 4500) label = "Mainstay";
    else if (ktcValue >= 3000) {
      if (ancient) label = "Short Term League Winner";
      else if (position === "RB" && ktcValue < 3500) label = "Serviceable";
      else label = "Productive Vet";
    }
    // Old QBs still starting (or one snap away) produce now despite minimal
    // dynasty value — Rodgers (1963), Cousins (1944), Geno — so they read
    // Short Term Production on a lower floor than other positions.
    else if (ktcValue >= 2000 || (position === "QB" && ktcValue >= 1500)) label = "Short Term Production";
    else if (ktcValue >= 1300) label = "Jag - Insurance";
    else label = "Replaceable";
  } else if (ktcValue >= 6600) {
    label = "Cornerstone";
  } else if (ktcValue >= 5600) {
    label = "Foundational";
  } else if (ktcValue >= 3800) {
    if (aging) {
      label = ktcValue >= 4000 ? (position === "QB" ? "Productive Vet" : "Mainstay") : "Short Term Production";
    } else if (band === "young") {
      // Old prospects (26+ QB with <= 1 season, e.g. Tyler Shough) are bets,
      // not premiers; young RBs need a higher bar (Tuten 4004 vs Skattebo 4739).
      if (position === "QB" && age != null && age >= 26 && yearsExp != null && yearsExp <= 1) label = "Upside Shot";
      else if (position === "RB" && ktcValue < 4500) label = "Upside Shot";
      else label = "Upside Premier";
    } else {
      // Prime QBs below 4600 (Bryce Young) are still question marks.
      label = (position === "QB" && ktcValue < 4600) ? "Upside Shot" : "Mainstay";
    }
  } else if (ktcValue >= 2000) {
    // 4+ seasons with no breakout = known commodity, not an upside bet
    // (Jake Ferguson, Romeo Doubs → Serviceable).
    label = aging ? "Short Term Production"
          : (yearsExp != null && yearsExp >= 4 ? "Serviceable" : "Upside Shot");
  } else if (ktcValue >= 1300) {
    // Below 2000 KTC there's no real bench value left — young players are
    // developmental jags, everyone else is insurance. Never "Serviceable"
    // (that tier is reserved for 2000+ known commodities like Ferguson/Doubs).
    label = band === "young" ? "Jag - Developmental" : "Jag - Insurance";
  } else {
    label = "Replaceable";
  }

  // Depth-chart override for QBs: a backup (depth_chart_order >= 2) isn't a
  // weekly producer. Young/prime backups (Justin Fields, Mac Jones) read
  // Upside Shot. Old backups (Kirk Cousins behind a starter) have no upside
  // either, so they drop to an insurance jag — only an old QB who is QB1
  // (depth 1) keeps Short Term Production, and one flips automatically if his
  // depth-chart slot changes.
  if (position === "QB" && spInfo && typeof spInfo.depth_chart_order === "number" && spInfo.depth_chart_order >= 2) {
    const PRODUCTION_TIERS = new Set([
      "Mainstay", "Productive Vet", "Short Term Production", "Short Term League Winner", "Serviceable",
    ]);
    const ELITE_TIERS = new Set(["Cornerstone", "Foundational"]);
    if (band === "old") {
      if (PRODUCTION_TIERS.has(label)) label = "Jag - Insurance";
    } else if (PRODUCTION_TIERS.has(label)) {
      label = "Upside Shot";
    } else if (ELITE_TIERS.has(label)) {
      label = "Upside Premier";
    }
  }
  return Object.assign({ label }, DD_TIER_INFO[label]);
}
