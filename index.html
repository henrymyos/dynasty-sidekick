  "Elite 11 QB camp": "John",
  "Bill O'Brien": "John",
  // Charlie
  "charlieyouakim": "Charlie",
  "captainamerica1": "Charlie",
  "Revenge of the Roofers": "Charlie",
  "Kingdom of Saudi Arabia": "Charlie",
  "America's Team": "Charlie",
};
function _normalizeOwnerKey(s) {
  return (s || "")
    .replace(/[‘’ʼ′`]/g, "'")
    .trim()
    .toLowerCase();
}
const _OWNER_MERGES_NORM = (() => {
  const out = {};
  for (const k in OWNER_NAME_MERGES) out[_normalizeOwnerKey(k)] = OWNER_NAME_MERGES[k];
  return out;
})();
function canonicalOwnerName(name) {
  if (!name) return name;
  return _OWNER_MERGES_NORM[_normalizeOwnerKey(name)] || name;
}

function rosterToOwner(season, rosterId) {
  if (!season || rosterId == null) return null;
  const r = season.rosters.find(x => x.roster_id === rosterId);
  if (!r) return null;
  return season.users.find(u => u.user_id === r.owner_id) || null;
}
function userDisplay(user) {
  if (!user) return "—";
  return user.team_name || user.display_name || user.user_id;
}
function fmtDate(ms) {
  if (!ms) return "—";
  const d = new Date(ms);
  return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
}
function positionClass(pos) {
  switch (pos) {
    case "QB": return "pos-qb";
    case "RB": return "pos-rb";
    case "WR": return "pos-wr";
    case "TE": return "pos-te";
    default: return "pos-other";
  }
}

function renderTrades() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  ensureSleeperLoaded();
  ensureTradeHistoryLoaded();

  if (state.sleeperLoading) {
    main.appendChild(el("div", { class: "empty" }, "Loading from Sleeper…"));
    return;
  }
  if (state.sleeperError) {
    main.appendChild(el("div", { class: "empty" }, "Sleeper error: " + state.sleeperError));
    return;
  }
  if (!state.sleeper) {
    main.appendChild(el("div", { class: "empty" }, "No Sleeper data."));
    return;
  }

  const { seasons, players } = state.sleeper;
  // Use the current (latest) season's users as the canonical roster of managers
  const currentSeason = seasons[seasons.length - 1];
  const allUsers = currentSeason.users.slice().sort((a, b) =>
    canonicalOwnerName(userDisplay(a)).localeCompare(canonicalOwnerName(userDisplay(b)))
  );

  if (state.tradesUserId == null && allUsers.length) state.tradesUserId = allUsers[0].user_id;

  const userOpts = allUsers.map(u => ({ value: u.user_id, label: canonicalOwnerName(userDisplay(u)) }));
  const controls = el("div", { class: "controls" });
  controls.appendChild(customSelect(userOpts, state.tradesUserId, v => {
    state.tradesUserId = v;
    render();
  }));
  main.appendChild(controls);

  const selectedUser = allUsers.find(u => u.user_id === state.tradesUserId);

  // Build a flat list of trades this user was involved in across all seasons.
  // For each season, map user_id -> roster_id in that season.
  const userTrades = [];
  seasons.forEach(season => {
    const myRoster = season.rosters.find(r => r.owner_id === state.tradesUserId);
    if (!myRoster) return;
    const myRosterId = myRoster.roster_id;
    season.trades.forEach(t => {
      if (!t.roster_ids.includes(myRosterId)) return;
      userTrades.push({ season, trade: t, myRosterId });
    });
  });
  userTrades.sort((a, b) => b.trade.created - a.trade.created);

  // Summary stats
  let playersReceived = 0, playersSent = 0, picksReceived = 0, picksSent = 0;
  userTrades.forEach(({ trade, myRosterId }) => {
    Object.entries(trade.adds).forEach(([, rid]) => { if (rid === myRosterId) playersReceived++; });
    Object.entries(trade.drops).forEach(([, rid]) => { if (rid === myRosterId) playersSent++; });
    trade.draft_picks.forEach(dp => {
      if (dp.owner_id === myRosterId) picksReceived++;
      if (dp.previous_owner_id === myRosterId) picksSent++;
    });
  });
  const stats = el("div", { class: "stat-grid" },
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Trades"), el("div", { class: "stat-value" }, String(userTrades.length))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Players In"), el("div", { class: "stat-value" }, String(playersReceived))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Players Out"), el("div", { class: "stat-value" }, String(playersSent))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Picks In"), el("div", { class: "stat-value" }, String(picksReceived))),
    el("div", { class: "stat" }, el("div", { class: "stat-label" }, "Picks Out"), el("div", { class: "stat-value" }, String(picksSent))),
  );
  main.appendChild(stats);

  const card = el("div", { class: "card" }, el("h2", {}, canonicalOwnerName(userDisplay(selectedUser)) + " — Trade History"));

  if (!userTrades.length) {
    card.appendChild(el("div", { class: "empty" }, "No trades found for this manager."));
    main.appendChild(card);
    return;
  }

  userTrades.forEach(({ season, trade, myRosterId }) => {
    const otherRosterIds = trade.roster_ids.filter(r => r !== myRosterId);
    const otherNames = otherRosterIds.map(rid => canonicalOwnerName(userDisplay(rosterToOwner(season, rid)))).join(", ");

    const block = el("div", { class: "trade-block" });
    const header = el("div", { class: "trade-header" },
      el("span", { class: "trade-date" }, fmtDate(trade.created)),
      el("span", { class: "trade-meta" }, season.season + " season  ·  with " + (otherNames || "—")),
    );
    const evalResult = evaluateTrade(trade, myRosterId, state.tradeHistory, state.sleeper && state.sleeper.players);
    if (evalResult && (evalResult.mySent > 0 || evalResult.myReceived > 0)) {
      const swing = evalResult.swing;
      const sign = swing >= 0 ? "+" : "";
      const tag = el("span", {
        class: "trade-value-tag " + (swing >= 0 ? "delta-pos" : "delta-neg"),
        title: `Got ${evalResult.myReceived} · Gave ${evalResult.mySent} (KTC ${evalResult.snapshot})`,
      }, `${sign}${swing} KTC`);
      header.appendChild(tag);
    }
    block.appendChild(header);

    const cols = el("div", { class: "trade-cols" });
    const received = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, "Received"));
    const sent = el("div", { class: "trade-col" }, el("div", { class: "trade-col-label" }, "Sent"));

    // Players
    Object.entries(trade.adds).forEach(([pid, rid]) => {
      if (rid !== myRosterId) return;
      received.appendChild(renderTradePlayerLine(pid, players));
    });
    Object.entries(trade.drops).forEach(([pid, rid]) => {
      if (rid !== myRosterId) return;
      sent.appendChild(renderTradePlayerLine(pid, players));
    });

    // Picks
    trade.draft_picks.forEach(dp => {
      if (dp.owner_id === myRosterId) {
        received.appendChild(renderTradePickLine(dp, seasons, players, trade.created));
      }
      if (dp.previous_owner_id === myRosterId) {
        sent.appendChild(renderTradePickLine(dp, seasons, players, trade.created));
      }
    });

    if (!received.children.length || received.children.length === 1) {
      received.appendChild(el("div", { class: "trade-empty" }, "—"));
    }
    if (!sent.children.length || sent.children.length === 1) {
      sent.appendChild(el("div", { class: "trade-empty" }, "—"));
    }
    cols.appendChild(received);
    cols.appendChild(sent);
    block.appendChild(cols);
    card.appendChild(block);
  });

  main.appendChild(card);
}

function renderTradePlayerLine(pid, players) {
  const p = players[pid];
  const line = el("div", { class: "trade-line" });
  if (p) {
    line.appendChild(el("span", { class: "trade-player" }, p.name));
    if (p.position) {
      line.appendChild(el("span", { class: "pos-chip " + positionClass(p.position) }, p.position));
    }
  } else {
    line.appendChild(el("span", { class: "trade-player" }, "Player " + pid));
  }
  return line;
}

// Look up which player was actually drafted with a traded pick.
// dp: { season, round, roster_id } where roster_id is the original slot owner.
function resolvePickToPlayer(dp, allSeasons, players) {
  const season = allSeasons.find(s => s.season === dp.season);
  if (!season) return null;
  // Use the first chronologically-created complete draft that has enough rounds and any picks.
  const draft = season.drafts
    .filter(d => d.status === "complete" && (d.rounds || 0) >= dp.round && d.picks && d.picks.length)
    .slice()
    .sort((a, b) => (a.created || 0) - (b.created || 0))[0];
  if (!draft) return null;
  // Find the draft slot belonging to the original roster
  const slotEntry = Object.entries(draft.slot_to_roster_id || {})
    .find(([, rid]) => rid === dp.roster_id);
  if (!slotEntry) return null;
  const slot = parseInt(slotEntry[0], 10);
  const pick = draft.picks.find(p => p.round === dp.round && p.draft_slot === slot);
  if (!pick) return null;
  const player = players[pick.player_id];
  return { pick, player };
}

function renderTradePickLine(dp, allSeasons, players, tradeCreated) {
  const line = el("div", { class: "trade-line" });
  const seasonOfPick = allSeasons.find(s => s.season === dp.season);

  // Default to a round label; only collapse to the exact slot (e.g. 1.09)
  // when the slot order was already locked in when the trade happened —
  // i.e. the draft for that pick had already been configured.
  let slotLabel = `Round ${dp.round}`;
  let resolved = null;
  if (seasonOfPick) {
    const draft = seasonOfPick.drafts
      .filter(d => d.status === "complete" && (d.rounds || 0) >= dp.round && d.picks && d.picks.length)
      .slice()
      .sort((a, b) => (a.created || 0) - (b.created || 0))[0];
    if (draft) {
      const slotKnownAtTrade = tradeCreated != null && draft.created != null
        && tradeCreated >= draft.created;
      const slotEntry = Object.entries(draft.slot_to_roster_id || {})
        .find(([, rid]) => rid === dp.roster_id);
      if (slotEntry) {
        const slotNum = parseInt(slotEntry[0], 10);
        if (slotKnownAtTrade) {
          slotLabel = `${dp.round}.${String(slotNum).padStart(2, "0")}`;
        }
        const pick = draft.picks.find(p => p.round === dp.round && p.draft_slot === slotNum);
        if (pick) {
          const player = players[pick.player_id];
          if (player) resolved = { pick, player };
        }
      }
    }
  }

  // Look up the original slot owner. Use the pick's season league if it
  // exists; otherwise fall back to the current league (roster_ids are stable
  // across seasons in dynasty leagues).
  const currentSeason = allSeasons[allSeasons.length - 1];
  let origin = seasonOfPick ? rosterToOwner(seasonOfPick, dp.roster_id) : null;
  if (!origin && currentSeason) origin = rosterToOwner(currentSeason, dp.roster_id);
  const originName = origin ? canonicalOwnerName(userDisplay(origin)) : null;

  const label = `${dp.season} ${slotLabel} pick`;
  line.appendChild(el("span", { class: "trade-player" }, label));
  if (originName) {
    line.appendChild(el("span", { class: "trade-resolved" }, "· " + originName));
  }
  if (resolved && resolved.player) {
    line.appendChild(el("span", { class: "trade-resolved" }, "→ " + resolved.player.name));
    if (resolved.player.position) {
      line.appendChild(el("span", { class: "pos-chip " + positionClass(resolved.player.position) }, resolved.player.position));
    }
  }
  return line;
}

// ---------- Live Draft workspace ----------
async function loadDraftLive() {
  state.draft.loading = true;
  state.draft.error = null;
  try {
    const fetches = [
      fetch("/api/draft-live?_=" + Date.now(), { cache: "no-store" }),
      fetch("/api/ktc-live", { cache: "no-store" }),
      fetch("/api/flock-live?_=" + Date.now(), { cache: "no-store" }),
    ];
    if (!state.draft.ktcDynasty) {
      fetches.push(fetch("/api/ktc-dynasty", { cache: "no-store" }));
    }
    const results = await Promise.all(fetches);
    const [draftRes, ktcRes, flockRes, dynRes] = results;
    if (!draftRes.ok) throw new Error("draft " + draftRes.status);
    if (!ktcRes.ok) throw new Error("ktc " + ktcRes.status);
    state.draft.data = await draftRes.json();
    state.draft.ktcLive = await ktcRes.json();
    // Flock is optional — don't fail the whole load on it
    state.draft.flockError = null;
    if (flockRes.ok) {
      state.draft.flockLive = await flockRes.json();
    } else {
      try { state.draft.flockError = (await flockRes.json()).error || ("HTTP " + flockRes.status); }
      catch { state.draft.flockError = "HTTP " + flockRes.status; }
    }
    if (dynRes) {
      if (!dynRes.ok) throw new Error("dynasty " + dynRes.status);
      state.draft.ktcDynasty = await dynRes.json();
    }
    state.draft.lastPoll = new Date();
    if (state.draft.data.error) throw new Error(state.draft.data.error);
  } catch (e) {
    console.error(e);
    state.draft.error = e.message;
  } finally {
    state.draft.loading = false;
    if (state.workspace === "draft") render();
  }
}

function startDraftPolling() {
  if (state.draft.pollTimer) return;
  state.draft.pollTimer = setInterval(() => {
    if (state.workspace === "draft") loadDraftLive();
  }, 15_000);
}
function stopDraftPolling() {
  if (state.draft.pollTimer) {
    clearInterval(state.draft.pollTimer);
    state.draft.pollTimer = null;
  }
}

function ktcNorm(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[’‘ʼ]/g, "'")
    .replace(/[.,'`]/g, "")
    .replace(/\s+jr\b|\s+sr\b|\s+ii\b|\s+iii\b|\s+iv\b/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function setWorkspace(ws) {
  state.workspace = ws;
  try { localStorage.setItem(LS_WORKSPACE, ws); } catch {}
  document.querySelectorAll(".ws-btn").forEach(b => b.classList.toggle("active", b.dataset.ws === ws));
  document.getElementById("statsTabs").style.display = ws === "stats" ? "" : "none";
  if (ws === "draft") {
    if (!state.draft.data) loadDraftLive();
    startDraftPolling();
  } else {
    stopDraftPolling();
  }
  render();
}

function renderDraftWorkspace() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  if (state.draft.loading && !state.draft.data) {
    main.appendChild(el("div", { class: "empty" }, "Loading draft…"));
    return;
  }
  if (state.draft.error && !state.draft.data) {
    main.appendChild(el("div", { class: "empty" }, "Error: " + state.draft.error));
    return;
  }
  if (!state.draft.data) {
    main.appendChild(el("div", { class: "empty" }, "No draft data."));
    return;
  }

  const d = state.draft.data;

  // Team picker
  const controls = el("div", { class: "controls" });
  const sortedUsers = d.users.slice().sort((a, b) =>
    canonicalOwnerName(a.team_name || a.display_name).localeCompare(
      canonicalOwnerName(b.team_name || b.display_name)
    )
  );
  if (state.draft.myUserId == null && sortedUsers.length) {
    state.draft.myUserId = sortedUsers[0].user_id;
  }
  const userOpts = sortedUsers.map(u => ({
    value: u.user_id,
    label: canonicalOwnerName(u.team_name || u.display_name),
  }));
  controls.appendChild(customSelect(userOpts, state.draft.myUserId, v => {
    state.draft.myUserId = v;
    try { localStorage.setItem(LS_DRAFT_USER, v); } catch {}
    render();
  }));
  main.appendChild(controls);

  const me = d.users.find(u => u.user_id === state.draft.myUserId);
  const myRoster = d.rosters.find(r => r.owner_id === state.draft.myUserId);
  const myRosterId = myRoster ? myRoster.roster_id : null;
  const myName = me ? canonicalOwnerName(me.team_name || me.display_name) : "—";

  // Draft state badge
  const statusBadge = el("span", {
    class: "draft-pill " + (d.draft.status === "drafting" ? "live"
      : d.draft.status === "complete" ? "done" : "pre"),
  }, d.draft.status === "drafting" ? "LIVE"
    : d.draft.status === "complete" ? "Complete" : "Pre-draft");

  // For each (round, slot), figure out the CURRENT owner:
  // start from slot_to_roster_id; if a traded_pick matches that round + the
  // original roster, current owner = the trade's owner_id (most recent only).
  const tradedByKey = {};  // "round:originalRosterId" -> owner_id (latest)
  (d.traded_picks || []).forEach(t => {
    tradedByKey[t.round + ":" + t.roster_id] = t.owner_id;
  });
  function ownerOfSlot(round, slot) {
    const original = d.draft.slot_to_roster_id[slot];
    if (original == null) return null;
    const traded = tradedByKey[round + ":" + original];
    return traded != null ? traded : original;
  }

  // Compute who is on the clock + my next pick
  const totalPicks = (d.draft.rounds || 3) * 12;
  const madePicks = d.picks.length;
  const nextOverall = madePicks + 1;
  const nextRound = Math.ceil(nextOverall / 12);
  const slotInRound = ((nextOverall - 1) % 12) + 1;
  // Slot in actual draft depends on round (snake vs linear). League is "linear" per data.
  const onClockSlot = slotInRound; // linear
  const onClockRosterId = ownerOfSlot(nextRound, onClockSlot);
  const onClockUser = d.users.find(u => {
    const r = d.rosters.find(rr => rr.roster_id === onClockRosterId);
    return r && u.user_id === r.owner_id;
  });
  const onClockName = onClockUser ? canonicalOwnerName(onClockUser.team_name || onClockUser.display_name) : "—";

  const myUpcomingOveralls = [];
  for (let rd = 1; rd <= (d.draft.rounds || 3); rd++) {
    for (let slot = 1; slot <= 12; slot++) {
      const overall = (rd - 1) * 12 + slot;
      if (overall < nextOverall) continue;
      if (myRosterId != null && ownerOfSlot(rd, slot) === myRosterId) {
        myUpcomingOveralls.push({ rd, slot, overall });
      }
    }
  }
  myUpcomingOveralls.sort((a, b) => a.overall - b.overall);

  // On-the-clock banner if it's the user
  if (d.draft.status !== "complete") {
    const isMine = onClockRosterId === myRosterId;
    const banner = el("div", { class: "on-clock-banner" });
    if (isMine) {
      banner.innerHTML = `🎯 <strong>You're on the clock</strong> — Pick #${nextOverall} ` +
        `(${nextRound}.${String(onClockSlot).padStart(2, "0")})`;
    } else if (myUpcomingOveralls.length) {
      const next = myUpcomingOveralls[0];
      const away = next.overall - nextOverall;
      banner.innerHTML = `On the clock: <strong>${onClockName}</strong> ` +
        `· Pick #${nextOverall} (${nextRound}.${String(onClockSlot).padStart(2, "0")}). ` +
        `Your next: ${next.rd}.${String(next.slot).padStart(2, "0")} (#${next.overall}, ${away} pick${away === 1 ? "" : "s"} away).`;
    } else {
      banner.innerHTML = `On the clock: <strong>${onClockName}</strong>. You have no remaining picks.`;
    }
    main.appendChild(banner);
  }

  // Combined ranking: 70% Flock expert avg rank + 30% KTC rookie rank.
  // Both sources rank rookies 1..N (lower = better). When a rookie is only in
  // one source we use that source's rank as-is.
  const FLOCK_WEIGHT = 0.7;
  const KTC_WEIGHT = 0.3;
  const ktc = (state.draft.ktcLive && state.draft.ktcLive.players) || [];
  const flock = (state.draft.flockLive && state.draft.flockLive.players) || [];
  const ktcByName = {};
  ktc.forEach(p => { ktcByName[p.normName] = p; });
  const flockByName = {};
  flock.forEach(p => { flockByName[p.normName] = p; });

  const pickedIds = new Set(d.picks.map(p => p.player_id).filter(Boolean));
  const rookieByName = {};
  d.rookies.forEach(r => { rookieByName[ktcNorm(r.name)] = r; });

  const allNorms = new Set();
  ktc.forEach(p => allNorms.add(p.normName));
  flock.forEach(p => allNorms.add(p.normName));

  const availablePool = [];
  allNorms.forEach(norm => {
    const sleeperRookie = rookieByName[norm];
    if (!sleeperRookie) return;
    if (pickedIds.has(sleeperRookie.player_id)) return;
    const ktcEntry = ktcByName[norm];
    const flockEntry = flockByName[norm];
    if (!ktcEntry && !flockEntry) return;
    let combinedRank;
    if (ktcEntry && flockEntry) {
      combinedRank = FLOCK_WEIGHT * flockEntry.rookieRank + KTC_WEIGHT * ktcEntry.rookieRank;
    } else if (flockEntry) {
      combinedRank = flockEntry.rookieRank;
    } else {
      combinedRank = ktcEntry.rookieRank;
    }
    // Score (higher = better) so the existing position-need multiplier still
    // boosts top players appropriately.
    const score = 10000 / Math.max(combinedRank, 0.5);
    const meta = flockEntry || ktcEntry;
    availablePool.push({
      name: meta.name,
      normName: norm,
      position: meta.position,
      team: sleeperRookie.team || meta.team,
      player_id: sleeperRookie.player_id,
      value: score,
      combinedRank,
      ktcRank: ktcEntry ? ktcEntry.rookieRank : null,
      flockRank: flockEntry ? flockEntry.rookieRank : null,
    });
  });

  // Position-need calculation. Value each roster's players using KTC superflex
  // dynasty values per position, then compare against the league average.
  const POS_LIST = ["QB", "RB", "WR", "TE"];
  const dyn = (state.draft.ktcDynasty && state.draft.ktcDynasty.players) || {};
  const teamValues = {};   // roster_id -> { QB: total_value, RB:, WR:, TE: }
  d.rosters.forEach(r => {
    teamValues[r.roster_id] = { QB: 0, RB: 0, WR: 0, TE: 0 };
    (r.players || []).forEach(pid => {
      const pl = d.players[pid];
      if (!pl || !POS_LIST.includes(pl.position)) return;
      const ktcEntry = dyn[ktcNorm(pl.name)];
      const v = ktcEntry ? (ktcEntry.value || 0) : 0;
      teamValues[r.roster_id][pl.position] += v;
    });
  });
  const leagueAvgValue = { QB: 0, RB: 0, WR: 0, TE: 0 };
  Object.values(teamValues).forEach(v => POS_LIST.forEach(p => leagueAvgValue[p] += v[p]));
  const nTeams = d.rosters.length || 1;
  POS_LIST.forEach(p => leagueAvgValue[p] /= nTeams);

  const myValues = (myRosterId != null && teamValues[myRosterId]) || { QB: 0, RB: 0, WR: 0, TE: 0 };
  // Boost = 1 + (deficit × 0.5), capped at 1.20× so KTC value still dominates
  // and position-need only nudges close calls.
  const posBoost = {};
  POS_LIST.forEach(p => {
    if (leagueAvgValue[p] <= 0) { posBoost[p] = 1; return; }
    const deficit = (leagueAvgValue[p] - myValues[p]) / leagueAvgValue[p];
    posBoost[p] = 1 + Math.max(0, Math.min(0.20, deficit * 0.5));
  });

  function scoreFor(p) {
    if (state.draft.posMode) return p.value * (posBoost[p.position] || 1);
    return p.value;
  }
  const recommendations = availablePool.slice().sort((a, b) => scoreFor(b) - scoreFor(a));

  // ===== Left column: Recommendation + Available rookies =====
  const grid = el("div", { class: "draft-grid" });

  const leftCol = el("div", {});
  const recCard = el("div", { class: "card" },
    el("h2", {}, "Recommendation ", statusBadge)
  );

  if (state.draft.flockError) {
    recCard.appendChild(el("div", { class: "pct", style: "color: var(--meh); margin-bottom:8px" },
      "Flock unavailable (" + state.draft.flockError + ") — using KTC only."));
  }

  // Mode toggle (Best Available vs Position-Need)
  const toggle = el("div", { class: "toggle-row" });
  const baBtn = el("button", { class: state.draft.posMode ? "" : "active" }, "Best Available");
  const posBtn = el("button", { class: state.draft.posMode ? "active" : "" }, "Position-Need");
  baBtn.addEventListener("click", () => {
    state.draft.posMode = false;
    try { localStorage.setItem(LS_DRAFT_MODE, "ba"); } catch {}
    render();
  });
  posBtn.addEventListener("click", () => {
    state.draft.posMode = true;
    try { localStorage.setItem(LS_DRAFT_MODE, "pos"); } catch {}
    render();
  });
  toggle.appendChild(baBtn);
  toggle.appendChild(posBtn);
  recCard.appendChild(toggle);

  if (state.draft.posMode) {
    const needLine = el("div", { class: "pct", style: "margin-bottom:10px" });
    if (!state.draft.ktcDynasty) {
      needLine.textContent = "Loading KTC dynasty values for team valuation…";
    } else {
      needLine.textContent = "Your value vs league avg by position: " + POS_LIST.map(p => {
        const me = Math.round(myValues[p]);
        const avg = Math.round(leagueAvgValue[p]);
        const delta = me - avg;
        const sign = delta >= 0 ? "+" : "";
        return `${p} ${me} (${sign}${delta} vs ${avg})`;
      }).join("  ·  ");
    }
    recCard.appendChild(needLine);
  }

  if (!recommendations.length) {
    recCard.appendChild(el("div", { class: "empty" }, "No KTC-ranked rookies left or KTC live data not loaded."));
  } else {
    recommendations.slice(0, 3).forEach((p, i) => {
      const card = el("div", { class: "rec-card" });
      card.appendChild(el("div", { class: "rec-label" }, i === 0 ? "Top pick" : i === 1 ? "Next option" : "Backup"));
      const playerLine = el("div", { class: "rec-player" }, p.name);
      if (p.position) {
        playerLine.appendChild(el("span", { class: "pos-chip " + positionClass(p.position) }, p.position));
      }
      card.appendChild(playerLine);
      const metaBits = [`Rank ${p.combinedRank.toFixed(1)}`];
      if (p.team) metaBits.push(p.team);
      if (state.draft.posMode && posBoost[p.position] !== 1) {
        metaBits.push(`need boost ×${posBoost[p.position].toFixed(2)}`);
      }
      card.appendChild(el("div", { class: "rec-meta" }, metaBits.join("  ·  ")));
      recCard.appendChild(card);
    });
  }
  leftCol.appendChild(recCard);

  // Top available pool
  const availCard = el("div", { class: "card" }, el("h2", {}, "Top Available Rookies"));
  if (!recommendations.length) {
    availCard.appendChild(el("div", { class: "empty" }, "—"));
  } else {
    recommendations.slice(0, 20).forEach((p, idx) => {
      const row = el("div", { class: "pick-history-row" },
        el("div", { class: "pick-history-slot" }, "#" + (idx + 1)),
        el("div", {},
          p.name,
          p.position ? el("span", { class: "pos-chip " + positionClass(p.position), style: "margin-left:8px" }, p.position) : null,
        ),
        el("div", { class: "pick-history-by" },
          `Rank ${p.combinedRank.toFixed(1)}` + (p.team ? "  ·  " + p.team : ""),
        ),
      );
      availCard.appendChild(row);
    });
  }
  leftCol.appendChild(availCard);

  // ===== Right column: My picks + recent activity + roster =====
  const rightCol = el("div", {});

  const myPicksCard = el("div", { class: "card" }, el("h2", {}, myName + "'s Picks"));
  if (!myUpcomingOveralls.length) {
    myPicksCard.appendChild(el("div", { class: "empty" }, "No upcoming picks."));
  } else {
    myUpcomingOveralls.forEach(p => {
      const away = p.overall - nextOverall;
      myPicksCard.appendChild(el("div", { class: "pick-history-row is-mine" },
        el("div", { class: "pick-history-slot" }, p.rd + "." + String(p.slot).padStart(2, "0")),
        el("div", {}, "Pick #" + p.overall),
        el("div", { class: "pick-history-by" },
          away === 0 ? "On the clock" : (away === 1 ? "Next" : `${away} picks away`)),
      ));
    });
  }
  rightCol.appendChild(myPicksCard);

  // Recent activity (last 10 picks)
  const recentCard = el("div", { class: "card" }, el("h2", {}, "Recent Picks"));
  if (!d.picks.length) {
    recentCard.appendChild(el("div", { class: "empty" }, "Draft hasn't started."));
  } else {
    const recent = d.picks.slice(-10).reverse();
    recent.forEach(p => {
      const player = p.player_id ? d.players[p.player_id] : null;
      const rosterUser = d.users.find(u => {
        const rr = d.rosters.find(r => r.roster_id === p.roster_id);
        return rr && rr.owner_id === u.user_id;
      });
      const isMine = p.roster_id === myRosterId;
      recentCard.appendChild(el("div", { class: "pick-history-row" + (isMine ? " is-mine" : "") },
        el("div", { class: "pick-history-slot" }, p.round + "." + String(p.draft_slot).padStart(2, "0")),
        el("div", {},
          player ? player.name : ("Player " + p.player_id),
          player && player.position
            ? el("span", { class: "pos-chip " + positionClass(player.position), style: "margin-left:8px" }, player.position)
            : null,
        ),
        el("div", { class: "pick-history-by" },
          rosterUser ? canonicalOwnerName(rosterUser.team_name || rosterUser.display_name) : "—"),
      ));
    });
  }
  rightCol.appendChild(recentCard);

  // Your roster
  const rosterCard = el("div", { class: "card" }, el("h2", {}, myName + "'s Roster"));
  if (!myRoster || !myRoster.players.length) {
    rosterCard.appendChild(el("div", { class: "empty" }, "No roster found."));
  } else {
    const byPos = { QB: [], RB: [], WR: [], TE: [], OTHER: [] };
    myRoster.players.forEach(pid => {
      const p = d.players[pid];
      if (!p) return;
      const bucket = byPos[p.position] ? p.position : "OTHER";
      byPos[bucket].push(p);
    });
    ["QB", "RB", "WR", "TE"].forEach(pos => {
      if (!byPos[pos].length) return;
      const sec = el("div", { class: "roster-section" },
        el("h4", {}, `${pos} (${byPos[pos].length})`),
      );
      const list = el("div", { class: "roster-list" });
      byPos[pos]
        .map(pl => {
          const entry = dyn[ktcNorm(pl.name)];
          return { pl, entry, value: entry ? (entry.value || 0) : 0 };
        })
        .sort((a, b) => b.value - a.value)
        .forEach(({ pl, entry, value }) => {
          const chip = el("div", { class: "roster-chip" + (pl.rookie ? " is-rookie" : "") }, pl.name);
          if (entry && entry.positionRank != null) {
            chip.appendChild(el("span", {
              style: "color:var(--accent); margin-left:6px; font-size:11px; font-weight:600",
            }, pos + String(entry.positionRank)));
          }
          if (value) {
            chip.appendChild(el("span", {
              style: "color:var(--muted); margin-left:6px; font-size:11px",
            }, String(value)));
          }
          list.appendChild(chip);
        });
      sec.appendChild(list);
      rosterCard.appendChild(sec);
    });
  }
  rightCol.appendChild(rosterCard);

  grid.appendChild(leftCol);
  grid.appendChild(rightCol);
  main.appendChild(grid);

  // ===== Projected Draft (full-width below the grid) =====
  const projCard = el("div", { class: "card", style: "margin-top:16px" },
    el("h2", {}, "Projected Draft Order"),
    el("div", { class: "pct", style: "margin-bottom:10px" },
      "Simulated by running the same Best-Available + Position-Need algorithm " +
      "for every team in pick order. Your projected picks are highlighted."
    ),
  );

  // Build the projection by iterating through remaining picks.
  const projValues = {};
  Object.entries(teamValues).forEach(([rid, v]) => { projValues[rid] = { ...v }; });
  const remaining = availablePool.slice();

  function boostForRoster(rid) {
    const boost = {};
    POS_LIST.forEach(p => {
      if (leagueAvgValue[p] <= 0) { boost[p] = 1; return; }
      const myVal = (projValues[rid] && projValues[rid][p]) || 0;
      const deficit = (leagueAvgValue[p] - myVal) / leagueAvgValue[p];
      boost[p] = 1 + Math.max(0, Math.min(0.20, deficit * 0.5));
    });
    return boost;
  }

  const projection = [];
  for (let overall = nextOverall; overall <= totalPicks; overall++) {
    if (!remaining.length) break;
    const round = Math.ceil(overall / 12);
    const slot = ((overall - 1) % 12) + 1;
    const rosterId = ownerOfSlot(round, slot);
    if (rosterId == null) continue;
    const boost = boostForRoster(rosterId);
    let bestIdx = -1, bestScore = -Infinity;
    for (let i = 0; i < remaining.length; i++) {
      const p = remaining[i];
      const score = p.value * (boost[p.position] || 1);
      if (score > bestScore) { bestScore = score; bestIdx = i; }
    }
    if (bestIdx < 0) break;
    const pick = remaining.splice(bestIdx, 1)[0];
    if (!projValues[rosterId]) projValues[rosterId] = { QB: 0, RB: 0, WR: 0, TE: 0 };
    projValues[rosterId][pick.position] = (projValues[rosterId][pick.position] || 0) + pick.value;
    projection.push({ overall, round, slot, rosterId, player: pick });
  }

  if (!projection.length) {
    projCard.appendChild(el("div", { class: "empty" }, "Draft is complete or no KTC-ranked rookies remain."));
  } else {
    const seenRounds = new Set();
    projection.forEach(p => {
      if (!seenRounds.has(p.round)) {
        seenRounds.add(p.round);
        projCard.appendChild(el("div", { class: "round-header" }, "Round " + p.round));
      }
      const team = d.users.find(u => {
        const rr = d.rosters.find(r => r.roster_id === p.rosterId);
        return rr && rr.owner_id === u.user_id;
      });
      const teamName = team ? canonicalOwnerName(team.team_name || team.display_name) : "—";
      const isMine = p.rosterId === myRosterId;
      projCard.appendChild(el("div", { class: "pick-history-row" + (isMine ? " is-mine" : "") },
        el("div", { class: "pick-history-slot" }, `${p.round}.${String(p.slot).padStart(2, "0")}`),
        el("div", {},
          p.player.name,
          el("span", { class: "pos-chip " + positionClass(p.player.position), style: "margin-left:8px" }, p.player.position),
          el("span", { class: "pct", style: "margin-left:8px" }, "Rank " + p.player.combinedRank.toFixed(1)),
        ),
        el("div", { class: "pick-history-by" }, teamName),
      ));
    });
  }
  main.appendChild(projCard);
}

function setActiveTab(view) {
  document.querySelectorAll("nav.tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.view === view);
  });
}

function render() {
  if (state.workspace === "draft") {
    renderDraftWorkspace();
    return;
  }
  if (!state.picks.length) {
    document.getElementById("main").innerHTML = '<div class="empty">No draft data available.</div>';
    return;
  }
  switch (state.view) {
    case "year": renderYearView(); break;
    case "person": renderPersonView(); break;
    case "leaderboard": renderLeaderboard(); break;
    case "rankings": renderRankings(); break;
    case "rosters": renderRosters(); break;
    case "stats": renderStats(); break;
    case "trades": renderTrades(); break;
    default: renderOverview();
  }
}

function setStatus(kind, text) {
  const dot = document.getElementById("statusDot");
  const txt = document.getElementById("statusText");
  dot.className = "status-dot" + (kind === "loading" ? " loading" : kind === "error" ? " error" : "");
  txt.textContent = text;
}

async function loadData() {
  setStatus("loading", "Refreshing…");
  try {
    const res = await fetch("/api/sheet?_=" + Date.now(), { cache: "no-store" });
    if (!res.ok) {
      const detail = await res.text();
      throw new Error("API " + res.status + ": " + detail.slice(0, 120));
    }
    const data = await res.json();
    if (!data.rows) throw new Error("malformed response");
    const picks = extractPicks(data.rows);
    state.picks = picks;
    state.years = uniqueSorted(picks.map(p => p.year));
    state.people = uniqueSorted(picks.map(p => p.person));
    state.lastUpdated = new Date();
    setStatus("ok", "Updated " + state.lastUpdated.toLocaleTimeString());
    render();
  } catch (e) {
    console.error(e);
    setStatus("error", "Failed: " + e.message);
  }
}

document.querySelectorAll("nav.tabs button").forEach(b => {
  b.addEventListener("click", () => {
    state.view = b.dataset.view;
    setActiveTab(state.view);
    render();
  });
});
document.querySelectorAll(".ws-btn").forEach(b => {
  b.addEventListener("click", () => setWorkspace(b.dataset.ws));
});
document.getElementById("refreshBtn").addEventListener("click", () => {
  if (state.workspace === "draft") loadDraftLive();
  else loadData();
});

// Initial bootstrap
setWorkspace(state.workspace);
loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
